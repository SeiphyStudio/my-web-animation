<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>α老師物理模擬動畫實驗室</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: #f0f2f5; 
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 50px;
            max-width: 1200px;
            width: 100%;
            flex-wrap: wrap;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 300px;
        }

        .teacher-img {
            max-width: 350px;
            width: 100%;
            height: auto;
            /* 如果圖片有背景色，drop-shadow 會作用在框線上，建議去背後存成 PNG 效果較好 */
            filter: drop-shadow(10px 10px 20px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
            /* 嘗試讓 JPG 背景融入 (如果背景色相近) */
            border-radius: 20px; 
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 { 
            color: #333; 
            margin-bottom: 40px; 
            text-align: center; 
            font-size: 4.0em; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); 
            line-height: 1.2;
        }
        
        /* 設定容器寬度以確保每行三個卡片 */
        .menu-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 30px; 
            width: 100%; 
            max-width: 800px; /* 限制最大寬度，強迫換行對齊 */
        }
        
        .category-card {
            background-color: #fff;
            width: 200px; 
            padding: 25px 15px;
            text-decoration: none;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border-top: 5px solid #007bff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .category-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        .icon { font-size: 3em; margin-bottom: 15px; }
        .title { color: #333; font-size: 1.3em; font-weight: bold; margin-bottom: 10px; }
        .desc { color: #666; font-size: 0.9em; line-height: 1.5; }
        
        /* 各分類顏色設定 */
        .card-motion { border-top-color: #ff6b6b; } /* 紅色 */
        .card-waves { border-top-color: #4ecdc4; }  /* 藍綠色 */
        .card-optics { border-top-color: #ffe66d; } /* 黃色 */
        .card-modern { border-top-color: #2ecc71; } /* 翡翠綠 (調整位置) */
        .card-tools { border-top-color: #a55eea; }  /* 紫色 */
        .card-inquiry { border-top-color: #ff9f43; } /* 橘色 (新增) */

        /* 響應式調整 */
        @media (max-width: 900px) {
            .main-layout {
                flex-direction: column-reverse;
                gap: 20px;
            }
            h1 { font-size: 3em; }
            .teacher-img { max-width: 200px; margin-bottom: 20px;}
        }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <div class="content-area">
            <h1>α老師物理模擬動畫實驗室</h1>

            <div class="menu-container">
                <!-- 第一排 -->
                <a href="motion.html" class="category-card card-motion">
                    <div class="icon">🏎️</div>
                    <div class="title">運動與力</div>
                    <div class="desc">牛頓定律、拋體運動等經典力學。</div>
                </a>

                <a href="waves.html" class="category-card card-waves">
                    <div class="icon">🌊</div>
                    <div class="title">波動</div>
                    <div class="desc">水波、駐波、干涉與繞射現象。</div>
                </a>

                <a href="optics.html" class="category-card card-optics">
                    <div class="icon">🔦</div>
                    <div class="title">光學</div>
                    <div class="desc">面鏡成像、透鏡折射與光學儀器。</div>
                </a>

                <!-- 第二排：調整順序為 近代物理 -> 小工具 -> 探究與實作 -->
                <a href="modern.html" class="category-card card-modern">
                    <div class="icon">⚛️</div>
                    <div class="title">近代物理</div>
                    <div class="desc">量子論、波粒二象性與原子模型。</div>
                </a>

                <a href="tools.html" class="category-card card-tools">
                    <div class="icon">🧰</div>
                    <div class="title">小工具</div>
                    <div class="desc">包含計時器、計算機等教學輔助工具。</div>
                </a>

                <!-- 新增區塊 -->
                <a href="探究與實作.html" class="category-card card-inquiry">
                    <div class="icon">🧪</div>
                    <div class="title">探究與實作</div>
                    <div class="desc">實驗設計、數據分析與誤差傳播。</div>
                </a>

            </div>
        </div>
