<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>α老師物理模擬動畫實驗室</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            background-color: #f0f2f5; 
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-layout {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center; 
            gap: 40px;
            max-width: 1400px; 
            width: 100%;
            /* 關鍵修改：強制不換行，讓這三個區塊始終保持在同一列 */
            flex-wrap: nowrap; 
        }

        .content-area {
            /* 允許主內容區塊在空間不夠時縮小，內部的卡片會自動往下排 */
            flex: 1 1 auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 300px;
        }

        .teacher-img {
            /* 讓圖片也能配合視窗稍微縮小，避免把右側卡片擠走 */
            flex: 0 1 350px; 
            max-width: 350px;
            width: 100%;
            height: auto;
            filter: drop-shadow(10px 10px 20px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
            border-radius: 20px; 
        }

        .right-area {
            /* 讓右側個人工具卡片保持原始大小，不被過度壓縮 */
            flex: 0 0 auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 { 
            color: #333; 
            margin-bottom: 40px; 
            text-align: center; 
            font-size: 4.0em; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1); 
            line-height: 1.2;
        }
        
        .menu-container { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 30px; 
            width: 100%; 
            max-width: 800px; 
        }
        
        .category-card {
            background-color: #fff;
            width: 200px; 
            padding: 25px 15px;
            text-decoration: none;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border-top: 5px solid #007bff;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }
        
        .category-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
        }
        
        .icon { font-size: 3em; margin-bottom: 15px; }
        .title { color: #333; font-size: 1.3em; font-weight: bold; margin-bottom: 10px; }
        .desc { color: #666; font-size: 0.9em; line-height: 1.5; }
        
        /* 各分類顏色設定 */
        .card-motion { border-top-color: #ff6b6b; } 
        .card-waves { border-top-color: #4ecdc4; }  
        .card-optics { border-top-color: #ffe66d; } 
        .card-modern { border-top-color: #2ecc71; } 
        .card-tools { border-top-color: #a55eea; }  
        .card-inquiry { border-top-color: #ff9f43; } 
        .card-personal { border-top-color: #e84393; }

        /* 響應式調整：當螢幕小於 1200px 時改為垂直排列 */
        @media (max-width: 1200px) {
            .main-layout {
                flex-direction: column; /* 改為垂直排列 */
                gap: 30px;
            }
            .teacher-img { order: 1; max-width: 250px; }
            .content-area { order: 2; }
            .right-area { order: 3; }
            
            h1 { font-size: 3em; }
        }
    </style>

    <script>
        function checkPersonalPassword(event) {
            // 阻止原本的直接跳轉行為
            event.preventDefault(); 
            
            // 1. 彈出視窗詢問密碼
            var password = prompt("請輸入 6 位數個人工具專用密碼：");

            // 2. 檢查密碼 (這裡預設是 123456，老師可以在這裡修改)
            if (password === "601021") {
                // 密碼正確 -> 跳轉到目標檔案
                window.location.href = "personal.html"; 
            } else if (password != null) {
                // 密碼錯誤 -> 顯示警告 (排除按取消的情況)
                alert("密碼錯誤，存取被拒絕 🚫");
            }
        }
    </script>
</head>
