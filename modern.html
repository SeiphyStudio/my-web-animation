<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>近代物理模擬單元</title>
    <style>
        /* 背景改為淡綠色，配合主題 */
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f0f9f4; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
        }
        
        /* 標題顏色改為近代物理的綠色 */
        h1 { color: #2ecc71; margin-bottom: 30px; text-align: center; }
        
        .menu-container { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 400px; }
        
        /* 按鈕邊框與文字也改成綠色 */
        .btn { 
            background-color: #fff; 
            color: #2ecc71; 
            padding: 20px; 
            text-decoration: none; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 1.2em; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: 2px solid #2ecc71; 
            transition: transform 0.2s; 
        }
        
        /* 滑鼠移過去變成綠底白字 */
        .btn:hover { transform: translateY(-3px); background-color: #2ecc71; color: #fff; }
        
        .back-btn { margin-top: 30px; color: #666; text-decoration: none; font-weight: bold; }
        .back-btn:hover { color: #2ecc71; }
    </style>
