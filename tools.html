<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教學小工具</title>
    <style>
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #f3e5f5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
            margin: 0;
        }
        h1 { 
            color: #8e44ad; 
            margin-bottom: 30px; 
            text-align: center; 
            font-size: 2.5rem;
        }

        /* 改用 Grid 佈局，設定每列 4 個 */
        .menu-container { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            width: 100%; 
            max-width: 1200px; 
        }
        
        /* 一般按鈕樣式 */
        .btn { 
            background-color: #fff; 
            color: #8e44ad; 
            padding: 30px 20px; 
            text-decoration: none; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 1.2em; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border: 2px solid #8e44ad; 
            transition: transform 0.2s; 
            cursor: pointer; 
            
            /* 讓文字垂直置中 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px; 
        }
        .btn:hover { 
            transform: translateY(-3px); 
            background-color: #8e44ad; 
            color: #fff; 
        }
        
        /* 加鎖按鈕的特殊樣式 (深紫色) */
        .btn-lock { 
            border-color: #5e2a75; 
            color: #5e2a75; 
            background-color: #fce4ec; 
        }
        .btn-lock:hover { 
            background-color: #5e2a75; 
            color: #fff; 
        }

        /* AI 工具特殊樣式 (綠色) */
        .btn-ai { 
            border-color: #27ae60; 
            color: #27ae60; 
            background-color: #e8f8f5; 
        }
        .btn-ai:hover { 
            background-color: #27ae60; 
            color: #fff; 
        }

        .back-btn { 
            margin-top: 40px; 
            color: #666; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.1rem;
            padding: 10px 20px;
        }
        .back-btn:hover { 
            color: #8e44ad; 
        }

        /* RWD 響應式：手機和平板自動調整 */
        @media (max-width: 992px) {
            .menu-container {
                grid-template-columns: repeat(2, 1fr); 
            }
        }
        @media (max-width: 576px) {
            .menu-container {
                grid-template-columns: 1fr; 
            }
        }
    </style>

    <script>
        // 原本的老師專用密碼
        function checkPassword() {
            var password = prompt("請輸入老師專用密碼：");

            if (password === "1021") {
                window.location.href = "上課觀測記錄.html"; 
            } else if (password != null) {
                alert("密碼錯誤，存取被拒絕 🚫");
            }
        }

        // 新增的學生共同評分密碼
        function checkStudentEvalPassword() {
            var password = prompt("請輸入學生共同評分密碼：");

            // 預設密碼為 1021，您可以在這裡修改成其他數字
            if (password === "1021") {
                window.location.href = "學生共同評分.html"; 
            } else if (password != null) {
                alert("密碼錯誤，存取被拒絕 🚫");
            }
        }
    </script>
</head>
<body>

    <h1>🧰 教學小工具</h1>

    <div class="menu-container">
        
        <a href="教室安排座位抽籤系統.html" class="btn">1. 教室安排座位抽籤系統</a>
        <a href="教室安排座位輪盤抽籤.html" class="btn">2. 教室安排座位輪盤抽籤</a>
        <a href="抽籤回答系統(座位模式).html" class="btn">3. 抽籤回答<br>(座位模式)</a>
        <a href="抽籤回答系統(輪盤模式).html" class="btn">4. 抽籤回答<br>(輪盤模式)</a>
        <a href="抽籤回答系統(大富翁模式).html" class="btn">5. 抽籤回答<br>(大富翁模式)</a>
        <a href="順序抽籤.html" class="btn">6. 順序抽籤</a>
        <a href="倒數計時.html" class="btn">7. 倒數計時</a>
        <a href="縮短網址.html" class="btn">8. 縮短網址</a>
        <a href="小精靈(競賽).html" class="btn">9. 小精靈(競賽)</a>
        <a href="學生互評.html" class="btn">10. 學生互評</a>
        
        <a href="#" onclick="checkStudentEvalPassword()" class="btn btn-lock">🔒 11. 學生共同評分</a>
        
        <a href="加速度測量.html" class="btn">12. 加速度測量</a>
        <a href="手機磁場感測器.html" class="btn">13. 手機磁場感測器</a>
        <a href="選書投票程式.html" class="btn">14. 選書投票程式</a>
        
        <a href="#" onclick="checkPassword()" class="btn btn-lock">🔒 15. 上課觀測記錄<br>(老師專用)</a>
    </div>

    <a href="index.html" class="back-btn">⬅ 回到主選單</a>

</body>
</html>
