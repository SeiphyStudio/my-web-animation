<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒數計時器</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05070a; /* 深空黑 */
            font-family: 'Share Tech Mono', monospace;
            color: #fff;
        }

        /* 畫布全螢幕 */
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI 控制面板 - 回歸正中央 */
        #ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            width: 90%;
            max-width: 600px;
            pointer-events: none; 
        }

        /* 輸入框容器 */
        #controls {
            pointer-events: auto;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            transition: opacity 0.3s;
        }

        /* 模式切換按鈕區域 */
        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            gap: 10px;
        }

        .mode-btn {
            background: transparent;
            color: #aaa;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            transition: 0.3s;
        }

        .mode-btn.active {
            color: #00f0ff;
            border-color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* 執行中的按鈕容器 - 垂直置中，水平靠右 */
        #active-controls {
            position: absolute;
            top: 50%;
            left: calc(50% + 55vmin); 
            transform: translate(0, -50%);
            z-index: 20;
            display: none; 
            pointer-events: auto;
            display: flex; 
            flex-direction: column;
            gap: 15px;
        }
        
        /* 底部中原標準時間 - 移到左邊並放大 */
        #std-time-container {
            position: absolute;
            top: 50%;
            left: 40px;
            bottom: auto;
            transform: translateY(-50%);
            width: auto;
            text-align: left;
            z-index: 10;
            pointer-events: none;
            white-space: nowrap;
        }

        #std-time {
            font-size: 4.5rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
            font-weight: bold;
        }

        #std-label {
            font-size: 2.7rem;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 15px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
        }

        /* 手機版適配 */
        @media (max-aspect-ratio: 1/1) {
            #active-controls {
                top: 80%; 
                left: 50%;
                transform: translate(-50%, 0);
                flex-direction: row; 
            }

            #std-time-container {
                top: auto;
                bottom: 30px;
                left: 0;
                width: 100%;
                text-align: center;
                transform: none;
            }
            #std-time { font-size: 3rem; }
            #std-label { font-size: 1.5rem; }
        }

        .input-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .time-input {
            width: 70px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #00f0ff;
            color: #00f0ff;
            font-size: 1.5rem;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            font-family: 'Share Tech Mono', monospace;
            outline: none;
            transition: all 0.3s;
        }

        /* 指定時間輸入框稍微加寬 */
        #target-time-in {
            width: auto;
            padding: 10px 15px;
        }

        .time-input:focus {
            box-shadow: 0 0 15px #00f0ff;
            border-color: #fff;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .btn {
            background: transparent;
            color: #00f0ff;
            border: 2px solid #00f0ff;
            padding: 10px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            transition: 0.3s;
            margin: 0 10px;
            white-space: nowrap;
        }

        .btn:hover {
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 20px #00f0ff;
        }

        .btn-pause {
            color: #ffcc00;
            border-color: #ffcc00;
            background: rgba(0, 0, 0, 0.5);
            font-weight: bold;
            padding: 15px 30px;
        }

        .btn-pause:hover {
            background: #ffcc00;
            color: #000;
            box-shadow: 0 0 20px #ffcc00;
        }

        .btn-stop {
            color: #ff0055;
            border-color: #ff0055;
            background: rgba(0, 0, 0, 0.5); 
            font-weight: bold;
            font-size: 1.5rem; 
            padding: 15px 30px;
        }

        .btn-stop:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 20px #ff0055;
        }

        #fs-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 30;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            transition: 0.3s;
            pointer-events: auto;
        }

        #fs-btn:hover {
            border-color: #00f0ff;
            color: #00f0ff;
            background: rgba(0, 240, 255, 0.1);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <button id="fs-btn">⛶ 全螢幕</button>

    <!-- 初始設定面板 -->
    <div id="ui-layer">
        <div id="controls">
            <!-- 新增模式切換 -->
            <div class="mode-toggle">
                <button class="mode-btn active" id="btn-mode-duration">倒數時長</button>
                <button class="mode-btn" id="btn-mode-target">指定時間</button>
            </div>

            <!-- 原本的倒數時長設定 -->
            <div class="input-group" id="group-duration">
                <div>
                    <label>時 (HRS)</label>
                    <input type="number" id="h-in" class="time-input" min="0" max="99" value="0">
                </div>
                <div>
                    <label>分 (MIN)</label>
                    <input type="number" id="m-in" class="time-input" min="0" max="59" value="0">
                </div>
                <div>
                    <label>秒 (SEC)</label>
                    <input type="number" id="s-in" class="time-input" min="0" max="59" value="10">
                </div>
            </div>

            <!-- 新增的指定時間設定 (預設隱藏) -->
            <div class="input-group" id="group-target" style="display: none;">
                <div>
                    <label>目標時間 (TIME)</label>
                    <input type="time" id="target-time-in" class="time-input">
                </div>
            </div>

            <button class="btn" id="start-btn">啟動 (START)</button>
        </div>
    </div>
    
    <div id="active-controls" style="display: none;">
         <button class="btn btn-pause" id="pause-btn">暫停 (PAUSE)</button>
         <button class="btn btn-stop" id="stop-btn">終局 (ABORT)</button>
    </div>

    <div id="std-time-container">
        <div id="std-label">中原標準時間</div>
        <div id="std-time">Loading...</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const fsBtn = document.getElementById('fs-btn');
        
        let animationId;
        let particles = [];
        let width, height;
        let centerX, centerY;
        let minDim; 
        
        let totalTimeMs = 0;
        let endTime = 0;
        let remainingTimeMs = 0;
        let isRunning = false;
        let isPaused = false; 
        let isAlarmPlaying = false;
        let lastBeepSecond = -1; 
        
        const controlsDiv = document.getElementById('controls');
        const activeControlsDiv = document.getElementById('active-controls');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const pauseBtn = document.getElementById('pause-btn'); 
        const stdTimeDisplay = document.getElementById('std-time');

        // 新增的模式相關變數
        let currentMode = 'duration'; // 'duration' 或是 'target'
        const btnModeDuration = document.getElementById('btn-mode-duration');
        const btnModeTarget = document.getElementById('btn-mode-target');
        const groupDuration = document.getElementById('group-duration');
        const groupTarget = document.getElementById('group-target');
        const targetTimeInput = document.getElementById('target-time-in');
        
        let audioCtx;
        let oscillator;
        let gainNode;

        // 初始化指定時間的預設值 (預設為現在時間往後推 5 分鐘)
        function initTargetTimeDefault() {
            const now = new Date();
            now.setMinutes(now.getMinutes() + 5);
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            targetTimeInput.value = `${hh}:${mm}`;
        }
        initTargetTimeDefault();

        // 處理模式切換邏輯
        btnModeDuration.addEventListener('click', () => {
            currentMode = 'duration';
            btnModeDuration.classList.add('active');
            btnModeTarget.classList.remove('active');
            groupDuration.style.display = 'flex';
            groupTarget.style.display = 'none';
        });

        btnModeTarget.addEventListener('click', () => {
            currentMode = 'target';
            btnModeTarget.classList.add('active');
            btnModeDuration.classList.remove('active');
            groupDuration.style.display = 'none';
            groupTarget.style.display = 'flex';
        });

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            minDim = Math.min(width, height);
            centerX = width / 2;
            centerY = height * 0.5; 
        }
        window.addEventListener('resize', resize);
        resize();

        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message}`);
                });
                fsBtn.textContent = "⛶ 退出全螢幕";
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                    fsBtn.textContent = "⛶ 全螢幕";
                }
            }
        });

        document.addEventListener('fullscreenchange', () => {
             if (!document.fullscreenElement) {
                fsBtn.textContent = "⛶ 全螢幕";
             } else {
                fsBtn.textContent = "⛶ 退出全螢幕";
             }
        });

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 1; 
                this.vy = (Math.random() - 0.5) * 1; 
                this.radius = Math.random() * 2 + 0.5;
                this.color = Math.random() > 0.8 ? '#ff0055' : '#00f0ff'; 
                this.alpha = Math.random() * 0.5 + 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function formatTime(ms) {
            if (ms < 0) ms = 0;
            const totalSec = Math.ceil(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function drawTimerRing(percent) {
            const radius = minDim * 0.42; 
            const startAngle = -Math.PI / 2; 
            const endAngle = startAngle + (Math.PI * 2 * percent);
            
            let color = '#00f0ff'; 
            let glow = 20;
            
            if (isPaused) {
                color = '#ffcc00';
                glow = 15;
            } 
            else if (percent < 0.1 || remainingTimeMs < 10000) {
                const flicker = Math.sin(Date.now() / 100) * 0.5 + 0.5;
                color = `rgba(255, 0, 85, ${0.8 + flicker * 0.2})`;
                glow = 30 + flicker * 20;
            }
            else if (remainingTimeMs <= 30000) {
                color = '#ffb700'; 
                glow = 25;
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 15;
            ctx.stroke();

            if (percent > 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, startAngle, endAngle, false);
                ctx.strokeStyle = color;
                ctx.lineWidth = 15;
                ctx.lineCap = 'round';
                ctx.shadowBlur = glow;
                ctx.shadowColor = color;
                ctx.stroke();
                ctx.shadowBlur = 0;

                const headX = centerX + radius * Math.cos(endAngle);
                const headY = centerY + radius * Math.sin(endAngle);
                ctx.beginPath();
                ctx.arc(headX, headY, 12, 0, Math.PI * 2);
                ctx.fillStyle = isPaused ? '#ffcc00' : '#fff'; 
                ctx.shadowBlur = 40;
                ctx.shadowColor = color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            const fontSize = minDim * 0.18; 
            
            ctx.fillStyle = color;
            ctx.font = `bold ${fontSize}px "Share Tech Mono"`; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 15;
            ctx.shadowColor = color;
            
            // 決定畫面上要顯示的預覽時間
            let displayMs = 0;
            if (isRunning) {
                displayMs = remainingTimeMs;
            } else if (!isRunning && remainingTimeMs === 0 && totalTimeMs > 0) {
                displayMs = 0; // 剛結束時保持 0
            } else {
                displayMs = getPreviewMs(); // 從選單動態讀取當前設定的時間
            }
            
            ctx.fillText(formatTime(displayMs), centerX, centerY);
            
            const msFontSize = fontSize * 0.4; 
            const msOffset = fontSize * 0.75;  
            
            if (isPaused) {
                ctx.font = `${msFontSize * 0.8}px "Share Tech Mono"`;
                ctx.fillText("PAUSED", centerX, centerY + msOffset);
            } else if (isRunning && displayMs > 0) {
                 const msPart = Math.floor((displayMs % 1000) / 10);
                 ctx.font = `${msFontSize}px "Share Tech Mono"`; 
                 ctx.fillText(`.${msPart.toString().padStart(2, '0')}`, centerX, centerY + msOffset); 
            }
            ctx.shadowBlur = 0;
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 7, 10, 0.25)'; 
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            let percent = 1;
            
            if (isRunning) {
                if (!isPaused) {
                    const now = Date.now();
                    remainingTimeMs = endTime - now;

                    if (remainingTimeMs > 0 && remainingTimeMs <= 10000) {
                        const sec = Math.ceil(remainingTimeMs / 1000);
                        if (sec !== lastBeepSecond) {
                            playTick();
                            lastBeepSecond = sec;
                        }
                    }
                }
                
                if (remainingTimeMs <= 0) {
                    remainingTimeMs = 0;
                    percent = 0;
                    timerFinished();
                } else {
                    percent = remainingTimeMs / totalTimeMs;
                }
            } else if (remainingTimeMs === 0 && totalTimeMs > 0) {
                percent = 0;
            } else {
                percent = 1;
            }

            drawTimerRing(percent);

            animationId = requestAnimationFrame(animate);
        }

        // --- 邏輯函數 ---

        // 讀取設定的時間差 (毫秒)
        function getPreviewMs() {
            if (currentMode === 'duration') {
                const h = parseInt(document.getElementById('h-in').value) || 0;
                const m = parseInt(document.getElementById('m-in').value) || 0;
                const s = parseInt(document.getElementById('s-in').value) || 0;
                return (h * 3600 + m * 60 + s) * 1000;
            } else {
                // 指定時間模式，計算與當前時間的差值
                const timeStr = targetTimeInput.value;
                if (!timeStr) return 0;
                
                const now = new Date();
                const [hours, minutes] = timeStr.split(':').map(Number);
                const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), hours, minutes, 0); // 將秒歸零以對準整分
                
                // 如果設定的時間比現在還早，代表是要倒數到明天的這個時間
                if (target.getTime() <= now.getTime()) {
                    target.setDate(target.getDate() + 1);
                }
                
                return target.getTime() - now.getTime();
            }
        }

        function startTimer() {
            const ms = getPreviewMs();
            if (ms <= 0) return;

            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }

            totalTimeMs = ms;
            endTime = Date.now() + ms;
            isRunning = true;
            isPaused = false;
            isAlarmPlaying = false;
            lastBeepSecond = -1; 
            
            pauseBtn.textContent = "暫停 (PAUSE)";

            controlsDiv.style.display = 'none';
            activeControlsDiv.style.display = 'flex'; 
        }

        function togglePause() {
            if (!isRunning) return;

            if (isPaused) {
                endTime = Date.now() + remainingTimeMs;
                isPaused = false;
                pauseBtn.textContent = "暫停 (PAUSE)";
            } else {
                isPaused = true;
                pauseBtn.textContent = "繼續 (RESUME)";
                if (isAlarmPlaying) stopAlarm();
            }
        }

        function stopTimer() {
            isRunning = false;
            isPaused = false;
            remainingTimeMs = 0; 
            stopAlarm();
            
            controlsDiv.style.display = 'block';
            activeControlsDiv.style.display = 'none';
        }

        function timerFinished() {
            isRunning = false;
            if (!isAlarmPlaying) {
                playAlarm();
            }
        }

        function playTick() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 0.1);

            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playAlarm() {
            if (!audioCtx) return;
            isAlarmPlaying = true;
            
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.5);
            oscillator.frequency.linearRampToValueAtTime(440, audioCtx.currentTime + 1.0);

            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            
            const pulse = setInterval(() => {
                if(!isAlarmPlaying) {
                    clearInterval(pulse);
                    return;
                }
                if(audioCtx.state === 'suspended') audioCtx.resume();
                
                const now = audioCtx.currentTime;
                oscillator.frequency.setValueAtTime(880, now);
                oscillator.frequency.exponentialRampToValueAtTime(440, now + 0.4);
            }, 1000);
        }

        function stopAlarm() {
            if (oscillator) {
                try {
                    oscillator.stop();
                    oscillator.disconnect();
                } catch(e) {}
                oscillator = null;
            }
            isAlarmPlaying = false;
        }

        function updateStandardTime() {
            const now = new Date();
            const timeString = new Intl.DateTimeFormat('zh-TW', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false,
                timeZone: 'Asia/Taipei'
            }).format(now);
            
            stdTimeDisplay.textContent = timeString;
        }

        startBtn.addEventListener('click', startTimer);
        stopBtn.addEventListener('click', stopTimer);
        pauseBtn.addEventListener('click', togglePause);

        setInterval(updateStandardTime, 1000); 
        updateStandardTime(); 
        animate(); 

    </script>
</body>
</html>
