<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>克卜勒第二定律 - 等面積定律模擬</title>
    <!-- 引入 Tailwind CSS 作為 UI 框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a; /* 深藍色宇宙背景 */
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* 自訂滑桿樣式 */
        input[type=range] {
            accent-color: #3b82f6;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex h-screen flex-col md:flex-row">

    <!-- 左側控制面板 -->
    <aside class="glass-panel w-full md:w-80 h-auto md:h-full z-10 flex flex-col p-6 shadow-2xl overflow-y-auto">
        <h1 class="text-2xl font-bold text-white mb-2 tracking-wide text-blue-400">克卜勒第二定律</h1>
        <p class="text-sm text-slate-400 mb-6">等面積定律互動模擬</p>

        <!-- 控制滑桿區 -->
        <div class="space-y-6">
            <!-- 遠/近日距比 -->
            <div>
                <label class="flex justify-between text-sm font-medium mb-2">
                    <span>遠日距 / 近日距比值</span>
                    <span id="ratioVal" class="text-blue-400 font-bold">3.0</span>
                </label>
                <input type="range" id="ratioSlider" min="1.0" max="10.0" step="0.1" value="3.0" class="w-full">
                <div class="flex justify-between text-xs text-slate-500 mt-1">
                    <span>1.0 (圓)</span>
                    <span>10.0 (扁長)</span>
                </div>
            </div>

            <!-- 動畫速度 -->
            <div>
                <label class="flex justify-between text-sm font-medium mb-2">
                    <span>動畫時間流速</span>
                    <span id="speedVal" class="text-blue-400 font-bold">1.0x</span>
                </label>
                <input type="range" id="speedSlider" min="0.0" max="3.0" step="0.1" value="1.0" class="w-full">
            </div>

            <!-- 等時區域數量 -->
            <div>
                <label class="flex justify-between text-sm font-medium mb-2">
                    <span>等時間隔數量</span>
                    <span id="sectorsVal" class="text-blue-400 font-bold">12</span>
                </label>
                <input type="range" id="sectorsSlider" min="4" max="24" step="2" value="12" class="w-full">
            </div>
        </div>

        <hr class="border-slate-700 my-6">

        <!-- 顯示切換區 -->
        <div class="space-y-4">
            <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" id="showAreas" checked class="w-5 h-5 rounded accent-blue-500 bg-slate-800 border-slate-600">
                <span class="text-sm font-medium">顯示等時掃掠面積</span>
            </label>
            <label class="flex items-center space-x-3 cursor-pointer">
                <input type="checkbox" id="showVelocity" checked class="w-5 h-5 rounded accent-blue-500 bg-slate-800 border-slate-600">
                <span class="text-sm font-medium">顯示瞬時速度向量</span>
            </label>
        </div>

        <hr class="border-slate-700 my-6">

        <!-- 即時物理數據顯示 -->
        <div class="bg-slate-800/50 rounded-lg p-4 border border-slate-700 space-y-3">
            <h3 class="text-sm font-semibold text-white mb-2">即時物理數據</h3>
            <div class="flex justify-between text-sm">
                <span class="text-slate-400">軌道離心率 (e)</span>
                <span id="eccentricityData" class="font-mono text-emerald-400">0.500</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-slate-400">距離太陽 (r)</span>
                <span id="distanceData" class="font-mono text-yellow-400">0.00</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-slate-400">瞬時速率 (v)</span>
                <span id="velocityData" class="font-mono text-red-400">0.00</span>
            </div>
            <div class="flex justify-between text-sm mt-2 pt-2 border-t border-slate-700">
                <span class="text-slate-300 font-medium">面積掃掠速率 (dA/dt)</span>
                <span id="arealVelocityData" class="font-mono font-bold text-blue-300">0.00</span>
            </div>
        </div>

        <!-- 播放控制鈕 -->
        <button id="playPauseBtn" class="mt-auto bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center shadow-lg">
            暫停動畫
        </button>
    </aside>

    <!-- 右側畫布區 -->
    <main class="flex-1 relative">
        <canvas id="simCanvas"></canvas>
    </main>

    <!-- 物理與渲染邏輯 -->
    <script>
        // --- 核心變數與元素參考 ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        // UI 元素
        const ratioSlider = document.getElementById('ratioSlider');
        const ratioVal = document.getElementById('ratioVal');
        const speedSlider = document.getElementById('speedSlider');
        const speedVal = document.getElementById('speedVal');
        const sectorsSlider = document.getElementById('sectorsSlider');
        const sectorsVal = document.getElementById('sectorsVal');
        const showAreasCheck = document.getElementById('showAreas');
        const showVelocityCheck = document.getElementById('showVelocity');
        const playPauseBtn = document.getElementById('playPauseBtn');

        // 數據顯示元素
        const eccentricityData = document.getElementById('eccentricityData');
        const distanceData = document.getElementById('distanceData');
        const velocityData = document.getElementById('velocityData');
        const arealVelocityData = document.getElementById('arealVelocityData');

        // 物理與動畫狀態參數
        let isPlaying = true;
        let time = 0;           // 動畫時間
        let lastTime = 0;       // 前一次更新的真實時間
        const period = 10;      // 行星繞行一圈的週期 (秒)
        let a = 0;              // 半長軸 (畫面載入後依據螢幕尺寸計算)
        let stars = [];         // 背景星星陣列

        // 初始化畫布尺寸
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            // 根據畫面大小決定半長軸長度，預留一些邊界
            a = Math.min(canvas.width, canvas.height) * 0.35;
            initStars();
        }
        window.addEventListener('resize', resizeCanvas);

        // 初始化星空背景
        function initStars() {
            stars = [];
            const numStars = Math.floor((canvas.width * canvas.height) / 3000);
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5,
                    alpha: Math.random()
                });
            }
        }

        // 畫星空
        function drawStars() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let star of stars) {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                // 讓星星有閃爍效果
                star.alpha += (Math.random() - 0.5) * 0.05;
                if (star.alpha < 0.2) star.alpha = 0.2;
                if (star.alpha > 1) star.alpha = 1;
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.fill();
            }
        }

        // --- 核心物理運算 (Kepler's Equation) ---
        
        // 取得當前離心率 e
        function getEccentricity() {
            const ratio = parseFloat(ratioSlider.value); // r_a / r_p = (1+e) / (1-e)
            return (ratio - 1) / (ratio + 1);
        }

        // 使用牛頓法解克卜勒方程式: M = E - e*sin(E)
        function solveKepler(M, e) {
            let E = M; // 初始猜測值
            for (let i = 0; i < 10; i++) {
                const f = E - e * Math.sin(E) - M;
                const df = 1 - e * Math.cos(E);
                E = E - f / df;
            }
            return E;
        }

        // 繪製軌道與等時面積
        function drawOrbitAndAreas(cx, cy, e, b, numSectors) {
            // 繪製完整軌道線 (橢圓)
            ctx.beginPath();
            ctx.ellipse(cx, cy, a, b, 0, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 若開啟顯示等時面積
            if (showAreasCheck.checked) {
                const sunX = cx + a * e; // 太陽位於右側焦點
                const sunY = cy;
                
                for (let i = 0; i < numSectors; i++) {
                    const M_start = (i / numSectors) * 2 * Math.PI;
                    const M_end = ((i + 1) / numSectors) * 2 * Math.PI;
                    
                    ctx.beginPath();
                    ctx.moveTo(sunX, sunY);
                    
                    // 用多個小線段描繪弧線邊界以確保平滑
                    const steps = 20;
                    for (let j = 0; j <= steps; j++) {
                        const M = M_start + (M_end - M_start) * (j / steps);
                        const E = solveKepler(M, e);
                        // 本地坐標 (相對於橢圓中心)
                        const lx = a * Math.cos(E);
                        const ly = b * Math.sin(E);
                        ctx.lineTo(cx + lx, cy + ly);
                    }
                    ctx.closePath();

                    // 交替顏色
                    if (i % 2 === 0) {
                        ctx.fillStyle = 'rgba(59, 130, 246, 0.2)'; // 藍色
                    } else {
                        ctx.fillStyle = 'rgba(16, 185, 129, 0.15)'; // 綠色
                    }
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                    ctx.stroke();
                }
            }
        }

        // 繪製太陽
        function drawSun(x, y) {
            // 發光效果
            const gradient = ctx.createRadialGradient(x, y, 5, x, y, 40);
            gradient.addColorStop(0, 'rgba(255, 200, 50, 1)');
            gradient.addColorStop(0.3, 'rgba(255, 150, 0, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 100, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, 40, 0, Math.PI * 2);
            ctx.fill();

            // 實體
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI * 2);
            ctx.fill();
        }

        // 繪製行星
        function drawPlanet(x, y) {
            // 拖尾光暈
            const gradient = ctx.createRadialGradient(x, y, 2, x, y, 15);
            gradient.addColorStop(0, 'rgba(100, 200, 255, 1)');
            gradient.addColorStop(1, 'rgba(50, 100, 255, 0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, 15, 0, Math.PI * 2);
            ctx.fill();

            // 行星本體
            ctx.fillStyle = '#60a5fa'; // 淺藍
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        // 主動畫迴圈
        function animate(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const deltaTime = (timestamp - lastTime) / 1000; // 轉換為秒
            lastTime = timestamp;

            if (isPlaying) {
                const speed = parseFloat(speedSlider.value);
                time += deltaTime * speed;
            }

            // --- 物理運算 ---
            const e = getEccentricity();
            const b = a * Math.sqrt(1 - e * e); // 半短軸
            
            // 為了讓軌道完整顯示在中央，我們將橢圓中心放在畫布中央
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // 太陽在右側焦點
            const sunX = cx + a * e;
            const sunY = cy;

            // 計算平均近點角 M (Mean Anomaly)
            // n = 2*pi / T (平均角速度)
            const n = (2 * Math.PI) / period;
            const M = (n * time) % (2 * Math.PI);

            // 解出偏近點角 E (Eccentric Anomaly)
            const E = solveKepler(M, e);

            // 行星相對於橢圓中心的位置
            const localX = a * Math.cos(E);
            const localY = b * Math.sin(E);

            // 行星在畫布上的實際座標
            const planetX = cx + localX;
            const planetY = cy + localY;

            // --- 計算物理量顯示 ---
            // 1. 與太陽距離 r = a(1 - e*cos(E))
            const r = a * (1 - e * Math.cos(E));
            
            // 2. 速度向量
            // dE/dt = n / (1 - e*cos(E))
            const dE_dt = n / (1 - e * Math.cos(E));
            const vx = -a * Math.sin(E) * dE_dt;
            const vy = b * Math.cos(E) * dE_dt;
            const v = Math.sqrt(vx * vx + vy * vy);
            
            // 3. 面積掃掠速率 dA/dt = 1/2 * h
            // 角動量守恆量 h = n * a * b
            const h = n * a * b;
            const arealVelocity = 0.5 * h;

            // --- 繪圖 ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();
            
            drawOrbitAndAreas(cx, cy, e, b, parseInt(sectorsSlider.value));
            drawSun(sunX, sunY);
            
            // 繪製與太陽的連線
            ctx.beginPath();
            ctx.moveTo(sunX, sunY);
            ctx.lineTo(planetX, planetY);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.setLineDash([]); // 恢復實線

            // 繪製行星
            drawPlanet(planetX, planetY);

            // 繪製速度向量
            if (showVelocityCheck.checked) {
                const vectorScale = 1.5; // 縮放係數讓箭頭好看一點
                ctx.beginPath();
                ctx.moveTo(planetX, planetY);
                ctx.lineTo(planetX + vx * vectorScale, planetY + vy * vectorScale);
                ctx.strokeStyle = '#ef4444'; // 紅色
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 畫箭頭頭部
                const angle = Math.atan2(vy, vx);
                ctx.beginPath();
                ctx.moveTo(planetX + vx * vectorScale, planetY + vy * vectorScale);
                ctx.lineTo(
                    planetX + vx * vectorScale - 10 * Math.cos(angle - Math.PI / 6),
                    planetY + vy * vectorScale - 10 * Math.sin(angle - Math.PI / 6)
                );
                ctx.lineTo(
                    planetX + vx * vectorScale - 10 * Math.cos(angle + Math.PI / 6),
                    planetY + vy * vectorScale - 10 * Math.sin(angle + Math.PI / 6)
                );
                ctx.fillStyle = '#ef4444';
                ctx.fill();
            }

            // 更新 UI 數據顯示
            // 使用 a 作為參考基準來顯示相對值，比較好讀
            eccentricityData.innerText = e.toFixed(3);
            distanceData.innerText = (r / (a/100)).toFixed(1) + " 單位"; // 轉換成好讀的虛擬單位
            velocityData.innerText = (v / (a/100)).toFixed(2) + " 單位/秒";
            arealVelocityData.innerText = (arealVelocity / ((a*a)/10000)).toFixed(2) + " 單位面積/秒";

            requestAnimationFrame(animate);
        }

        // --- 事件監聽綁定 ---
        ratioSlider.addEventListener('input', (e) => {
            ratioVal.innerText = parseFloat(e.target.value).toFixed(1);
        });

        speedSlider.addEventListener('input', (e) => {
            speedVal.innerText = parseFloat(e.target.value).toFixed(1) + 'x';
        });

        sectorsSlider.addEventListener('input', (e) => {
            sectorsVal.innerText = e.target.value;
        });

        playPauseBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playPauseBtn.innerText = '暫停動畫';
                playPauseBtn.className = 'mt-auto bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center shadow-lg';
            } else {
                playPauseBtn.innerText = '播放動畫';
                playPauseBtn.className = 'mt-auto bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center shadow-lg';
            }
        });

        // 初始化並啟動
        resizeCanvas();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
