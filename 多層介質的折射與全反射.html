<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多層介質的折射與全反射模擬</title>
    <style>
        :root {
            --bg-color: #1e1e1e;
            --panel-bg: #2d2d2d;
            --text-color: #f0f0f0;
            --primary-color: #4CAF50;
            --primary-hover: #45a049;
            --danger-color: #ff4d4d;
            --border-color: #444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* Sidebar Controls */
        .sidebar {
            width: 320px;
            min-width: 320px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        header p {
            color: yellow;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .control-group {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .control-group label span {
            color: var(--primary-color);
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #555;
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
        }
        input[type=range]::-moz-range-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #555;
            border-radius: 3px;
        }
        input[type=range]::-moz-range-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            border: none;
        }

        .layers-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .section-header h2 {
            font-size: 1rem;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        #layers-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* Scrollbar styles */
        #layers-container::-webkit-scrollbar {
            width: 8px;
        }
        #layers-container::-webkit-scrollbar-track {
            background: var(--panel-bg); 
        }
        #layers-container::-webkit-scrollbar-thumb {
            background: #666; 
            border-radius: 4px;
        }
        #layers-container::-webkit-scrollbar-thumb:hover {
            background: #888; 
        }

        /* Layer Items & Drag and Drop Styles */
        .layer-item {
            background-color: #383838;
            border-radius: 6px;
            padding: 10px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.2s, background-color 0.2s;
            border: 1px solid transparent;
        }

        .layer-item:hover {
            border-color: #555;
        }

        .layer-item.dragging {
            opacity: 0.5;
            background-color: #222;
            border: 1px dashed var(--text-color);
        }

        .layer-item.drag-over {
            border: 1px dashed var(--primary-color);
            background-color: rgba(76, 175, 80, 0.1);
        }

        .drag-handle {
            cursor: grab;
            color: #888;
            font-size: 1.2rem;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px; /* 增加感應區域 */
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .layer-color-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: white;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .layer-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .layer-controls-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }

        .icon-btn:hover {
            color: var(--danger-color);
            background-color: rgba(255, 77, 77, 0.1);
        }

        .footer-info {
            padding: 15px 20px;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid var(--border-color);
            line-height: 1.4;
        }

        /* Main Simulation Area */
        .simulation-area {
            flex: 1;
            position: relative;
            background-color: #000;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Controls -->
        <aside class="sidebar">
            <header>
                <h1>光學折射模擬</h1>
                <p>多層介質的折射與全反射</p>
            </header>

            <div class="control-group">
                <label for="incident-angle">入射角 (度): <span id="angle-val">29.2</span>°</label>
                <input type="range" id="incident-angle" min="0" max="89.9" step="0.1" value="29.2">
            </div>

            <div class="layers-section">
                <div class="section-header">
                    <h2>介質層 (由上到下)</h2>
                    <button id="add-layer-btn" class="btn primary-btn">+ 新增介質</button>
                </div>
                <div id="layers-container">
                    <!-- Layers will be populated here by JS -->
                </div>
            </div>
            
            <div class="footer-info">
                光從高折射率進入低折射率且大於臨界角時，將產生全反射。
                <br><br>
                💡 提示：按住左側 ☰ 符號可拖曳對調介質順序。
            </div>
        </aside>

        <!-- Main Simulation Area -->
        <main class="simulation-area">
            <canvas id="sim-canvas"></canvas>
        </main>
    </div>
    
    <!-- Template for a layer item -->
    <!-- 移除了預設的 draggable="true"，改為透過 JS 動態設定 -->
    <template id="layer-template">
        <div class="layer-item">
            <div class="drag-handle" title="拖曳以排序">☰</div>
            <div class="layer-color-indicator"></div>
            <div class="layer-controls">
                <div class="layer-controls-header">
                    <label>折射率 <i>n</i> =</label>
                    <span class="n-val-display">1.00</span>
                </div>
                <input type="range" class="layer-n-range" min="1.0" max="3.0" step="0.01" value="1.0">
            </div>
            <button class="icon-btn remove-layer-btn" title="刪除此介質">×</button>
        </div>
    </template>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const canvas = document.getElementById('sim-canvas');
            const ctx = canvas.getContext('2d');
            const layersContainer = document.getElementById('layers-container');
            const layerTemplate = document.getElementById('layer-template');
            const addLayerBtn = document.getElementById('add-layer-btn');
            const incidentAngleSlider = document.getElementById('incident-angle');
            const angleValDisplay = document.getElementById('angle-val');

            let draggedLayerIndex = null;

            // 初始狀態對應截圖
            let layers = [
                { id: generateId(), n: 1.80 },
                { id: generateId(), n: 1.27 },
                { id: generateId(), n: 1.60 },
                { id: generateId(), n: 1.40 },
                { id: generateId(), n: 1.00 },
                { id: generateId(), n: 1.52 },
                { id: generateId(), n: 1.00 }
            ];

            let incidentAngle = parseFloat(incidentAngleSlider.value);

            // Utils
            function generateId() {
                return Math.random().toString(36).substr(2, 9);
            }

            // 顏色對映函數 (漸進改變顏色)
            function getLayerColor(n) {
                let hue = 220 - ((n - 1.0) * 100); 
                return `hsl(${hue}, 35%, 55%)`;
            }

            function resizeCanvas() {
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.parentElement.getBoundingClientRect();
                
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                
                ctx.scale(dpr, dpr);
                canvas.style.width = `${rect.width}px`;
                canvas.style.height = `${rect.height}px`;
                
                draw();
            }

            window.addEventListener('resize', resizeCanvas);

            // UI 更新
            function renderLayersList() {
                layersContainer.innerHTML = '';
                layers.forEach((layer, index) => {
                    const clone = layerTemplate.content.cloneNode(true);
                    const layerItem = clone.querySelector('.layer-item');
                    const dragHandle = clone.querySelector('.drag-handle');
                    const colorIndicator = clone.querySelector('.layer-color-indicator');
                    const rangeInput = clone.querySelector('.layer-n-range');
                    const valDisplay = clone.querySelector('.n-val-display');
                    const removeBtn = clone.querySelector('.remove-layer-btn');

                    // Set initial values
                    rangeInput.value = layer.n;
                    valDisplay.textContent = layer.n.toFixed(2);
                    colorIndicator.style.backgroundColor = getLayerColor(layer.n);
                    
                    // --- 拖曳把手專用事件 --- 
                    // 只有滑鼠停留在把手上時，才允許整個 div 拖曳
                    dragHandle.addEventListener('mouseenter', () => {
                        layerItem.setAttribute('draggable', 'true');
                    });
                    dragHandle.addEventListener('mouseleave', () => {
                        layerItem.removeAttribute('draggable');
                    });
                    // 支援觸控螢幕
                    dragHandle.addEventListener('touchstart', () => {
                        layerItem.setAttribute('draggable', 'true');
                    }, { passive: true });
                    dragHandle.addEventListener('touchend', () => {
                        layerItem.removeAttribute('draggable');
                    }, { passive: true });


                    // 拖曳相關事件
                    layerItem.addEventListener('dragstart', (e) => {
                        draggedLayerIndex = index;
                        e.dataTransfer.effectAllowed = 'move';
                        // 稍微延遲加上 dragging 樣式，避免原物件消失
                        setTimeout(() => layerItem.classList.add('dragging'), 0);
                    });

                    layerItem.addEventListener('dragend', () => {
                        layerItem.classList.remove('dragging');
                        draggedLayerIndex = null;
                    });

                    layerItem.addEventListener('dragover', (e) => {
                        e.preventDefault(); // 必須加上這個才能觸發 drop
                        e.dataTransfer.dropEffect = 'move';
                        layerItem.classList.add('drag-over');
                    });

                    layerItem.addEventListener('dragleave', () => {
                        layerItem.classList.remove('drag-over');
                    });

                    layerItem.addEventListener('drop', (e) => {
                        e.preventDefault();
                        layerItem.classList.remove('drag-over');
                        const droppedLayerIndex = index;

                        if (draggedLayerIndex !== null && draggedLayerIndex !== droppedLayerIndex) {
                            // 更新陣列順序
                            const movedLayer = layers.splice(draggedLayerIndex, 1)[0];
                            layers.splice(droppedLayerIndex, 0, movedLayer);
                            
                            // 重新渲染畫面
                            renderLayersList();
                            draw();
                        }
                    });

                    // 數值變更事件
                    rangeInput.addEventListener('input', (e) => {
                        const val = parseFloat(e.target.value);
                        layer.n = val;
                        valDisplay.textContent = val.toFixed(2);
                        colorIndicator.style.backgroundColor = getLayerColor(val);
                        draw();
                    });

                    // 刪除按鈕
                    removeBtn.addEventListener('click', () => {
                        if (layers.length > 1) {
                            layers.splice(index, 1);
                            renderLayersList();
                            draw();
                        }
                    });

                    layersContainer.appendChild(layerItem);
                });
            }

            addLayerBtn.addEventListener('click', () => {
                layers.push({ id: generateId(), n: 1.5 });
                renderLayersList();
                draw();
            });

            incidentAngleSlider.addEventListener('input', (e) => {
                incidentAngle = parseFloat(e.target.value);
                angleValDisplay.textContent = incidentAngle.toFixed(1);
                draw();
            });

            // 繪圖核心物理邏輯
            function draw() {
                const width = canvas.width / (window.devicePixelRatio || 1);
                const height = canvas.height / (window.devicePixelRatio || 1);
                
                ctx.clearRect(0, 0, width, height);
                
                if (layers.length === 0) return;

                const layerHeight = height / layers.length;

                // 1. 繪製介質背景與分隔線
                layers.forEach((layer, index) => {
                    const y = index * layerHeight;
                    
                    // 背景顏色
                    ctx.fillStyle = getLayerColor(layer.n);
                    ctx.fillRect(0, y, width, layerHeight);

                    // 折射率文字 (顯示在右側) - 字體放大三倍 (16px * 3 = 48px)
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.font = 'italic 48px "Times New Roman", serif';
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'middle'; // 垂直置中對齊，讓字體變大也不會跑掉
                    ctx.fillText(`n=${layer.n.toFixed(2)}`, width * 0.7, y + layerHeight / 2);

                    // 分隔線
                    if (index > 0) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(width, y);
                        ctx.strokeStyle = 'rgba(0,0,0,0.2)';
                        ctx.setLineDash([]);
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                });

                // 2. 光線追蹤演算法
                let currentX = width * 0.10; 
                let currentY = 0;
                let currentAngle = incidentAngle * Math.PI / 180;
                let currentLayerIdx = 0;
                let directionY = 1; 
                
                const maxBounces = 50; 
                let bounces = 0;

                ctx.beginPath();
                ctx.moveTo(currentX, currentY);
                ctx.strokeStyle = '#FFFF00'; 
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                const normalsToDraw = []; 

                while (currentX >= 0 && currentX <= width && currentY >= 0 && currentY <= height && bounces < maxBounces) {
                    if (currentLayerIdx < 0 || currentLayerIdx >= layers.length) break;

                    const layerTopY = currentLayerIdx * layerHeight;
                    const layerBottomY = (currentLayerIdx + 1) * layerHeight;
                    
                    let targetY = directionY === 1 ? layerBottomY : layerTopY;
                    let dy = targetY - currentY;
                    let dx = Math.abs(dy) * Math.tan(currentAngle); 
                    
                    let nextX = currentX + dx;

                    ctx.lineTo(nextX, targetY);
                    
                    if (targetY !== 0 && targetY !== height) {
                        normalsToDraw.push({x: nextX, y: targetY});
                    }

                    let nextLayerIdx = currentLayerIdx + directionY;
                    
                    if (nextLayerIdx >= 0 && nextLayerIdx < layers.length) {
                        let n1 = layers[currentLayerIdx].n;
                        let n2 = layers[nextLayerIdx].n;

                        let sinT2 = (n1 / n2) * Math.sin(currentAngle);

                        if (sinT2 > 1.0 || sinT2 < -1.0) {
                            directionY *= -1; 
                            bounces++;
                        } else {
                            currentAngle = Math.asin(sinT2);
                            currentLayerIdx = nextLayerIdx; 
                        }
                    } else {
                        break;
                    }

                    currentX = nextX;
                    currentY = targetY;
                }
                
                ctx.stroke();

                // 3. 畫出交界處的法線 (虛線)
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                
                normalsToDraw.forEach(pt => {
                    ctx.beginPath();
                    ctx.moveTo(pt.x, pt.y - 40);
                    ctx.lineTo(pt.x, pt.y + 40);
                    ctx.stroke();
                });
                ctx.setLineDash([]); 
            }

            // Init
            renderLayersList();
            resizeCanvas(); 
        });
    </script>
</body>
</html>
