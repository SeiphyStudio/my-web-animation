<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂共同評分系統 v4.5 (師生分流版)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 xlsx-js-style (支援樣式匯出) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    
    <!-- 引入 Firebase Compat Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #aaa; }
        #global-error-box { display: none; position: fixed; top: 0; left: 0; width: 100%; padding: 20px; background: #fee2e2; color: #b91c1c; z-index: 9999; border-bottom: 2px solid #ef4444; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="global-error-box">
        <h3 class="font-bold text-lg">⚠️ 發生錯誤</h3>
        <pre id="global-error-msg" class="mt-2 text-sm whitespace-pre-wrap"></pre>
        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">重新整理</button>
    </div>
    <div id="root"></div>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('global-error-box').style.display = 'block';
            document.getElementById('global-error-msg').innerText = `錯誤: ${msg}\n位置: ${line}:${col}`;
            return false;
        };
    </script>

    <script type="text/babel">
        // --- 1. Firebase Config & Init ---
        const firebaseConfig = {
           apiKey: "AIzaSyAmqdU3AimELr5sa9FIFd_eb5zbM0nCFkI",
           authDomain: "evaluate-each-other-5d4bf.firebaseapp.com",
           projectId: "evaluate-each-other-5d4bf",
           storageBucket: "evaluate-each-other-5d4bf.firebasestorage.app",
           messagingSenderId: "323924183931",
           appId: "1:323924183931:web:945c1feceaa4593d000bde",
           measurementId: "G-GBZKXN3H26"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- 預設評分項目 ---
        const DEFAULT_CRITERIA = [
            { id: 'c1', name: '內容深度', max: 10 },
            { id: 'c2', name: '表達技巧', max: 10 },
            { id: 'c3', name: '投影片設計', max: 10 },
            { id: 'c4', name: '團隊合作', max: 10 },
            { id: 'c5', name: '時間控制', max: 10 },
        ];

        // --- 2. Icons 圖示 ---
        const Icons = {
            Award: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            BarChart3: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Key: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
            Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
            Link: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        };

        // --- 3. Main App ---
        function App() {
            // 解析網址列參數 ?room=XXX 來決定是否為學生模式
            const urlParams = new URLSearchParams(window.location.search);
            const initialRoom = urlParams.get('room');
            const isStudentMode = !!initialRoom;

            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            
            // 系統狀態
            const [currentRoom, setCurrentRoom] = React.useState(initialRoom);
            const [role, setRole] = React.useState(null); // 'teacher' 或 'student'
            const [sessionData, setSessionData] = React.useState(null);
            
            // 登入表單狀態 (僅老師需要)
            const [inputRoomName, setInputRoomName] = React.useState('');
            const [inputPassword, setInputPassword] = React.useState('');
            const [errorMsg, setErrorMsg] = React.useState(null);
            const [isLoggingIn, setIsLoggingIn] = React.useState(false);

            // App 載入時，監聽登入狀態
            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    if (isStudentMode) {
                        // 學生模式：必須是使用 Google (非匿名) 登入
                        if (u && !u.isAnonymous) {
                            setUser(u);
                        } else {
                            setUser(null);
                        }
                    } else {
                        // 老師模式：接收所有登入狀態 (包含匿名)
                        setUser(u);
                    }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [isStudentMode]);

            // 當學生登入 Google 後，驗證該教室是否存在
            React.useEffect(() => {
                let isMounted = true;
                if (isStudentMode && user && !user.isAnonymous && !role && currentRoom) {
                    db.collection('sessions').doc(currentRoom).get().then(docSnap => {
                        if (!isMounted) return;
                        if (docSnap.exists) {
                            setRole('student');
                            setErrorMsg(null);
                        } else {
                            setErrorMsg(`找不到名為「${currentRoom}」的教室，請確認老師提供的連結是否正確！`);
                            // 找不到教室則登出，以免卡在錯誤狀態
                            auth.signOut();
                        }
                    }).catch(e => {
                        if (isMounted) setErrorMsg("連線錯誤: " + e.message);
                    });
                }
                return () => { isMounted = false; };
            }, [isStudentMode, user, role, currentRoom]);

            // 監聽特定房間 (currentRoom) 的資料變化
            React.useEffect(() => {
                if (!currentRoom || !role) return;
                
                const unsub = db.collection('sessions').doc(currentRoom).onSnapshot(docSnap => {
                    if (docSnap.exists) {
                        setSessionData(docSnap.data());
                    }
                }, err => {
                    console.error("監聽房間資料失敗", err);
                });
                return () => unsub();
            }, [currentRoom, role]);

            // --- 老師登入/建立房間邏輯 ---
            const handleTeacherAuth = async () => {
                if (!inputRoomName.trim() || !inputPassword.trim()) {
                    setErrorMsg("請輸入班級代號或暱稱與管理密碼！");
                    return;
                }
                setIsLoggingIn(true);
                setErrorMsg(null);
                
                try {
                    // 若尚未登入，先以匿名方式取得資料庫讀寫權限
                    if (!user) {
                        try {
                            await auth.signInAnonymously();
                        } catch (authErr) {
                            if (authErr.code === 'auth/admin-restricted-operation') {
                                throw new Error("Firebase 安全設定阻擋：請至 Firebase 控制台 -> Authentication -> Settings -> User actions，將「Enable create (sign-up)」打勾開啟。");
                            } else if (authErr.code === 'auth/operation-not-allowed') {
                                throw new Error("Firebase 尚未啟用匿名登入：請至 Firebase 控制台 -> Authentication -> Sign-in method，啟用「Anonymous (匿名)」。");
                            } else {
                                throw authErr;
                            }
                        }
                    }
                    
                    const roomID = inputRoomName.trim();
                    const roomRef = db.collection('sessions').doc(roomID);
                    const docSnap = await roomRef.get();

                    if (docSnap.exists) {
                        // 房間已存在，檢查密碼
                        if (docSnap.data().roomPassword !== inputPassword) {
                            throw new Error("密碼錯誤！這間教室屬於其他老師，或者您輸入了錯誤的密碼。");
                        }
                    } else {
                        // 房間不存在，自動建立新的
                        const initialData = {
                            roomPassword: inputPassword,
                            status: 'setup',
                            currentGroupId: null,
                            showResults: false,
                            criteria: DEFAULT_CRITERIA,
                            groups: [],
                            students: [],
                            studentMappings: {}, 
                            onlineStudents: {}, // 新增：用來記錄即時上線狀態
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        };
                        await roomRef.set(initialData);
                    }
                    
                    setCurrentRoom(roomID);
                    setRole('teacher');
                } catch (e) {
                    setErrorMsg(e.message);
                } finally {
                    setIsLoggingIn(false);
                }
            };

            // --- 學生 Google 登入處理 ---
            const handleGoogleLogin = async () => {
                try {
                    setErrorMsg(null);
                    setLoading(true);
                    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                    // 登入成功後，上方 useEffect 會自動進行教室驗證
                } catch (e) {
                    if (e.code === 'auth/unauthorized-domain') {
                        setErrorMsg(`網域未授權！請新增此網址到 Firebase Console: ${window.location.hostname}`);
                    } else {
                        setErrorMsg(`登入錯誤: ${e.message}`);
                    }
                    setLoading(false);
                }
            };

            const handleLogout = async () => {
                // 如果是學生登出，僅移除「即時上線狀態」，保留「身分綁定紀錄(studentMappings)」防弊
                if (role === 'student' && user && currentRoom) {
                    try {
                        const update = {};
                        update[`onlineStudents.${user.uid}`] = firebase.firestore.FieldValue.delete();
                        await db.collection('sessions').doc(currentRoom).update(update);
                    } catch (error) {
                        console.error("清除學生上線狀態失敗:", error);
                    }
                }

                auth.signOut();
                if (isStudentMode) {
                    setUser(null);
                    setRole(null);
                    setSessionData(null);
                } else {
                    window.location.reload(); // 老師直接重整畫面最乾淨
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center font-bold text-gray-500">載入系統中...</div>;

            // --- 學生專屬登入畫面 (網址帶有 ?room 參數) ---
            if (isStudentMode && !role) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md animate-fade-in text-center border-t-4 border-indigo-500">
                            <div className="flex justify-center text-indigo-600 mb-4 scale-125">
                                <Icons.Users />
                            </div>
                            <h1 className="text-xl font-bold mb-2 text-gray-800">準備進入教室</h1>
                            <h2 className="text-2xl font-black text-indigo-700 mb-4">{currentRoom}</h2>
                            <p className="text-gray-500 mb-6 text-sm">為了確保評分公平性，請使用您的 Google 帳號登入</p>
                            
                            {errorMsg && (
                                <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm flex items-start gap-2 mb-4 text-left border border-red-100">
                                    <div className="mt-0.5"><Icons.X /></div>
                                    {errorMsg}
                                </div>
                            )}

                            <button onClick={handleGoogleLogin} className="w-full py-4 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 flex items-center justify-center gap-2 font-bold transition shadow-lg active:scale-95">
                                <Icons.User /> Google 帳號登入
                            </button>
                        </div>
                    </div>
                );
            }

            // --- 老師專屬登入畫面 (網址沒有 ?room 參數) ---
            if (!isStudentMode && !role) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-gray-200 p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md animate-fade-in border-t-4 border-blue-600">
                            <div className="flex justify-center text-blue-600 mb-4">
                                <Icons.Key />
                            </div>
                            <h1 className="text-3xl font-black text-center mb-2 text-blue-600">學生共同評分系統</h1>
                            <p className="text-blue-600 font-bold text-center mb-6 text-lg">台中二中 阿發老師設計</p>
                            <h2 className="text-xl font-bold text-center mb-8 text-gray-700">資料設定控制台</h2>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">請輸入班級代號或暱稱</label>
                                    <input 
                                        type="text" 
                                        value={inputRoomName} 
                                        onChange={e => setInputRoomName(e.target.value)} 
                                        className="w-full border-2 border-gray-200 p-3 rounded-lg focus:outline-none focus:border-gray-800 transition-colors" 
                                        placeholder="例如：台中二中 101" 
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-1">管理密碼</label>
                                    <input 
                                        type="password" 
                                        value={inputPassword} 
                                        onChange={e => setInputPassword(e.target.value)} 
                                        className="w-full border-2 border-gray-200 p-3 rounded-lg focus:outline-none focus:border-gray-800 transition-colors" 
                                        placeholder="請輸入密碼" 
                                        onKeyDown={e => e.key === 'Enter' && handleTeacherAuth()}
                                    />
                                </div>
                                
                                {errorMsg && (
                                    <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm flex items-start gap-2 border border-red-100">
                                        <div className="mt-0.5"><Icons.X /></div>
                                        {errorMsg}
                                    </div>
                                )}
                                
                                <div className="pt-4">
                                    <button 
                                        onClick={handleTeacherAuth} 
                                        disabled={isLoggingIn}
                                        className="w-full py-4 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-900 flex items-center justify-center gap-2 transition disabled:opacity-50 shadow-lg active:scale-95"
                                    >
                                        <Icons.Award /> 進入 / 建立教室
                                    </button>
                                </div>
                                <p className="text-xs text-gray-400 text-center mt-4">
                                    提示：若為首次使用，系統將自動以此暱稱及密碼為您建立新教室。
                                </p>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- 進入系統後的版面 (老師或學生) ---
            return (
                <div className="min-h-screen bg-gray-50 pb-10">
                    <header className="bg-white shadow px-4 py-3 sticky top-0 z-20 flex justify-between items-center">
                        <div className="flex items-center gap-2 text-indigo-700 font-bold text-xl md:text-2xl truncate">
                            <Icons.Award /> 學生共同評分系統(台中二中 阿發老師設計)
                        </div>
                        <div className="flex items-center gap-3">
                            {role === 'student' && user?.displayName && (
                                <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-full hidden md:inline-block border border-gray-200">
                                    {user.displayName}
                                </span>
                            )}
                            <span className={`text-sm font-bold px-3 py-1 rounded-full hidden md:inline-block ${role === 'teacher' ? 'bg-gray-800 text-white' : 'bg-indigo-100 text-indigo-700'}`}>
                                {role === 'teacher' ? '管理員' : '學生'}
                            </span>
                            <button onClick={handleLogout} className="text-red-500 hover:bg-red-50 px-3 py-1 rounded flex items-center gap-1 font-bold text-sm transition border border-red-100">
                                <Icons.LogOut /> 登出
                            </button>
                        </div>
                    </header>
                    <main className="max-w-5xl mx-auto p-4">
                        {role === 'teacher' ? 
                            <TeacherDashboard session={sessionData} roomName={currentRoom} /> : 
                            <StudentView session={sessionData} user={user} roomName={currentRoom} />
                        }
                    </main>
                </div>
            );
        }

        // --- Teacher Dashboard ---
        function TeacherDashboard({ session, roomName }) {
            const [activeTab, setActiveTab] = React.useState('control'); 
            const [votes, setVotes] = React.useState([]);
            const [groups, setGroups] = React.useState([]); 
            const [batchGroups, setBatchGroups] = React.useState('');
            const [batchStudents, setBatchStudents] = React.useState('');
            const [newCriName, setNewCriName] = React.useState('');
            const [newCriMax, setNewCriMax] = React.useState(10);
            const [monitorGroupId, setMonitorGroupId] = React.useState(null);
            const [newGroupName, setNewGroupName] = React.useState('');
            const [showClearCriteriaConfirm, setShowClearCriteriaConfirm] = React.useState(false);

            React.useEffect(() => {
                if (session) {
                    setGroups(session.groups || []);
                }
            }, [session]);

            React.useEffect(() => {
                const unsub = db.collection('sessions').doc(roomName).collection('votes').onSnapshot(snap => {
                    const data = [];
                    snap.forEach(d => data.push({id: d.id, ...d.data()}));
                    setVotes(data);
                });
                return () => unsub();
            }, [roomName]);

            const updateSession = (data) => db.collection('sessions').doc(roomName).set(data, { merge: true });

            if (!session) return <div className="p-10 text-center text-gray-500">正在讀取資料...</div>;

            const handleBatchGroups = async () => {
                const list = batchGroups.split('\n').map(s=>s.trim()).filter(s=>s);
                const newGroups = list.map(name => ({ id: `g${Date.now()}_${Math.random().toString(36).substr(2,5)}`, name }));
                await updateSession({ groups: [...(session.groups||[]), ...newGroups] });
                setBatchGroups('');
                alert(`已新增 ${newGroups.length} 個組別`);
            };

            const handleBatchStudents = async () => {
                const list = batchStudents.split('\n').map(s=>s.trim()).filter(s=>s);
                const currentSet = new Set(session.students || []);
                list.forEach(name => currentSet.add(name));
                await updateSession({ students: Array.from(currentSet) });
                setBatchStudents('');
                alert(`名單更新完成，目前共 ${currentSet.size} 人`);
            };

            const addSingleGroup = async () => {
                if (!newGroupName.trim()) return;
                const newGroup = { id: `g${Date.now()}`, name: newGroupName };
                await updateSession({ groups: [...(session.groups||[]), newGroup] });
                setNewGroupName('');
            };

            const addCriteria = async () => {
                if(!newCriName) return;
                const newC = { id: `c_${Date.now()}`, name: newCriName, max: parseInt(newCriMax) };
                await updateSession({ criteria: [...(session.criteria||[]), newC] });
                setNewCriName('');
            };

            const removeCriteria = async (id) => {
                if(!confirm("確定刪除此評分項目？")) return;
                await updateSession({ criteria: session.criteria.filter(c => c.id !== id) });
            };

            const deleteVote = async (voteId) => {
                if(!confirm("確定要將此評分標記為不採計嗎？(不會物理刪除，Excel 仍可匯出)")) return;
                await db.collection('sessions').doc(roomName).collection('votes').doc(voteId).update({ isDeleted: true });
            };

            const handleRemoveStudent = async (nameToRemove) => {
                if(!confirm(`確定要刪除學生 "${nameToRemove}" 嗎？`)) return;
                const newStudents = (session.students || []).filter(s => s !== nameToRemove);
                await updateSession({ students: newStudents });
            };

            const handleClearStudents = async () => {
                if(!confirm("警告：確定要清空所有學生名單嗎？這將導致所有學生需重新登入綁定。")) return;
                // 同時清空綁定紀錄(studentMappings)與即時上線狀態(onlineStudents)
                await updateSession({ students: [], studentMappings: {}, onlineStudents: {} });
            };

            const handleClearGroups = async () => {
                if(!confirm("警告：確定要清空所有組別嗎？相關的評分紀錄可能會失去關聯。")) return;
                await updateSession({ groups: [], currentGroupId: null });
            };

            const handleResetVotes = async () => {
                if (!confirm("警告：這將清除所有學生的評分紀錄，且無法復原！確定要重置嗎？")) return;
                
                try {
                    const votesRef = db.collection('sessions').doc(roomName).collection('votes');
                    const snapshot = await votesRef.get();
                    
                    const batch = db.batch();
                    snapshot.docs.forEach((doc) => {
                        batch.delete(doc.ref);
                    });
                    
                    await batch.commit();
                    alert("所有評分紀錄已清除。");
                } catch (e) {
                    console.error(e);
                    alert("重置失敗，請稍後再試。");
                }
            };

            // 產生學生專屬邀請連結
            const shareLink = `${window.location.origin}${window.location.pathname}?room=${encodeURIComponent(roomName)}`;
            const handleCopyLink = () => {
                const el = document.createElement('textarea');
                el.value = shareLink;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert('連結已複製！請將此連結提供給學生進入教室。');
            };

            // 老師監控介面：以「即時上線狀態 (onlineStudents)」來判斷綠燈亮起人數
            const loggedInCount = Object.keys(session.onlineStudents || {}).length;
            const currentGroupVotes = votes.filter(v => v.groupId === session.currentGroupId && !v.isDeleted);
            
            const allTotals = (session.students || []).map(studentName => {
                if (!session.currentGroupId) return null;
                const vote = votes.find(v => v.groupId === session.currentGroupId && v.userName === studentName && !v.isDeleted);
                if (!vote) return null;
                let sum = 0;
                (session.criteria || []).forEach(c => sum += (vote.scores[c.id] || 0));
                return sum;
            }).filter(score => score !== null).sort((a, b) => b - a); 

            const getScoreColor = (score) => {
                if (allTotals.length === 0) return "text-gray-800";
                const rank = allTotals.indexOf(score); 
                if (rank < 3) return "text-red-600 font-bold";
                const reverseRank = allTotals.lastIndexOf(score);
                if (reverseRank >= allTotals.length - 3 && allTotals.length >= 3) return "text-green-600 font-bold";
                return "text-gray-800";
            };

            // 排序全班狀態監控學生名單
            let sortedStudentsForMonitor = [];
            if (session && session.students) {
                const studentStats = session.students.map(studentName => {
                    const isOnline = Object.values(session.onlineStudents||{}).includes(studentName);
                    const currentGroup = session.currentGroupId;
                    const currentVote = currentGroup ? votes.find(v => v.groupId === currentGroup && v.userName === studentName && !v.isDeleted) : null;
                    const totalVoted = votes.filter(v => v.userName === studentName && !v.isDeleted).length;
                    let total = null;
                    if (currentVote) {
                        total = 0;
                        (session.criteria||[]).forEach(c => total += (currentVote.scores[c.id]||0));
                    }
                    return { studentName, isOnline, currentVote, totalVoted, total };
                });

                const votedStudents = studentStats.filter(s => s.total !== null);
                const unvotedStudents = studentStats.filter(s => s.total === null).sort((a, b) => a.studentName.localeCompare(b.studentName));

                if (votedStudents.length > 0) {
                    votedStudents.sort((a, b) => {
                        if (b.total !== a.total) return b.total - a.total; // 分數由高到低
                        return a.studentName.localeCompare(b.studentName); // 分數相同則依座號排序
                    });

                    const n = votedStudents.length;
                    const topCount = Math.min(3, n);
                    const top3 = votedStudents.slice(0, topCount);
                    
                    const bottomCount = Math.min(3, n - topCount);
                    const bottom3 = bottomCount > 0 ? votedStudents.slice(n - bottomCount, n) : [];

                    const restCount = n - topCount - bottomCount;
                    const middle = restCount > 0 ? votedStudents.slice(topCount, n - bottomCount) : [];
                    middle.sort((a, b) => a.studentName.localeCompare(b.studentName)); // 中間的有評分者依座號排序

                    sortedStudentsForMonitor = [...top3, ...bottom3, ...middle];
                }

                sortedStudentsForMonitor = [...sortedStudentsForMonitor, ...unvotedStudents];
            }

            return (
                <div className="space-y-6">
                    <div className="flex bg-white rounded-lg p-1 shadow-sm overflow-x-auto">
                        {[{id: 'control', label: '控制台'}, {id: 'setup', label: '名單設定'}, {id: 'criteria', label: '評分標準'}, {id: 'monitor', label: '監控與修正'}, {id: 'groupDetails', label: '各組明細'}, {id: 'results', label: '結果統計'}]
                        .map(t => (
                            <button key={t.id} onClick={()=>{setActiveTab(t.id); setMonitorGroupId(null);}} className={`flex-1 py-2 px-3 whitespace-nowrap text-sm font-bold rounded-md ${activeTab===t.id ? 'bg-gray-800 text-white shadow' : 'text-gray-500 hover:bg-gray-100'}`}>
                                {t.label}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'control' && (
                        <div className="bg-white rounded-xl shadow p-6 space-y-6 animate-fade-in">
                            
                            {/* --- 新增：邀請學生專屬連結區塊 --- */}
                            <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-5 shadow-sm">
                                <h3 className="font-bold text-lg text-indigo-800 mb-2 flex items-center gap-2">
                                    <Icons.Link /> 邀請學生加入評分
                                </h3>
                                <p className="text-sm text-indigo-600 mb-3 font-medium">請複製下方專屬連結提供給學生。學生點擊後將會直接被引導至您的教室：</p>
                                <div className="flex flex-col sm:flex-row gap-2">
                                    <input type="text" readOnly value={shareLink} className="flex-1 p-3 rounded-lg border border-indigo-200 bg-white text-gray-700 outline-none text-sm font-mono shadow-inner" />
                                    <button onClick={handleCopyLink} className="bg-indigo-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow whitespace-nowrap active:scale-95">
                                        複製連結
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                                <div>
                                    <p className="text-gray-500 text-xs font-bold uppercase">目前已上線學生</p>
                                    <p className="text-2xl font-bold text-gray-800">{loggedInCount} <span className="text-sm text-gray-400">/ {(session.students||[]).length}</span></p>
                                </div>
                                {session.currentGroupId && (
                                    <div>
                                        <p className="text-green-600 text-xs font-bold uppercase text-right">當前評分進度</p>
                                        <p className="text-2xl font-bold text-green-700 text-right">{currentGroupVotes.length} <span className="text-sm text-green-500">人已評</span></p>
                                    </div>
                                )}
                            </div>
                            
                            <h3 className="font-bold text-lg border-b pb-2 text-gray-800">報告流程控制</h3>
                            <div className="space-y-3">
                                {(groups||[]).length === 0 && <p className="text-gray-400 py-4 text-center border-2 border-dashed rounded-lg bg-gray-50">尚未設定組別，請前往「名單設定」新增。</p>}
                                {(groups||[]).map(g => (
                                    <div key={g.id} className={`flex justify-between items-center p-4 border rounded-xl transition-colors ${session.currentGroupId === g.id ? 'border-green-500 bg-green-50 shadow-md ring-2 ring-green-200' : 'hover:bg-gray-50 border-gray-200'}`}>
                                        <span className={`font-bold text-lg ${session.currentGroupId === g.id ? 'text-green-800' : 'text-gray-700'}`}>{g.name}</span>
                                        {session.currentGroupId === g.id ? (
                                            <button onClick={()=>updateSession({currentGroupId: null})} className="px-5 py-2.5 bg-white border-2 border-red-200 text-red-600 rounded-lg font-bold hover:bg-red-50 transition-colors shadow-sm active:scale-95">停止評分</button>
                                        ) : (
                                            <button onClick={()=>updateSession({currentGroupId: g.id, showResults: false})} disabled={!!session.currentGroupId} className={`px-5 py-2.5 rounded-lg font-bold transition-colors shadow-sm active:scale-95 ${session.currentGroupId ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'bg-gray-800 text-white hover:bg-gray-900'}`}>開始評分</button>
                                        )}
                                    </div>
                                ))}
                            </div>
                            <div className="pt-4 border-t">
                                <button onClick={()=>updateSession({showResults: !session.showResults})} className={`w-full py-4 rounded-xl font-bold text-lg transition-colors shadow-md ${session.showResults ? 'bg-amber-100 text-amber-800 hover:bg-amber-200 border border-amber-300' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                    {session.showResults ? '隱藏排行榜' : '公佈排行榜 (學生可見)'}
                                </button>
                            </div>
                        </div>
                    )}

                    {activeTab === 'setup' && (
                        <div className="grid md:grid-cols-2 gap-6 animate-fade-in">
                            <div className="bg-white rounded-xl shadow p-6">
                                <h3 className="font-bold text-lg mb-4 flex items-center gap-2 text-gray-800"><Icons.Users/> 學生名單管理</h3>
                                <p className="text-xs text-gray-500 mb-2">請貼上全班姓名，一行一個名字</p>
                                <textarea className="w-full h-40 border-2 border-gray-100 p-3 rounded-lg text-sm mb-2 focus:border-gray-400 focus:outline-none transition-colors bg-gray-50" placeholder="王小明&#10;李大華..." value={batchStudents} onChange={e=>setBatchStudents(e.target.value)}></textarea>
                                <div className="flex gap-2">
                                    <button onClick={handleBatchStudents} className="flex-1 py-2 bg-gray-800 text-white rounded-lg font-bold hover:bg-gray-900 transition active:scale-95">更新名單</button>
                                    <button onClick={handleClearStudents} className="px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-lg font-bold hover:bg-red-100 transition"><Icons.Trash /></button>
                                </div>
                                <div className="bg-gray-50 p-3 rounded-lg h-48 overflow-y-auto flex flex-wrap gap-2 mt-4 border border-gray-100 shadow-inner">
                                    {(session.students||[]).map(s => {
                                        // 修改：在名單設定中也統一使用「onlineStudents」來判斷綠燈顯示
                                        const isOnline = Object.values(session.onlineStudents||{}).includes(s);
                                        return (
                                            <span key={s} className={`text-xs px-2 py-1.5 rounded-lg border flex items-center gap-1 font-bold ${isOnline ? 'bg-green-100 text-green-700 border-green-200 shadow-sm' : 'bg-white text-gray-500 border-gray-200'}`}>
                                                {s} <button onClick={()=>handleRemoveStudent(s)} className="text-gray-400 hover:text-red-500 ml-1"><Icons.X /></button>
                                            </span>
                                        );
                                    })}
                                </div>
                            </div>
                            <div className="bg-white rounded-xl shadow p-6">
                                <h3 className="font-bold text-lg mb-4 flex items-center gap-2 text-gray-800"><Icons.Award/> 分組名單管理</h3>
                                <div className="mb-4 flex gap-2">
                                    <input type="text" value={newGroupName} onChange={e=>setNewGroupName(e.target.value)} className="border-2 border-gray-100 p-2 rounded-lg flex-1 focus:border-gray-400 focus:outline-none bg-gray-50" placeholder="單筆新增組名" />
                                    <button onClick={addSingleGroup} className="bg-gray-200 px-4 rounded-lg font-bold hover:bg-gray-300 transition text-gray-700 active:scale-95">新增</button>
                                </div>
                                <p className="text-xs text-gray-500 mb-2">或 批次貼上組別名稱，一行一個</p>
                                <textarea className="w-full h-32 border-2 border-gray-100 p-3 rounded-lg text-sm mb-2 focus:border-gray-400 focus:outline-none transition-colors bg-gray-50" placeholder="第一組...&#10;第二組..." value={batchGroups} onChange={e=>setBatchGroups(e.target.value)}></textarea>
                                <div className="flex gap-2">
                                    <button onClick={handleBatchGroups} className="flex-1 py-2 bg-gray-800 text-white rounded-lg font-bold hover:bg-gray-900 transition active:scale-95">批次新增</button>
                                    <button onClick={handleClearGroups} className="px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-lg font-bold hover:bg-red-100 transition"><Icons.Trash /></button>
                                </div>
                                <div className="bg-gray-50 p-3 rounded-lg h-48 overflow-y-auto space-y-2 mt-4 border border-gray-100 shadow-inner">
                                    {(groups||[]).map((g,i) => (
                                        <div key={g.id} className="text-sm bg-white p-3 rounded-lg border border-gray-200 flex justify-between items-center hover:border-gray-400 transition shadow-sm">
                                            <span className="font-bold text-gray-700">{i+1}. {g.name}</span>
                                            <button onClick={async()=>{ if(confirm("刪除?")) await updateSession({ groups: session.groups.filter(x=>x.id!==g.id) }); }} className="text-gray-400 hover:text-red-500 p-1"><Icons.Trash2 /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'criteria' && (
                        <div className="bg-white rounded-xl shadow p-6 animate-fade-in relative">
                            {showClearCriteriaConfirm && (
                                <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[9999]">
                                    <div className="bg-white p-6 rounded-2xl w-full max-w-sm shadow-2xl animate-fade-in">
                                        <h3 className="text-xl font-bold mb-3 text-red-600 flex items-center gap-2">
                                            <Icons.Trash /> 刪除所有項目
                                        </h3>
                                        <p className="text-gray-600 mb-6 font-medium">確定要刪除所有評分項目嗎？刪除後無法復原。</p>
                                        <div className="flex gap-3">
                                            <button onClick={() => setShowClearCriteriaConfirm(false)} className="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-200 transition active:scale-95">取消</button>
                                            <button onClick={async () => {
                                                await updateSession({ criteria: [] });
                                                setShowClearCriteriaConfirm(false);
                                            }} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition active:scale-95">確定刪除</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-bold text-lg text-gray-800">評分標準設定</h3>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-4 mb-6 items-end bg-gray-50 border border-gray-200 p-4 rounded-xl">
                                <div className="flex-1 w-full">
                                    <label className="text-xs font-bold text-gray-600 mb-1 block">項目名稱</label>
                                    <input type="text" value={newCriName} onChange={e=>setNewCriName(e.target.value)} className="w-full border-2 border-gray-200 p-2.5 rounded-lg focus:border-gray-400 outline-none transition" placeholder="例如：創新程度" />
                                </div>
                                <div className="w-full sm:w-24">
                                    <label className="text-xs font-bold text-gray-600 mb-1 block">最高分</label>
                                    <input type="number" value={newCriMax} onChange={e=>setNewCriMax(e.target.value)} className="w-full border-2 border-gray-200 p-2.5 rounded-lg focus:border-gray-400 outline-none transition" />
                                </div>
                                <div className="flex gap-2 w-full sm:w-auto mt-2 sm:mt-0">
                                    <button onClick={addCriteria} className="flex-1 sm:flex-none bg-gray-800 text-white px-6 py-2.5 rounded-lg font-bold shadow-sm hover:bg-gray-900 transition active:scale-95 border-2 border-gray-800 whitespace-nowrap">新增</button>
                                    <button onClick={() => setShowClearCriteriaConfirm(true)} className="flex-1 sm:flex-none bg-red-50 text-red-600 px-4 py-2.5 rounded-lg font-bold shadow-sm hover:bg-red-100 transition active:scale-95 border border-red-200 whitespace-nowrap">刪除所有評分項目</button>
                                </div>
                            </div>
                            <div className="space-y-3">
                                {(session.criteria||[]).map(c => (
                                    <div key={c.id} className="flex justify-between items-center p-4 border-2 border-gray-100 rounded-xl bg-white shadow-sm hover:border-gray-300 transition">
                                        <div className="flex items-center gap-4">
                                            <span className="font-bold text-lg text-gray-800">{c.name}</span>
                                            <span className="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-600 font-bold border border-gray-200">配分：0 ~ {c.max} 分</span>
                                        </div>
                                        <button onClick={()=>removeCriteria(c.id)} className="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2 rounded-lg transition"><Icons.Trash2/></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'monitor' && (
                        <div className="space-y-6 animate-fade-in">
                            <div className="bg-white rounded-xl shadow overflow-hidden border border-gray-100">
                                <div className="px-6 py-3 border-b bg-gray-50 flex justify-between items-center">
                                    <h3 className="font-bold text-lg flex items-center gap-2 text-gray-800"><Icons.Users/> 全班狀態監控</h3>
                                    <button onClick={handleResetVotes} className="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 px-4 py-2 rounded-lg font-bold shadow-sm transition-colors flex items-center gap-2 active:scale-95">
                                        <Icons.Trash /> 清空所有評分紀錄
                                    </button>
                                </div>
                                <div className="overflow-x-auto overflow-y-auto" style={{ maxHeight: '690px' }}>
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-white text-gray-500 uppercase sticky top-0 z-10 shadow-sm">
                                            <tr>
                                                <th className="px-4 py-2 font-bold">姓名</th>
                                                <th className="px-4 py-2 font-bold">登入狀態</th>
                                                <th className="px-4 py-2 font-bold">目前評分進度</th>
                                                <th className="px-4 py-2 font-bold text-right">評分(總分)</th>
                                                <th className="px-4 py-2 font-bold text-center">操作</th>
                                                <th className="px-4 py-2 font-bold text-gray-400">累計已評</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {sortedStudentsForMonitor.map(studentObj => {
                                                const { studentName, isOnline, currentVote, totalVoted, total } = studentObj;
                                                const currentGroup = session.currentGroupId;
                                                
                                                let totalDisplay = "-";
                                                let totalClass = "text-gray-400";
                                                
                                                if (currentVote) {
                                                    totalDisplay = total;
                                                    totalClass = getScoreColor(total); 
                                                }

                                                return (
                                                    <tr key={studentName} className="hover:bg-gray-50 transition-colors">
                                                        <td className="px-4 py-2 font-bold text-gray-800">{studentName}</td>
                                                        <td className="px-4 py-2">{isOnline ? <span className="text-green-700 bg-green-100 px-3 py-1 rounded-full text-xs font-bold border border-green-200">線上</span> : <span className="text-gray-400 text-xs border border-gray-200 px-3 py-1 rounded-full">未登入</span>}</td>
                                                        <td className="px-4 py-2">
                                                            {!currentGroup ? <span className="text-gray-400">-</span> : 
                                                                currentVote ? <span className="text-green-600 font-bold flex items-center gap-1"><Icons.CheckCircle/>已完成</span> : <span className="text-red-500 font-bold animate-pulse">未評分</span>}
                                                        </td>
                                                        <td className={`px-4 py-2 text-right font-mono text-lg ${totalClass}`}>{totalDisplay}</td>
                                                        <td className="px-4 py-2 text-center">
                                                            {currentVote && (
                                                                <button onClick={()=>deleteVote(currentVote.id)} className="text-gray-400 hover:text-red-600 p-2 bg-gray-50 rounded-lg hover:bg-red-50 transition" title="標記為不採計"><Icons.Trash2/></button>
                                                            )}
                                                        </td>
                                                        <td className="px-4 py-2 text-gray-400 font-mono font-medium">{totalVoted} 組</td>
                                                    </tr>
                                                )
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'groupDetails' && (
                        <div className="space-y-6 animate-fade-in">
                            {!monitorGroupId ? (
                                <div className="bg-white rounded-xl shadow p-6 border border-gray-100">
                                    <h3 className="font-bold text-lg mb-4 text-gray-800">各組評分檢核 (點選查看明細)</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                        {(groups||[]).map(g => {
                                            const count = votes.filter(v => v.groupId === g.id && !v.isDeleted).length;
                                            return (
                                                <button key={g.id} onClick={()=>setMonitorGroupId(g.id)} className="p-4 border-2 border-gray-100 rounded-xl hover:border-gray-800 hover:shadow-md transition text-left group bg-gray-50">
                                                    <div className="font-bold text-gray-800 text-lg group-hover:text-gray-900">{g.name}</div>
                                                    <div className="text-sm text-gray-500 mt-2 font-medium">有效評分: <span className="font-bold text-gray-800 bg-white px-2 py-1 rounded border shadow-sm ml-1">{count}</span></div>
                                                </button>
                                            )
                                        })}
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded-xl shadow overflow-hidden animate-fade-in border border-gray-100">
                                    <div className="px-6 py-3 border-b flex items-center gap-4 bg-gray-50">
                                        <button onClick={() => setMonitorGroupId(null)} className="text-gray-600 bg-white hover:bg-gray-100 border border-gray-200 p-2 px-4 rounded-lg flex items-center gap-2 font-bold transition shadow-sm active:scale-95">
                                            <Icons.ArrowLeft /> 返回清單
                                        </button>
                                        <h2 className="text-xl font-black text-gray-800">
                                            {groups.find(g => g.id === monitorGroupId)?.name} - 評分明細
                                        </h2>
                                    </div>
                                    
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-white text-gray-500 uppercase border-b border-gray-200">
                                                <tr>
                                                    <th className="px-4 py-2 font-bold">評分學生</th>
                                                    <th className="px-4 py-2 text-right font-bold">總分</th>
                                                    {(session.criteria||[]).map(c => (
                                                        <th key={c.id} className="px-4 py-2 text-right hidden md:table-cell font-bold">{c.name}</th>
                                                    ))}
                                                    <th className="px-4 py-2 text-center font-bold">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100">
                                                {votes
                                                    .filter(v => v.groupId === monitorGroupId && !v.isDeleted)
                                                    .map(v => {
                                                        let total = 0;
                                                        (session.criteria||[]).forEach(c => total += (v.scores[c.id] || 0));
                                                        return { ...v, total };
                                                    })
                                                    .sort((a, b) => b.total - a.total)
                                                    .map(v => (
                                                        <tr key={v.id} className="hover:bg-gray-50 transition">
                                                            <td className="px-4 py-2 font-bold text-gray-800">{v.userName}</td>
                                                            <td className="px-4 py-2 text-right font-black text-indigo-600 text-xl">{v.total}</td>
                                                            {(session.criteria||[]).map(c => (
                                                                <td key={c.id} className="px-4 py-2 text-right text-gray-500 hidden md:table-cell font-mono font-medium">{v.scores[c.id]}</td>
                                                            ))}
                                                            <td className="px-4 py-2 text-center">
                                                                <button onClick={() => deleteVote(v.id)} className="text-gray-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition" title="標記為不採計">
                                                                    <Icons.Trash2 />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))
                                                }
                                                {votes.filter(v => v.groupId === monitorGroupId && !v.isDeleted).length === 0 && (
                                                    <tr><td colSpan={(session.criteria||[]).length + 3} className="p-8 text-center text-gray-400 font-bold">尚無有效評分紀錄</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'results' && <ResultsBoard session={session} roomName={roomName} groups={groups} criteria={session.criteria || DEFAULT_CRITERIA} isAdmin={true} />}
                </div>
            );
        }

        // --- Student View ---
        function StudentView({ session, user, roomName }) {
            const [selectedName, setSelectedName] = React.useState('');
            const [hasVoted, setHasVoted] = React.useState(false);
            const [scores, setScores] = React.useState({});
            const [submitting, setSubmitting] = React.useState(false);

            // 確保學生無法重新綁定，一直使用最初選擇的姓名
            const registeredName = session?.studentMappings?.[user.uid];

            // 新增：處理上線狀態 (綠燈機制)
            React.useEffect(() => {
                if (registeredName && user && roomName) {
                    const setOnline = async () => {
                        try {
                            await db.collection('sessions').doc(roomName).update({
                                [`onlineStudents.${user.uid}`]: registeredName
                            });
                        } catch (e) { console.error("更新上線狀態失敗", e); }
                    };
                    setOnline();

                    // 當學生關閉瀏覽器分頁或離開時，將其設為離線
                    const handleOffline = () => {
                        db.collection('sessions').doc(roomName).update({
                            [`onlineStudents.${user.uid}`]: firebase.firestore.FieldValue.delete()
                        }).catch(e => console.error(e));
                    };
                    
                    window.addEventListener('beforeunload', handleOffline);

                    return () => {
                        window.removeEventListener('beforeunload', handleOffline);
                        handleOffline(); // 元件卸載時也視為離線
                    };
                }
            }, [registeredName, user, roomName]);

            React.useEffect(() => {
                if (registeredName && session?.currentGroupId) {
                    const unsub = db.collection('sessions').doc(roomName).collection('votes')
                        .where('groupId', '==', session.currentGroupId)
                        .where('userId', '==', user.uid)
                        .onSnapshot(snap => setHasVoted(!snap.empty));
                    return () => unsub();
                } else {
                    setHasVoted(false);
                    setScores({});
                }
            }, [session?.currentGroupId, user.uid, registeredName, roomName]);

            if (!session) return <div className="h-screen flex items-center justify-center text-gray-500 font-bold">連結教室中...</div>;

            const handleRegister = async () => {
                if (!selectedName) return;
                const isTaken = Object.values(session.studentMappings || {}).includes(selectedName);
                if (isTaken) { alert("此姓名已被其他裝置綁定！"); return; }
                const update = {};
                update[`studentMappings.${user.uid}`] = selectedName;
                await db.collection('sessions').doc(roomName).update(update);
            };

            const submitVote = async () => {
                if (session.criteria.some(c => scores[c.id] === undefined)) { alert("請完成所有評分項目！"); return; }
                setSubmitting(true);
                try {
                    await db.collection('sessions').doc(roomName).collection('votes').add({
                        userId: user.uid, 
                        userName: registeredName, 
                        groupId: session.currentGroupId, 
                        scores, 
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(), 
                        isDeleted: false
                    });
                    setHasVoted(true);
                } catch(e) { alert("送出失敗"); } finally { setSubmitting(false); }
            };

            // 尚未選擇學生姓名
            if (!registeredName) {
                const availableStudents = (session.students || []).filter(name => !Object.values(session.studentMappings || {}).includes(name));
                return (
                    <div className="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-8 text-center mt-10 animate-fade-in border-t-4 border-indigo-500">
                        <div className="flex justify-center text-indigo-500 mb-4 scale-110"><Icons.User /></div>
                        <h2 className="text-2xl font-bold mb-2 text-gray-800">歡迎進入教室</h2>
                        <p className="text-gray-500 mb-6 text-sm font-medium">請從名單中選擇你的名字進行綁定</p>
                        
                        {(session.students||[]).length === 0 ? (
                            <div className="text-center text-amber-600 bg-amber-50 p-4 rounded-lg font-bold border border-amber-200">
                                老師尚未建立學生名單，請稍候...
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <select className="w-full p-4 border-2 border-gray-200 rounded-xl bg-gray-50 focus:border-indigo-500 focus:bg-white transition-colors outline-none font-bold text-gray-700 shadow-sm" value={selectedName} onChange={e=>setSelectedName(e.target.value)}>
                                    <option value="">-- 請選擇你的姓名 --</option>
                                    {availableStudents.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <button onClick={handleRegister} disabled={!selectedName} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold shadow-md hover:bg-indigo-700 disabled:bg-gray-300 disabled:shadow-none transition-all active:scale-95 text-lg">確認，我是這位學生</button>
                            </div>
                        )}
                    </div>
                );
            }

            if (session.showResults) return <div className="animate-fade-in"><ResultsBoard session={session} roomName={roomName} groups={session.groups} criteria={session.criteria} isAdmin={false} /></div>;

            if (!session.currentGroupId) return (
                <div className="max-w-lg mx-auto text-center py-20 bg-white rounded-2xl shadow-lg border border-gray-100 mt-10 animate-fade-in">
                    <div className="inline-block bg-indigo-50 text-indigo-700 px-4 py-1 rounded-full font-bold mb-6 border border-indigo-100 shadow-sm">哈囉，{registeredName}</div>
                    <div className="text-gray-200 flex justify-center mb-6 scale-150"><Icons.Lock /></div>
                    <h2 className="font-black text-3xl text-gray-800 tracking-wide">等待老師開放評分...</h2>
                    <p className="text-gray-500 mt-3 font-medium">請留意講台上的指示</p>
                </div>
            );

            if (hasVoted) return (
                <div className="max-w-lg mx-auto text-center py-20 bg-gradient-to-br from-green-50 to-emerald-50 rounded-2xl shadow border border-green-100 mt-10 animate-fade-in">
                    <div className="text-green-500 flex justify-center mb-6 scale-150"><Icons.CheckCircle /></div>
                    <h2 className="font-black text-3xl text-green-800 tracking-wide">評分已成功送出！</h2>
                    <p className="text-green-600 mt-3 font-bold">請休息一下，等待下一組報告。</p>
                </div>
            );

            const currentGroup = session.groups.find(g => g.id === session.currentGroupId);
            return (
                <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-6 md:p-8 space-y-8 animate-fade-in border-t-4 border-indigo-500">
                    <div className="border-b border-gray-100 pb-6 text-center">
                        <div className="inline-block bg-gray-100 text-gray-600 px-5 py-2 rounded-full text-2xl font-bold mb-4 border border-gray-200 shadow-sm">評分者：{registeredName}</div>
                        <h2 className="text-2xl md:text-3xl font-black text-gray-800">目前報告：<span className="text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg ml-2 border border-indigo-100 shadow-sm">{currentGroup?.name}</span></h2>
                    </div>
                    
                    <div className="space-y-6">
                        {session.criteria.map(c => (
                            <div key={c.id} className="bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition">
                                <div className="flex justify-between items-center mb-5">
                                    <label className="font-black text-xl text-gray-800">{c.name}</label>
                                    <span className="text-sm font-bold text-indigo-600 bg-indigo-100 px-3 py-1 rounded-lg border border-indigo-200">最高：{c.max}</span>
                                </div>
                                <div className="flex items-center gap-5">
                                    <input type="range" min="0" max={c.max} step="1" value={scores[c.id] || 0} onChange={e => setScores({...scores, [c.id]: parseInt(e.target.value)})} className="w-full h-4 bg-gray-200 rounded-full appearance-none cursor-pointer accent-indigo-600 shadow-inner" />
                                    <div className="w-20 h-16 flex items-center justify-center bg-white text-indigo-700 font-black text-3xl rounded-xl border-2 border-indigo-200 shadow-sm">{scores[c.id] || 0}</div>
                                </div>
                            </div>
                        ))}
                    </div>
                    
                    <button onClick={submitVote} disabled={submitting} className="w-full py-5 bg-indigo-600 text-white rounded-xl font-black text-xl shadow-lg hover:bg-indigo-700 hover:shadow-xl transition-all active:scale-95 disabled:bg-gray-400 disabled:shadow-none disabled:transform-none border-b-4 border-indigo-800 active:border-b-0">
                        {submitting ? '資料傳送中...' : '確認送出分數'}
                    </button>
                </div>
            );
        }

        // --- Results Board ---
        function ResultsBoard({ session, roomName, groups, criteria, isAdmin }) {
            const [results, setResults] = React.useState([]);
            const [allVotes, setAllVotes] = React.useState([]);

            React.useEffect(() => {
                db.collection('sessions').doc(roomName).collection('votes').get().then(snap => {
                    const votesData = [];
                    snap.forEach(d => votesData.push(d.data()));
                    setAllVotes(votesData);

                    const groupStats = {};
                    votesData.forEach(v => {
                        if (v.isDeleted) return;

                        if (!groupStats[v.groupId]) groupStats[v.groupId] = { total: 0, count: 0 };
                        let vTotal = 0;
                        (criteria||[]).forEach(c => vTotal += (v.scores[c.id] || 0));
                        groupStats[v.groupId].total += vTotal;
                        groupStats[v.groupId].count++;
                    });
                    const res = (groups||[]).map(g => ({
                        ...g, avg: groupStats[g.id]?.count ? (groupStats[g.id].total / groupStats[g.id].count).toFixed(2) : "0.00"
                    })).sort((a, b) => b.avg - a.avg);
                    setResults(res);
                });
            }, [session, roomName, groups, criteria]);

            const handleExportExcel = () => {
                const wb = XLSX.utils.book_new();

                const borderStyle = {
                    top: { style: "thin", color: { rgb: "000000" } },
                    bottom: { style: "thin", color: { rgb: "000000" } },
                    left: { style: "thin", color: { rgb: "000000" } },
                    right: { style: "thin", color: { rgb: "000000" } }
                };

                const rankingHeaders = ["名次", "組名稱", "平均總分"];
                const rankingData = results.map((r, i) => [i + 1, r.name, r.avg]);
                
                const rankWsData = [
                    [`最終排行榜 - ${roomName}老師的教室`, "", ""],
                    rankingHeaders,
                    ...rankingData
                ];
                
                const rankWs = XLSX.utils.aoa_to_sheet(rankWsData);
                rankWs['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 2 } }];
                rankWs['!cols'] = [{ wch: 12 }, { wch: 30 }, { wch: 15 }];
                rankWs['!rows'] = [{ hpt: 30 }, { hpt: 18 }, ...rankingData.map(() => ({ hpt: 18 }))];

                const rankRange = XLSX.utils.decode_range(rankWs['!ref']);
                for (let R = rankRange.s.r; R <= rankRange.e.r; ++R) {
                    for (let C = rankRange.s.c; C <= rankRange.e.c; ++C) {
                        const cell_address = XLSX.utils.encode_cell({ r: R, c: C });
                        if (!rankWs[cell_address]) continue;
                        if (!rankWs[cell_address].s) rankWs[cell_address].s = {};
                        rankWs[cell_address].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                        rankWs[cell_address].s.border = borderStyle;
                        if (R === 0) rankWs[cell_address].s.font = { bold: true, sz: 14 };
                    }
                }
                XLSX.utils.book_append_sheet(wb, rankWs, "最終排行榜");

                groups.forEach(group => {
                    const groupVotes = allVotes.filter(v => v.groupId === group.id);
                    const headers = ["評分學生", ...criteria.map(c => c.name), "總分", "備註"];
                    
                    const dataRows = groupVotes.map(v => {
                        const row = [v.userName];
                        let total = 0;
                        criteria.forEach(c => {
                            const score = v.scores[c.id] || 0;
                            row.push(score);
                            total += score;
                        });
                        row.push(total);
                        row.push(v.isDeleted ? "不採計" : "");
                        return row;
                    });

                    let validTotalSum = 0;
                    let validCount = 0;
                    
                    dataRows.forEach((row, index) => {
                        if (!groupVotes[index].isDeleted) {
                            validTotalSum += row[row.length - 2]; 
                            validCount++;
                        }
                    });
                    
                    const groupAvg = validCount > 0 ? (validTotalSum / validCount).toFixed(1) : "0.0";
                    const summaryRow = new Array(headers.length).fill("");
                    summaryRow[headers.length - 3] = "平均"; 
                    summaryRow[headers.length - 2] = groupAvg;

                    const allData = [headers, ...dataRows, summaryRow];
                    const ws = XLSX.utils.aoa_to_sheet(allData);

                    ws['!cols'] = headers.map(() => ({ wch: 12 }));
                    ws['!rows'] = allData.map(() => ({ hpt: 18 }));

                    const range = XLSX.utils.decode_range(ws['!ref']);
                    
                    for (let R = range.s.r; R <= range.e.r; ++R) {
                        for (let C = range.s.c; C <= range.e.c; ++C) {
                            const cell_address = XLSX.utils.encode_cell({ r: R, c: C });
                            if (!ws[cell_address]) continue;
                            if (!ws[cell_address].s) ws[cell_address].s = {};
                            
                            ws[cell_address].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                            ws[cell_address].s.border = borderStyle;

                            if (C === range.e.c && ws[cell_address].v === "不採計") {
                                ws[cell_address].s.font = { color: { rgb: "FF0000" } };
                            }
                            if (R > 0 && R < range.e.r && C === range.e.c - 1) {
                                ws[cell_address].s.font = { color: { rgb: "0000FF" } };
                            }
                            if (R === range.e.r) {
                                if (C === range.e.c - 2) ws[cell_address].s.font = { color: { rgb: "FF0000" }, bold: true };
                                if (C === range.e.c - 1) ws[cell_address].s.font = { color: { rgb: "FF0000" } };
                            }
                        }
                    }

                    let sheetName = group.name.replace(/[\\/?*\[\]]/g, ""); 
                    if(sheetName.length > 30) sheetName = sheetName.substring(0,30);
                    if(!sheetName) sheetName = `Group ${group.id}`;
                    
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                });

                XLSX.writeFile(wb, `評分結果_${roomName}老師.xlsx`);
            };

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-lg border border-gray-100">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                        <h2 className="text-2xl font-black flex items-center gap-2 text-indigo-900"><Icons.BarChart3 /> 最終排行榜</h2>
                        {isAdmin && (
                            <button 
                                onClick={handleExportExcel}
                                className="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-xl flex items-center gap-2 font-bold shadow-md transition-colors active:scale-95 border-b-4 border-green-800 active:border-b-0"
                            >
                                <Icons.Download /> 匯出 Excel 報表
                            </button>
                        )}
                    </div>

                    <div className="space-y-4">
                        {results.map((g, i) => (
                            <div key={g.id} className={`flex justify-between items-center p-5 rounded-2xl transition-all shadow-sm ${i === 0 ? 'bg-gradient-to-r from-yellow-50 to-yellow-100 border-2 border-yellow-300 transform scale-105 shadow-md' : 'border border-gray-100 bg-white hover:border-gray-300 hover:shadow-md'}`}>
                                <div className="flex items-center gap-5">
                                    <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl text-white shadow ${i===0?'bg-yellow-400':i===1?'bg-gray-400':i===2?'bg-orange-400':'bg-gray-300 text-gray-600'}`}>{i+1}</div>
                                    <span className={`text-xl ${i===0 ? 'font-black text-gray-900' : 'font-bold text-gray-800'}`}>{g.name}</span>
                                </div>
                                <div className="text-right">
                                    <span className={`text-4xl font-black block ${i===0 ? 'text-yellow-600' : 'text-indigo-600'}`}>{g.avg}</span>
                                    <span className="text-sm font-bold text-gray-400">平均總分</span>
                                </div>
                            </div>
                        ))}
                    </div>
                    {!isAdmin && <div className="mt-8 text-center text-gray-500 text-sm font-bold bg-gray-50 border border-gray-200 py-3 rounded-lg shadow-inner">結果僅在老師公佈後顯示，若目前無資料代表尚未開放。</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
