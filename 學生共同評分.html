<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課堂共同評分系統 v3.5 (阿發老師設計版)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- 引入 xlsx-js-style (支援樣式匯出) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    
    <!-- 引入 Firebase Compat Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #aaa; }
        #global-error-box { display: none; position: fixed; top: 0; left: 0; width: 100%; padding: 20px; background: #fee2e2; color: #b91c1c; z-index: 9999; border-bottom: 2px solid #ef4444; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="global-error-box">
        <h3 class="font-bold text-lg">⚠️ 發生錯誤</h3>
        <pre id="global-error-msg" class="mt-2 text-sm whitespace-pre-wrap"></pre>
        <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">重新整理</button>
    </div>
    <div id="root"></div>

    <script>
        window.onerror = function(msg, url, line, col, error) {
            document.getElementById('global-error-box').style.display = 'block';
            document.getElementById('global-error-msg').innerText = `錯誤: ${msg}\n位置: ${line}:${col}`;
            return false;
        };
    </script>

    <script type="text/babel">
        // --- 1. Firebase Config & Init ---
        const firebaseConfig = {
           apiKey: "AIzaSyAmqdU3AimELr5sa9FIFd_eb5zbM0nCFkI",
           authDomain: "evaluate-each-other-5d4bf.firebaseapp.com",
           projectId: "evaluate-each-other-5d4bf",
           storageBucket: "evaluate-each-other-5d4bf.firebasestorage.app",
           messagingSenderId: "323924183931",
           appId: "1:323924183931:web:945c1feceaa4593d000bde",
           measurementId: "G-GBZKXN3H26"
        };

        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();
        const auth = firebase.auth();
        const SESSION_ID = "class_demo_session_v3"; 

        // --- DEFAULT_CRITERIA ---
        const DEFAULT_CRITERIA = [
            { id: 'c1', name: '內容深度', max: 10 },
            { id: 'c2', name: '表達技巧', max: 10 },
            { id: 'c3', name: '投影片設計', max: 10 },
            { id: 'c4', name: '團隊合作', max: 10 },
            { id: 'c5', name: '時間控制', max: 10 },
        ];

        // --- 2. Icons ---
        const Icons = {
            Award: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
            Lock: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
            Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Square: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>,
            BarChart3: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            AlertCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
            Key: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Refresh: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
            ArrowLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Trash2: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        };

        // --- 3. Main App ---
        function App() {
            const [user, setUser] = React.useState(null);
            const [loading, setLoading] = React.useState(true);
            const [sessionData, setSessionData] = React.useState(null);
            const [role, setRole] = React.useState(null); 
            const [errorMsg, setErrorMsg] = React.useState(null);
            
            const [showTeacherAuth, setShowTeacherAuth] = React.useState(false);
            const [teacherPwdInput, setTeacherPwdInput] = React.useState('');
            const [isSettingUpPwd, setIsSettingUpPwd] = React.useState(false);

            React.useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            React.useEffect(() => {
                if (!user) return;
                const unsub = db.collection('sessions').doc(SESSION_ID).onSnapshot(docSnap => {
                    if (docSnap.exists) {
                        setSessionData(docSnap.data());
                    } else {
                        const initialData = {
                            status: 'setup',
                            currentGroupId: null,
                            showResults: false,
                            criteria: DEFAULT_CRITERIA,
                            groups: [],
                            students: [],
                            studentMappings: {}, 
                            teacherPassword: null
                        };
                        db.collection('sessions').doc(SESSION_ID).set(initialData);
                    }
                }, err => {
                    console.error(err);
                    setErrorMsg("無法讀取資料，請確認資料庫權限 (Test Mode) 或網路連線。");
                });
                return () => unsub();
            }, [user]);

            const handleLogin = async () => {
                try {
                    setErrorMsg(null);
                    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                } catch (e) {
                    if (e.code === 'auth/unauthorized-domain') {
                        setErrorMsg(`網域未授權！請新增此網址到 Firebase Console: ${window.location.hostname}`);
                    } else {
                        setErrorMsg(`登入錯誤: ${e.message}`);
                    }
                }
            };

            const verifyTeacher = async () => {
                if (!teacherPwdInput) return;
                if (isSettingUpPwd) {
                    if (!/^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{10,}$/.test(teacherPwdInput)) {
                        setErrorMsg("密碼需至少10碼且含英數字"); return;
                    }
                    await db.collection('sessions').doc(SESSION_ID).set({ teacherPassword: teacherPwdInput }, { merge: true });
                } else {
                    if (teacherPwdInput !== sessionData?.teacherPassword) {
                        setErrorMsg("密碼錯誤"); return;
                    }
                }
                setRole('teacher');
                setShowTeacherAuth(false);
            };

            if (loading) return <div className="h-screen flex items-center justify-center">載入中...</div>;

            if (!user) {
                return (
                    <div className="h-screen flex items-center justify-center bg-gray-100 p-4">
                        <div className="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
                            <Icons.Award />
                            <h1 className="text-2xl font-bold mt-4 mb-2">課堂共同評分系統 v3.5</h1>
                            <p className="text-gray-500 mb-6">請使用學校 Google 帳號登入</p>
                            {errorMsg && <div className="bg-red-50 text-red-600 p-3 rounded mb-4 text-sm text-left whitespace-pre-wrap">{errorMsg}</div>}
                            <button onClick={handleLogin} className="w-full py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 flex items-center justify-center gap-2">
                                <Icons.User /> Google 登入
                            </button>
                        </div>
                    </div>
                );
            }

            if (!role) {
                return (
                    <div className="h-screen flex flex-col items-center justify-center bg-gray-50 p-4 gap-4">
                        <h2 className="text-xl font-bold mb-4">請選擇您的身份</h2>
                        <button onClick={() => setRole('student')} className="w-64 p-6 bg-white border-2 border-transparent hover:border-blue-500 rounded-xl shadow transition text-center">
                            <div className="flex justify-center text-blue-500 mb-2"><Icons.Users /></div>
                            <span className="font-bold text-lg">我是學生</span>
                        </button>
                        <button onClick={() => {
                            if (!sessionData?.teacherPassword) setIsSettingUpPwd(true);
                            else setIsSettingUpPwd(false);
                            setShowTeacherAuth(true);
                            setTeacherPwdInput('');
                            setErrorMsg(null);
                        }} className="w-64 p-6 bg-white border-2 border-transparent hover:border-purple-500 rounded-xl shadow transition text-center">
                            <div className="flex justify-center text-purple-500 mb-2"><Icons.Key /></div>
                            <span className="font-bold text-lg">我是老師</span>
                        </button>
                        <button onClick={() => auth.signOut()} className="mt-8 text-gray-500 underline">登出</button>

                        {showTeacherAuth && (
                            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
                                <div className="bg-white p-6 rounded-xl w-full max-w-sm animate-fade-in">
                                    <h3 className="text-xl font-bold mb-4 flex gap-2 items-center"><Icons.Lock /> {isSettingUpPwd ? "設定管理密碼" : "輸入管理密碼"}</h3>
                                    {isSettingUpPwd && <p className="text-xs text-blue-600 mb-2">首次使用請設定 (至少10碼英數混合)</p>}
                                    <input type="password" value={teacherPwdInput} onChange={e=>setTeacherPwdInput(e.target.value)} className="w-full border p-2 rounded mb-2" placeholder="密碼" />
                                    {errorMsg && <p className="text-red-500 text-sm mb-2">{errorMsg}</p>}
                                    <div className="flex gap-2">
                                        <button onClick={()=>setShowTeacherAuth(false)} className="flex-1 bg-gray-100 py-2 rounded">取消</button>
                                        <button onClick={verifyTeacher} className="flex-1 bg-purple-600 text-white py-2 rounded">確認</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 pb-10">
                    <header className="bg-white shadow px-4 py-3 sticky top-0 z-20 flex justify-between items-center">
                        <div className="flex items-center gap-2 text-blue-600 font-bold text-3xl">
                            <Icons.Award /> 學生共同評分系統---阿發老師設計
                        </div>
                        <div className="flex items-center gap-3">
                            <span className="text-sm text-gray-600 truncate max-w-[100px]">{user.displayName}</span>
                            <button onClick={()=>auth.signOut()} className="text-gray-500"><Icons.LogOut /></button>
                        </div>
                    </header>
                    <main className="max-w-5xl mx-auto p-4">
                        {role === 'teacher' ? <TeacherDashboard session={sessionData} /> : <StudentView session={sessionData} user={user} />}
                    </main>
                </div>
            );
        }

        // --- Teacher Dashboard ---
        function TeacherDashboard({ session }) {
            const [activeTab, setActiveTab] = React.useState('control'); 
            const [votes, setVotes] = React.useState([]);
            const [groups, setGroups] = React.useState([]); 
            const [batchGroups, setBatchGroups] = React.useState('');
            const [batchStudents, setBatchStudents] = React.useState('');
            const [newCriName, setNewCriName] = React.useState('');
            const [newCriMax, setNewCriMax] = React.useState(10);
            const [monitorGroupId, setMonitorGroupId] = React.useState(null);
            const [newGroupName, setNewGroupName] = React.useState('');

            React.useEffect(() => {
                if (session) {
                    setGroups(session.groups || []);
                }
            }, [session]);

            React.useEffect(() => {
                const unsub = db.collection('sessions').doc(SESSION_ID).collection('votes').onSnapshot(snap => {
                    const data = [];
                    snap.forEach(d => data.push({id: d.id, ...d.data()}));
                    setVotes(data);
                });
                return () => unsub();
            }, []);

            const updateSession = (data) => db.collection('sessions').doc(SESSION_ID).set(data, { merge: true });

            if (!session) return <div className="p-10 text-center text-gray-500">正在讀取資料...</div>;

            const handleBatchGroups = async () => {
                const list = batchGroups.split('\n').map(s=>s.trim()).filter(s=>s);
                const newGroups = list.map(name => ({ id: `g${Date.now()}_${Math.random().toString(36).substr(2,5)}`, name }));
                await updateSession({ groups: [...(session.groups||[]), ...newGroups] });
                setBatchGroups('');
                alert(`已新增 ${newGroups.length} 個組別`);
            };

            const handleBatchStudents = async () => {
                const list = batchStudents.split('\n').map(s=>s.trim()).filter(s=>s);
                const currentSet = new Set(session.students || []);
                list.forEach(name => currentSet.add(name));
                await updateSession({ students: Array.from(currentSet) });
                setBatchStudents('');
                alert(`名單更新完成，目前共 ${currentSet.size} 人`);
            };

            const addSingleGroup = async () => {
                if (!newGroupName.trim()) return;
                const newGroup = { id: `g${Date.now()}`, name: newGroupName };
                await updateSession({ groups: [...(session.groups||[]), newGroup] });
                setNewGroupName('');
            };

            const addCriteria = async () => {
                if(!newCriName) return;
                const newC = { id: `c_${Date.now()}`, name: newCriName, max: parseInt(newCriMax) };
                await updateSession({ criteria: [...(session.criteria||[]), newC] });
                setNewCriName('');
            };

            const removeCriteria = async (id) => {
                if(!confirm("確定刪除此評分項目？")) return;
                await updateSession({ criteria: session.criteria.filter(c => c.id !== id) });
            };

            // 修改：軟刪除 (標記 isDeleted)
            const deleteVote = async (voteId) => {
                if(!confirm("確定要將此評分標記為不採計嗎？(不會物理刪除，Excel 仍可匯出)")) return;
                await db.collection('sessions').doc(SESSION_ID).collection('votes').doc(voteId).update({ isDeleted: true });
            };

            const handleRemoveStudent = async (nameToRemove) => {
                if(!confirm(`確定要刪除學生 "${nameToRemove}" 嗎？`)) return;
                const newStudents = (session.students || []).filter(s => s !== nameToRemove);
                await updateSession({ students: newStudents });
            };

            const handleClearStudents = async () => {
                if(!confirm("警告：確定要清空所有學生名單嗎？這將導致所有學生需重新登入綁定。")) return;
                await updateSession({ students: [], studentMappings: {} });
            };

            const handleClearGroups = async () => {
                if(!confirm("警告：確定要清空所有組別嗎？相關的評分紀錄可能會失去關聯。")) return;
                await updateSession({ groups: [], currentGroupId: null });
            };

            // 新增：重置所有評分
            const handleResetVotes = async () => {
                if (!confirm("警告：這將清除所有學生的評分紀錄，且無法復原！確定要重置嗎？")) return;
                
                try {
                    const votesRef = db.collection('sessions').doc(SESSION_ID).collection('votes');
                    const snapshot = await votesRef.get();
                    
                    // Firestore batch 最多 500 筆，若數量大需分批，這裡簡化處理
                    const batch = db.batch();
                    snapshot.docs.forEach((doc) => {
                        batch.delete(doc.ref);
                    });
                    
                    await batch.commit();
                    alert("所有評分紀錄已清除。");
                } catch (e) {
                    console.error(e);
                    alert("重置失敗，請稍後再試。");
                }
            };

            const loggedInCount = Object.keys(session.studentMappings || {}).length;
            const currentGroupVotes = votes.filter(v => v.groupId === session.currentGroupId && !v.isDeleted); // 過濾掉已刪除的
            
            const allTotals = (session.students || []).map(studentName => {
                if (!session.currentGroupId) return null;
                // 過濾掉被標記刪除的
                const vote = votes.find(v => v.groupId === session.currentGroupId && v.userName === studentName && !v.isDeleted);
                if (!vote) return null;
                let sum = 0;
                (session.criteria || []).forEach(c => sum += (vote.scores[c.id] || 0));
                return sum;
            }).filter(score => score !== null).sort((a, b) => b - a); 

            const getScoreColor = (score) => {
                if (allTotals.length === 0) return "text-gray-800";
                const rank = allTotals.indexOf(score); 
                if (rank < 3) return "text-red-600 font-bold";
                const reverseRank = allTotals.lastIndexOf(score);
                if (reverseRank >= allTotals.length - 3 && allTotals.length >= 3) return "text-green-600 font-bold";
                return "text-gray-800";
            };

            return (
                <div className="space-y-6">
                    <div className="flex bg-white rounded-lg p-1 shadow-sm overflow-x-auto">
                        {[{id: 'control', label: '控制台'}, {id: 'setup', label: '名單設定'}, {id: 'criteria', label: '評分標準'}, {id: 'monitor', label: '監控與修正'}, {id: 'results', label: '結果統計'}]
                        .map(t => (

                    {/* 傳入 session.criteria || DEFAULT_CRITERIA 以防萬一 */}

        function StudentView({ session, user }) {
            const [selectedName, setSelectedName] = React.useState('');
            const [hasVoted, setHasVoted] = React.useState(false);
            const [scores, setScores] = React.useState({});
            const [submitting, setSubmitting] = React.useState(false);

            const registeredName = session?.studentMappings?.[user.uid];

            React.useEffect(() => {
                if (registeredName && session?.currentGroupId) {
                    const unsub = db.collection('sessions').doc(SESSION_ID).collection('votes')
                        .where('groupId', '==', session.currentGroupId)
                        .where('userId', '==', user.uid)
                        .onSnapshot(snap => setHasVoted(!snap.empty));
                    return () => unsub();
                } else {
                    setHasVoted(false);
                    setScores({});
                }
            }, [session?.currentGroupId, user.uid, registeredName]);

            if (!session) return <div className="h-screen flex items-center justify-center text-gray-500">連結教室中...</div>;

            const handleRegister = async () => {
                if (!selectedName) return;
                const isTaken = Object.values(session.studentMappings || {}).includes(selectedName);
                if (isTaken) { alert("此姓名已被其他裝置綁定！"); return; }
                const update = {};
                update[`studentMappings.${user.uid}`] = selectedName;
                await db.collection('sessions').doc(SESSION_ID).update(update);
            };

            const submitVote = async () => {
                if (session.criteria.some(c => scores[c.id] === undefined)) { alert("請完成所有評分項目！"); return; }
                setSubmitting(true);
                try {
                    await db.collection('sessions').doc(SESSION_ID).collection('votes').add({
                        userId: user.uid, userName: registeredName, groupId: session.currentGroupId, scores, timestamp: firebase.firestore.FieldValue.serverTimestamp(), isDeleted: false
                    });
                    setHasVoted(true);
                } catch(e) { alert("送出失敗"); } finally { setSubmitting(false); }
            };

            if (!registeredName) {
                const availableStudents = (session.students || []).filter(name => !Object.values(session.studentMappings || {}).includes(name));
                return (
                    <div className="max-w-md mx-auto bg-white rounded-xl shadow p-8 text-center mt-10">
                        <Icons.User />
                        <h2 className="text-xl font-bold mt-4 mb-2">歡迎，請確認您的身分</h2>
                        {(session.students||[]).length === 0 ? (
                            <div className="text-center text-red-500 bg-red-50 p-4 rounded">
                                老師尚未建立學生名單，請通知老師。
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <select className="w-full p-3 border rounded-lg bg-gray-50" value={selectedName} onChange={e=>setSelectedName(e.target.value)}>
                                    <option value="">-- 請選擇您的姓名 --</option>
                                    {availableStudents.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <button onClick={handleRegister} disabled={!selectedName} className="w-full py-3 bg-blue-600 text-white rounded-lg font-bold disabled:bg-gray-300">確認綁定</button>
                            </div>
                        )}
                    </div>
                );
            }

            if (session.showResults) return <ResultsBoard session={session} groups={session.groups} criteria={session.criteria} isAdmin={false} />;

            if (!session.currentGroupId) return (
                <div className="text-center py-20 bg-white rounded-xl shadow">
                    <div className="text-blue-600 font-bold mb-2 text-lg">嗨，{registeredName}</div>
                    <div className="text-gray-300 flex justify-center mb-4"><Icons.Lock /></div>
                    <h2 className="font-bold text-xl">等待評分開始...</h2>
                </div>
            );

            if (hasVoted) return (
                <div className="text-center py-20 bg-green-50 rounded-xl shadow">
                    <div className="text-green-600 flex justify-center mb-4"><Icons.CheckCircle /></div>
                    <h2 className="font-bold text-xl text-green-800">評分已送出！</h2>
                    <p className="text-green-600 mt-2">休息一下，等待下一組。</p>
                </div>
            );

            const currentGroup = session.groups.find(g => g.id === session.currentGroupId);
            return (
                <div className="bg-white rounded-xl shadow-lg p-6 space-y-8 animate-fade-in">
                    <div className="border-b pb-4">
                        <div className="text-gray-500 text-xs font-bold mb-1">評分者：{registeredName}</div>
                        <h2 className="text-2xl font-bold text-blue-800">正在評分：{currentGroup?.name}</h2>
                    </div>
                    {session.criteria.map(c => (
                        <div key={c.id} className="space-y-2">
                            <div className="flex justify-between">
                                <label className="font-bold text-lg text-gray-700">{c.name}</label>
                                <span className="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500">最高 {c.max} 分</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <input type="range" min="0" max={c.max} step="1" value={scores[c.id] || 0} onChange={e => setScores({...scores, [c.id]: parseInt(e.target.value)})} className="w-full h-4 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                <div className="w-12 h-12 flex items-center justify-center bg-blue-50 text-blue-700 font-bold text-xl rounded-lg border border-blue-100 shadow-sm">{scores[c.id] || 0}</div>
                            </div>
                        </div>
                    ))}
                    <button onClick={submitVote} disabled={submitting} className="w-full py-4 bg-blue-600 text-white rounded-xl font-bold shadow hover:bg-blue-700 hover:shadow-lg transition-all active:scale-95 disabled:bg-gray-400">
                        {submitting ? '資料傳送中...' : '確認送出分數'}
                    </button>
                </div>
            );
        }

        function ResultsBoard({ session, groups, criteria, isAdmin }) {
            const [results, setResults] = React.useState([]);
            const [allVotes, setAllVotes] = React.useState([]);

            React.useEffect(() => {
                db.collection('sessions').doc(SESSION_ID).collection('votes').get().then(snap => {
                    const votesData = [];
                    snap.forEach(d => votesData.push(d.data()));
                    setAllVotes(votesData);

                    const groupStats = {};
                    votesData.forEach(v => {
                        // 這裡只計算有效票 (isDeleted: false)
                        if (v.isDeleted) return;

                        if (!groupStats[v.groupId]) groupStats[v.groupId] = { total: 0, count: 0 };
                        let vTotal = 0;
                        (criteria||[]).forEach(c => vTotal += (v.scores[c.id] || 0));
                        groupStats[v.groupId].total += vTotal;
                        groupStats[v.groupId].count++;
                    });
                    const res = (groups||[]).map(g => ({
                        ...g, avg: groupStats[g.id]?.count ? (groupStats[g.id].total / groupStats[g.id].count).toFixed(2) : "0.00"
                    })).sort((a, b) => b.avg - a.avg);
                    setResults(res);
                });
            }, [session, groups, criteria]);

            // 匯出 Excel 功能 (xlsx-js-style)
            const handleExportExcel = () => {
                const wb = XLSX.utils.book_new();

                // 邊框樣式
                const borderStyle = {
                    top: { style: "thin", color: { rgb: "000000" } },
                    bottom: { style: "thin", color: { rgb: "000000" } },
                    left: { style: "thin", color: { rgb: "000000" } },
                    right: { style: "thin", color: { rgb: "000000" } }
                };

                // --- 1. 建立「最終排行榜」Sheet ---
                const rankingHeaders = ["名次", "組名稱", "平均總分"];
                const rankingData = results.map((r, i) => [i + 1, r.name, r.avg]);
                
                // 加上標題列 (需手動處理合併)
                const rankWsData = [
                    ["最終排行榜", "", ""], // Row 0 (A1)
                    rankingHeaders,         // Row 1
                    ...rankingData          // Row 2...
                ];
                
                const rankWs = XLSX.utils.aoa_to_sheet(rankWsData);

                // 設定合併儲存格 A1:C1
                rankWs['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 2 } }];

                // 設定欄寬
                rankWs['!cols'] = [
                    { wch: 12 }, // A 名次
                    { wch: 30 }, // B 組名
                    { wch: 15 }  // C 平均
                ];

                // 設定列高
                rankWs['!rows'] = [
                    { hpt: 30 }, // Row 0 標題
                    { hpt: 18 }, // Row 1 headers
                    ...rankingData.map(() => ({ hpt: 18 }))
                ];

                // 套用樣式
                const rankRange = XLSX.utils.decode_range(rankWs['!ref']);
                for (let R = rankRange.s.r; R <= rankRange.e.r; ++R) {
                    for (let C = rankRange.s.c; C <= rankRange.e.c; ++C) {
                        const cell_address = XLSX.utils.encode_cell({ r: R, c: C });
                        if (!rankWs[cell_address]) continue;
                        if (!rankWs[cell_address].s) rankWs[cell_address].s = {};
                        
                        rankWs[cell_address].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                        rankWs[cell_address].s.border = borderStyle;

                        // 大標題樣式
                        if (R === 0) {
                            rankWs[cell_address].s.font = { bold: true, sz: 14 };
                        }
                    }
                }
                XLSX.utils.book_append_sheet(wb, rankWs, "最終排行榜");


                // --- 2. 建立各組 Sheet ---
                groups.forEach(group => {
                    const groupVotes = allVotes.filter(v => v.groupId === group.id);
                    
                    const headers = ["評分學生", ...criteria.map(c => c.name), "總分", "備註"];
                    
                    const dataRows = groupVotes.map(v => {
                        const row = [v.userName];
                        let total = 0;
                        criteria.forEach(c => {
                            const score = v.scores[c.id] || 0;
                            row.push(score);
                            total += score;
                        });
                        row.push(total);
                        // 如果被刪除，加入備註
                        row.push(v.isDeleted ? "不採計" : "");
                        return row;
                    });

                    // 計算該組平均 (排除被刪除的)
                    let validTotalSum = 0;
                    let validCount = 0;
                    
                    // 注意：dataRows 和 groupVotes 索引是對應的
                    dataRows.forEach((row, index) => {
                        if (!groupVotes[index].isDeleted) {
                            validTotalSum += row[row.length - 2]; // 倒數第二欄是總分
                            validCount++;
                        }
                    });
                    
                    const groupAvg = validCount > 0 ? (validTotalSum / validCount).toFixed(1) : "0.0";

                    // 製作總表 (最後一列放平均)
                    const summaryRow = new Array(headers.length).fill("");
                    // 總分欄位索引 = headers.length - 2
                    // 左邊一格 = headers.length - 3
                    summaryRow[headers.length - 3] = "平均"; 
                    summaryRow[headers.length - 2] = groupAvg;

                    const allData = [headers, ...dataRows, summaryRow];
                    
                    const ws = XLSX.utils.aoa_to_sheet(allData);

                    // --- 套用樣式 ---
                    // 1. 欄寬: 12
                    ws['!cols'] = headers.map(() => ({ wch: 12 }));

                    // 2. 列高: 18 (換算 pt 約 18)
                    ws['!rows'] = allData.map(() => ({ hpt: 18 }));

                    const range = XLSX.utils.decode_range(ws['!ref']);
                    
                    for (let R = range.s.r; R <= range.e.r; ++R) {
                        for (let C = range.s.c; C <= range.e.c; ++C) {
                            const cell_address = XLSX.utils.encode_cell({ r: R, c: C });
                            if (!ws[cell_address]) continue;

                            if (!ws[cell_address].s) ws[cell_address].s = {};
                            
                            // 基礎樣式：置中 & 邊框
                            ws[cell_address].s.alignment = { horizontal: "center", vertical: "center", wrapText: true };
                            ws[cell_address].s.border = borderStyle;

                            // 備註欄 (最後一欄) -> 紅色字體
                            if (C === range.e.c) {
                                if (ws[cell_address].v === "不採計") {
                                    ws[cell_address].s.font = { color: { rgb: "FF0000" } };
                                }
                            }

                            // 總分欄 (倒數第二欄) -> 藍色字體 (排除最後一列的平均)
                            if (R > 0 && R < range.e.r && C === range.e.c - 1) {
                                ws[cell_address].s.font = { color: { rgb: "0000FF" } };
                            }

                            // 平均列 (最後一列)
                            if (R === range.e.r) {
                                // "平均" 標籤 (紅字粗體) - 位置在總分左邊
                                if (C === range.e.c - 2) {
                                    ws[cell_address].s.font = { color: { rgb: "FF0000" }, bold: true };
                                }
                                // 平均數值 (紅字) - 位置在總分欄
                                if (C === range.e.c - 1) {
                                    ws[cell_address].s.font = { color: { rgb: "FF0000" } };
                                }
                            }
                        }
                    }

                    let sheetName = group.name.replace(/[\\/?*\[\]]/g, ""); 
                    if(sheetName.length > 30) sheetName = sheetName.substring(0,30);
                    if(!sheetName) sheetName = `Group ${group.id}`;
                    
                    XLSX.utils.book_append_sheet(wb, ws, sheetName);
                });

                XLSX.writeFile(wb, "評分結果.xlsx");
            };

            return (
                <div className="bg-white p-6 rounded-xl shadow border border-gray-100">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold flex items-center gap-2 text-gray-800"><Icons.BarChart3 /> 最終排行榜</h2>
                        {isAdmin && (
                            <button 
                                onClick={handleExportExcel}
                                className="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 font-bold shadow transition-colors"
                            >
                                <Icons.Download /> 匯出 Excel 報表
                            </button>
                        )}
                    </div>

                    <div className="space-y-3">
                        {results.map((g, i) => (
                            <div key={g.id} className={`flex justify-between items-center p-4 rounded-xl transition-all ${i === 0 ? 'bg-yellow-50 border-2 border-yellow-300 transform scale-105' : 'border border-gray-100 bg-white'}`}>
                                <div className="flex items-center gap-4">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg text-white shadow ${i===0?'bg-yellow-400':i===1?'bg-gray-400':i===2?'bg-orange-400':'bg-gray-200 text-gray-500'}`}>{i+1}</div>
                                    <span className={`text-lg ${i===0 ? 'font-bold text-gray-900' : 'text-gray-700'}`}>{g.name}</span>
                                </div>
                                <div className="text-right">
                                    <span className="text-3xl font-bold text-blue-600 block">{g.avg}</span>
                                    <span className="text-xs text-gray-400">平均總分</span>
                                </div>
                            </div>
                        ))}
                    </div>
                    {!isAdmin && <div className="mt-4 text-center text-gray-400 text-xs">結果由老師公佈後顯示</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
