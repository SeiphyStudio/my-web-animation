<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>上課行為記錄</title>
    <style>
        /* 基礎版面設定 */
        body {
            font-family: "微軟正黑體", sans-serif;
            margin: 0;
            padding: 10px;
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px; 
            background-color: white;
            border: 2px solid #003366;
            padding: 15px;
            box-sizing: border-box;
        }

        /* --- 座位區設計 --- */
        .seating-area {
            display: grid;
            grid-template-columns: repeat(7, 1fr); 
            gap: 4px; 
            margin-bottom: 20px;
            position: relative;
        }

        /* 座位按鈕 */
        .seat {
            aspect-ratio: 1 / 1; 
            border: 2px solid #005b9f;
            background-color: white;
            font-size: 1.05rem; 
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 4px; 
            transition: 0.2s; 
            padding: 0;
        }

        /* 被選中的座位狀態 */
        .seat.selected {
            background-color: #ffe066; 
            border-color: #d4a000;
            font-weight: bold;
        }

        /* --- 行為區設計 --- */
        .behavior-area {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            margin-bottom: 20px;
        }

        /* 行為按鈕 */
        .behavior-btn {
            padding: 10px 5px; 
            font-size: 1.1rem;
            border: 2px solid black;
            cursor: pointer;
            text-align: center;
            border-radius: 4px;
            opacity: 0.6; 
        }

        .behavior-good { background-color: #a8d59d; }
        .behavior-bad { background-color: #f4c0a1; }

        .behavior-btn.active {
            opacity: 1; 
            border-width: 3px;
            font-weight: bold;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
        }

        /* --- 傳送按鈕設計 --- */
        .submit-btn {
            width: 100%;
            padding: 15px; 
            font-size: 1.5rem;
            background: linear-gradient(to bottom, #a0d8ef, #ccefff);
            border: 2px solid black;
            cursor: pointer;
            border-radius: 4px;
        }
        
        .submit-btn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        /* 訊息提示區 */
        #status-message {
            margin-top: 10px;
            color: #d93025;
            font-weight: bold;
            text-align: center;
            height: 20px;
            font-size: 0.95rem; 
        }

    </style>
</head>
<body>

<div class="container">
    <div id="status-message">請先選擇下方的「行為」喔！</div>

    <div class="seating-area" id="seats-container">
        <!-- Javascript 自動產生 -->
    </div>

    <div class="behavior-area">
        <div class="behavior-btn behavior-good" onclick="selectBehavior(this, '認真聽課')">認真聽課</div>
        <div class="behavior-btn behavior-good" onclick="selectBehavior(this, '積極搶答')">積極搶答</div>
        <div class="behavior-btn behavior-good" onclick="selectBehavior(this, '樂於助人')">樂於助人</div>
        <div class="behavior-btn behavior-bad" onclick="selectBehavior(this, '未帶物品')">未帶物品</div>
        <div class="behavior-btn behavior-bad" onclick="selectBehavior(this, '睡覺')">睡覺</div>
        <div class="behavior-btn behavior-bad" onclick="selectBehavior(this, '遲到')">遲到</div>
        <div class="behavior-btn behavior-bad" onclick="selectBehavior(this, '吵鬧')">吵鬧</div>
        <div class="behavior-btn behavior-bad" onclick="selectBehavior(this, '滑手機')">滑手機</div>
    </div>

    <button class="submit-btn" onclick="submitData()">傳送</button>
</div>

<script>
    let currentBehavior = ""; 
    let selectedSeatsArray = []; 

    function generateSeats() {
        const container = document.getElementById('seats-container');
        for (let i = 1; i <= 49; i++) {
            let seatNumber = i < 10 ? '0' + i : i.toString(); 
            let btn = document.createElement('button');
            btn.className = 'seat';
            btn.innerText = seatNumber;
            btn.onclick = function() { toggleSeat(btn, seatNumber); };
            container.appendChild(btn);
        }
    }

    function selectBehavior(element, behaviorName) {
        document.querySelectorAll('.behavior-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
        currentBehavior = behaviorName;
        document.getElementById('status-message').innerText = `目前選擇：【${currentBehavior}】，請點選座位。`;
        document.getElementById('status-message').style.color = "#188038"; 
    }

    function toggleSeat(seatElement, seatNumber) {
        if (currentBehavior === "") {
            alert("老師，請先選擇下方的『行為』，才能選學生喔！");
            return;
        }
        let index = selectedSeatsArray.indexOf(seatNumber);
        if (index === -1) {
            selectedSeatsArray.push(seatNumber);
            seatElement.classList.add('selected');
        } else {
            selectedSeatsArray.splice(index, 1);
            seatElement.classList.remove('selected');
        }
    }

    // --- 4. 傳送資料到 Google 試算表 ---
    function submitData() {
        if (currentBehavior === "") {
            alert("請先選擇行為！");
            return;
        }
        if (selectedSeatsArray.length === 0) {
            alert("請至少選擇一位學生！");
            return;
        }

        // ⚠️⚠️⚠️ 老師的作業：請把下面這行引號內的文字，換成你剛剛部署的 Web App 網址 ⚠️⚠️⚠️
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwRnG7INEkEKXdpc2gI7TsAE-mD_ltGBq46vn1dd-eKlpHfxxLSSLu7Qz8JrO8_BkOF/exec'; 

        // 把按鈕變成「傳送中」，避免不小心連按兩次
        const submitBtn = document.querySelector('.submit-btn');
        submitBtn.innerText = "傳送中...";
        submitBtn.disabled = true;

        // 打包準備好的包裹
        const data = {
            behavior: currentBehavior,
            seats: selectedSeatsArray.sort()
        };

        // 呼叫快遞員 (使用 fetch API)
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // 【老師新增】：避免瀏覽器報錯跨域問題 (CORS)
            // 將 JavaScript 物件轉成字串
            body: JSON.stringify(data), 
            // 加上 text/plain 可以避免瀏覽器安全機制的跨域阻擋 (CORS)
            headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
        })
        .then(response => {
            // 如果成功送達
            alert("✅ 成功！資料已經送到試算表囉！");
            resetForm();
        })
        .catch(error => {
            // 如果運送過程出錯
            alert("❌ 傳送失敗，請檢查網址設定是否正確。");
            console.error('Error!', error.message);
        })
        .finally(() => {
            // 不管成功或失敗，都把按鈕恢復原狀
            submitBtn.innerText = "傳送";
            submitBtn.disabled = false;
        });
    }

    function resetForm() {
        currentBehavior = "";
        selectedSeatsArray = [];
        document.querySelectorAll('.behavior-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.seat').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('status-message').innerText = "請先選擇下方的「行為」喔！";
        document.getElementById('status-message').style.color = "#d93025";
    }

    window.onload = generateSeats;

</script>
</body>
</html>
