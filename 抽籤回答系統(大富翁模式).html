<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽籤回答系統(大富翁模式)</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0f4f8;
            overflow: hidden; /* Prevent scrolling during play */
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 4px;
        }

        /* Setup Screen Styles */
        .setup-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
        }

        .board-container {
            display: grid;
            gap: 6px;
            width: 98vw;
            height: 96vh;
            margin: auto;
            padding: 10px;
        }

        .cell {
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900; 
            /* 橫式字體修改成 0.7 倍 (原本為 clamp(0.7rem, 2vw, 2.2rem)) */
            font-size: clamp(0.49rem, 1.4vw, 1.54rem); 
            position: relative;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
            transition: all 0.1s;
            overflow: hidden;
            line-height: 1.1;
            background-color: white; 
            z-index: 1;
            word-break: break-all;
            text-align: center;
            padding: 4px;
        }

        .cell-removed {
            background-color: #374151 !important; 
            color: #9ca3af !important; 
            border-color: #4b5563 !important;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .cell-vertical {
            writing-mode: vertical-rl;
            text-orientation: upright;
            padding: 4px; 
            justify-content: center; 
            align-items: center;    
            letter-spacing: -2px; 
            /* 直式字體修改成 1.2 倍 (原本為 clamp(0.7rem, 2.5vh, 2.2rem)) */
            font-size: clamp(0.84rem, 3vh, 2.64rem); 
        }

        .tcy {
            text-combine-upright: all;
            margin: 4px 0; 
            font-size: 0.8em; 
        }

        .cell-horizontal {
            flex-direction: row;
            padding: 0 4px;
            text-align: center;
            white-space: nowrap; 
        }

        .active-cell {
            transform: scale(1.05) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.6) !important; 
            z-index: 50 !important;
            border-color: #ef4444 !important; 
            border-width: 6px !important;
        }

        .center-panel {
            grid-column: 2 / -2;
            grid-row: 2 / -2;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            backdrop-filter: blur(5px);
            border: 1px solid #e2e8f0;
            z-index: 20;
        }

        .dice-cube {
            width: 70px;
            height: 70px;
            background: white;
            border: 4px solid #333;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 6px 0px #333;
            margin: 0 8px;
            transition: transform 0.1s;
        }
        
        .dice-rolling {
            animation: shake 0.3s infinite;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(10deg); }
            50% { transform: rotate(0deg); }
            75% { transform: rotate(-10deg); }
            100% { transform: rotate(0deg); }
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .popup-overlay {
            animation: fadeInOverlay 0.3s ease-out forwards;
        }
        @keyframes fadeInOverlay {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-content {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Card Styles */
        .action-card {
            border: 3px solid #111;
            box-shadow: 4px 4px 0px #111;
            transition: transform 0.1s, box-shadow 0.1s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .action-card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #111;
        }
        .card-vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 5px;
            font-weight: 900;
        }
        
        /* Control Buttons (Black border style) */
        .btn-black-border {
            border: 2px solid #111;
            box-shadow: 3px 3px 0px #111;
            font-weight: bold;
            transition: all 0.1s;
        }
        .btn-black-border:active {
            transform: translate(2px, 2px) !important;
            box-shadow: 1px 1px 0px #111 !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Sound System (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const playTone = (freq, type, duration, vol = 0.1) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        };

        const playSound = (type) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            switch (type) {
                case 'roll':
                    const now = audioCtx.currentTime;
                    for(let i=0; i<5; i++) {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.frequency.value = 200 + Math.random() * 500;
                        gain.gain.setValueAtTime(0.05, now + i*0.05);
                        gain.gain.linearRampToValueAtTime(0, now + i*0.05 + 0.03);
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.start(now + i*0.05);
                        osc.stop(now + i*0.05 + 0.05);
                    }
                    break;
                case 'step':
                    playTone(600, 'sine', 0.05, 0.1); 
                    break;
                case 'win':
                    playTone(523.25, 'triangle', 0.6, 0.3); 
                    setTimeout(() => playTone(659.25, 'triangle', 0.6, 0.3), 100);
                    setTimeout(() => playTone(783.99, 'triangle', 0.6, 0.3), 200);
                    setTimeout(() => playTone(1046.50, 'triangle', 1.2, 0.4), 300);
                    break;
                case 'draw-chance':
                    playTone(659.25, 'sine', 0.2, 0.2); 
                    setTimeout(() => playTone(880, 'sine', 0.4, 0.3), 150); 
                    break;
                case 'draw-fate':
                    playTone(440, 'triangle', 0.2, 0.2); 
                    setTimeout(() => playTone(329.63, 'triangle', 0.4, 0.3), 150); 
                    break;
                case 'teleport-start':
                    playTone(400, 'sine', 0.1, 0.1);
                    setTimeout(() => playTone(500, 'sine', 0.1, 0.1), 100);
                    setTimeout(() => playTone(600, 'sine', 0.4, 0.1), 200);
                    break;
                case 'teleport-end':
                    playTone(880, 'triangle', 0.15, 0.2);
                    setTimeout(() => playTone(1046.50, 'triangle', 0.3, 0.2), 150);
                    break;
            }
        };

        const CELL_COLORS = [
            "#FFD1DC", "#FFDFD3", "#FFFFBA", "#D0F0C0", 
            "#BAE1FF", "#E6E6FA", "#F0E68C", "#FFB7B2"
        ];

        const INITIAL_CHANCE_TEXT = `下一位抽到的同學答對，加1分\n下一位抽到的同學答對，加2分\n下一位抽到的同學答對，加3分\n下一位抽到的同學答對，平時成績直接加5分 (大獎！)\n下一位抽到的同學答對，老師唱歌\n下一位抽到的同學答對，全班起立鼓掌\n下一位抽到的同學答對，他左邊的同學講笑話\n下一位抽到的同學答對，他右邊的同學青蛙跳3下\n下一位抽到的同學答對，獲得「免死金牌」一張\n下一位抽到的同學答對，老師請喝飲料 (超級大獎！)\n下一位抽到的同學答對，他與好哥們(或好姊妹)共3人一起加2分\n下一位抽到的同學答對，可以指定下一個回答問題的幸運兒\n下一位抽到的同學答對，獲得「作業減半」卡一張\n下一位抽到的同學答對，老師跳一段抖音舞\n下一位抽到的同學答對，今天下課提早1分鐘\n下一位抽到的同學答對，獲得一張「Pass卡」(可無條件略過一次問題)\n下一位抽到的同學答對，全班給予愛的鼓勵\n下一位抽到的同學答對，老師代替該同學做5個伏地挺身\n下一位抽到的同學答對，該同學可以問老師一個與課程無關的八卦問題\n下一位抽到的同學答對，獲得「求救卡」一張 (未來可指定同學代答)\n下一位抽到的同學答對，該同學今天的筆記可以少寫一頁\n下一位抽到的同學答對，前後左右的同學一起歡呼「你最棒！」\n下一位抽到的同學答對，老師必須真誠地稱讚該同學30秒\n下一位抽到的同學答對，全班一起唱生日快樂歌 (就當他生日吧)\n下一位抽到的同學答對，該同學可以選擇今天的下課音樂\n下一位抽到的同學答對，老師模仿一種動物叫聲\n下一位抽到的同學答對，請上台跟老師擊掌\n下一位抽到的同學答對，可以上台跟老師自拍合照\n這節課只上到這裡\n老師請全班喝飲料\n全班加1分`;

        const INITIAL_FATE_TEXT = `下一位抽到的同學答錯，扣1分\n下一位抽到的同學答錯，扣2分\n下一位抽到的同學答錯，扣3分\n下一位抽到的同學答錯，當值日生1天\n下一位抽到的同學答錯，當值日生3天\n下一位抽到的同學答錯，負責擦黑板一星期\n下一位抽到的同學答錯，全班罰站1分鐘\n下一位抽到的同學答錯，該同學罰站到下課\n下一位抽到的同學答錯，直接當掉 (開玩笑的，平時成績扣3分)\n下一位抽到的同學答錯，免死金牌加持 (意想不到的幸運反轉！)\n下一位抽到的同學答錯，該同學深蹲10下\n下一位抽到的同學答錯，他左邊的同學連帶扣1分 (連坐法)\n下一位抽到的同學答錯，他右邊的同學連帶扣1分 (連坐法)\n下一位抽到的同學答錯，他與好哥們(或好姊妹)共3人一起扣2分\n下一位抽到的同學答錯，該同學要大聲對全班說「對不起，我上課沒專心」\n下一位抽到的同學答錯，該同學要把這題的正確答案抄在黑板上3次\n下一位抽到的同學答錯，該同學要負責倒今天教室的垃圾\n下一位抽到的同學答錯，老師再多問一個進階問題 (奪命連環問)\n下一位抽到的同學答錯，該同學要對全班做鬼臉保持10秒\n下一位抽到的同學答錯，該同學的座位移到講台旁邊(VIP特等席)一節課\n下一位抽到的同學答錯，該同學要請全班每人一顆糖果\n下一位抽到的同學答錯，全班一起大笑他三聲「哈哈哈」\n下一位抽到的同學答錯，該同學要模仿老師的一句口頭禪\n下一位抽到的同學答錯，該同學要畫一張自畫像貼在黑板旁\n下一節課小考\n這節課晚5分鐘下課`;

        // --- Helper Functions ---
        const generateRingCoordinates = (totalCells) => {
            const semiPerimeter = (totalCells + 4) / 2;
            let h = Math.floor(semiPerimeter / 3.2); 
            if (h < 3) h = 3; 
            let w = Math.ceil(semiPerimeter - h);
            
            const calculatedTotal = 2*w + 2*h - 4;
            const diff = totalCells - calculatedTotal;
            w += Math.ceil(diff / 2);
            
            const coords = [];
            for (let i = 0; i < w; i++) coords.push({ x: i + 1, y: 1, type: 'top' });
            for (let i = 1; i < h; i++) coords.push({ x: w, y: i + 1, type: 'right' });
            for (let i = w - 2; i >= 0; i--) coords.push({ x: i + 1, y: h, type: 'bottom' });
            for (let i = h - 2; i > 0; i--) coords.push({ x: 1, y: i + 1, type: 'left' });

            return { w, h, coords: coords.slice(0, totalCells) };
        };

        const App = () => {
            const [view, setView] = useState('setup');

            const [inputNames, setInputNames] = useState("01 陳冠宇\n02 林雅婷\n03 黃柏翰\n04 張雅涵\n05 李彥廷\n06 王怡君\n07 吳柏睿\n08 劉佳穎\n09 蔡承恩\n10 楊詩雅\n11 許家宇\n12 鄭鈺婷\n13 謝哲睿\n14 洪欣妤\n15 郭宇軒\n16 邱佳蓉\n17 曾智偉\n18 廖慧君\n19 賴宗翰\n20 徐佩蓉\n21 潘俊傑\n22 葉美玲\n23 彭家豪\n24 莊美惠\n25 蘇志偉\n26 蕭淑芬\n27 簡志明\n28 鐘淑惠\n29 羅子軒\n30 高子涵\n31 陳恩熙\n32 林靖雯\n33 黃語彤\n34 張宇傑\n35 李柏宏\n36 王柏勳\n37 吳家瑋\n38 劉芷瑜\n39 蔡承翰\n40 楊品妤");
            const [numDice, setNumDice] = useState(2);
            const [chanceCellCount, setChanceCellCount] = useState(3);
            const [fateCellCount, setFateCellCount] = useState(3);
            const [chanceText, setChanceText] = useState(INITIAL_CHANCE_TEXT);
            const [fateText, setFateText] = useState(INITIAL_FATE_TEXT);
            
            const [showSaveModal, setShowSaveModal] = useState(false);
            const [showDeckModal, setShowDeckModal] = useState(false);
            const [saveStatus, setSaveStatus] = useState("");
            
            const [activeSlotIndex, setActiveSlotIndex] = useState(0);
            const [slotNameInput, setSlotNameInput] = useState("");

            const [savedSlots, setSavedSlots] = useState(() => {
                const stored = localStorage.getItem('monopoly_classes_data');
                return stored ? JSON.parse(stored) : [null, null, null, null, null];
            });

            useEffect(() => {
                if (showSaveModal) {
                    setSlotNameInput(savedSlots[activeSlotIndex]?.name || "");
                }
            }, [activeSlotIndex, showSaveModal, savedSlots]);

            const [namesList, setNamesList] = useState([]);
            const [boardConfig, setBoardConfig] = useState({ w: 10, h: 8, coords: [] });
            const [currentPos, setCurrentPos] = useState(0);
            const [isMoving, setIsMoving] = useState(false);
            const [lastRoll, setLastRoll] = useState([1, 1]); 
            const [gameMessage, setGameMessage] = useState("準備開始物理課抽籤！");
            const [skipSpecial, setSkipSpecial] = useState(false); 
            
            const [chanceHistory, setChanceHistory] = useState([]);
            const [fateHistory, setFateHistory] = useState([]);
            
            const [showWinner, setShowWinner] = useState(false);
            const [winnerInfo, setWinnerInfo] = useState({ name: "", index: -1 });
            const [drawnCard, setDrawnCard] = useState({ show: false, type: '', text: '' });
            
            useEffect(() => {
                if(window.lucide) window.lucide.createIcons();
            }, [view, lastRoll, showSaveModal, showDeckModal, drawnCard, skipSpecial, namesList]);

            useEffect(() => {
                localStorage.setItem('monopoly_classes_data', JSON.stringify(savedSlots));
            }, [savedSlots]);

            useEffect(() => {
                setLastRoll(prev => {
                    if (prev.length === numDice) return prev;
                    return Array.from({ length: numDice }, () => 1);
                });
            }, [numDice]);

            const getNextValidPos = (startPos, direction = 1) => {
                let next = (startPos + direction + namesList.length) % namesList.length;
                let attempts = 0;
                
                while (attempts < namesList.length) {
                    const item = namesList[next];
                    if (!item) break; 

                    const isSpecialCell = item.name === '機會' || item.name === '命運' || item.name === '任意門';
                    const shouldSkip = item.removed || (skipSpecial && isSpecialCell);

                    if (!shouldSkip) {
                        break; 
                    }

                    next = (next + direction + namesList.length) % namesList.length;
                    attempts++;
                }

                if (attempts >= namesList.length) return startPos; 
                return next;
            };

            const handleStartGame = () => {
                let names = inputNames.split(/[\n,]+/).map(n => n.trim()).filter(n => n);
                let finalContentStrings = [...names];
                
                const cardsToInsert = [];
                const cCount = parseInt(chanceCellCount) || 0;
                for (let i = 0; i < cCount; i++) {
                    cardsToInsert.push("機會");
                }
                const fCount = parseInt(fateCellCount) || 0;
                for (let i = 0; i < fCount; i++) {
                    cardsToInsert.push("命運");
                }

                cardsToInsert.sort(() => Math.random() - 0.5);

                for (const card of cardsToInsert) {
                    const randomIndex = Math.floor(Math.random() * (finalContentStrings.length + 1));
                    finalContentStrings.splice(randomIndex, 0, card);
                }

                const baseCount = finalContentStrings.length; 
                const doorCount = (baseCount % 2 === 0) ? 2 : 3; 

                let mixItems = [...finalContentStrings];
                if (doorCount === 3) {
                    const randomIndex = Math.floor(Math.random() * (mixItems.length + 1));
                    mixItems.splice(randomIndex, 0, "任意門");
                }

                const numTotal = Math.max(4, mixItems.length + 2); 
                
                while(mixItems.length < numTotal - 2) {
                    mixItems.push("空");
                }

                const config = generateRingCoordinates(numTotal);
                const { w, h } = config;
                
                const topLeftIndex = 0;
                const bottomRightIndex = w + h - 2;

                const finalList = new Array(numTotal).fill(null);
                finalList[topLeftIndex] = { name: '任意門', removed: false, fixed: true };
                finalList[bottomRightIndex] = { name: '任意門', removed: false, fixed: true };

                let mixIdx = 0;
                for (let i = 0; i < numTotal; i++) {
                    if (finalList[i] === null) {
                        finalList[i] = { name: mixItems[mixIdx], removed: false, fixed: false };
                        mixIdx++;
                    }
                }

                setNamesList(finalList);
                setBoardConfig(config);
                setCurrentPos(0);
                setGameMessage("地圖與任意門生成完畢，請投擲骰子！");
                
                setChanceHistory([]);
                setFateHistory([]);
                
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                setView('play');
            };

            const handleCSVImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    setInputNames(event.target.result);
                };
                reader.readAsText(file);
            };

            const handleSaveToCurrentSlot = () => {
                const finalName = slotNameInput.trim() || `自訂班級 ${activeSlotIndex + 1}`;
                const newData = { 
                    name: finalName,
                    inputNames, 
                    chanceCellCount: parseInt(chanceCellCount) || 0,
                    fateCellCount: parseInt(fateCellCount) || 0,
                    numDice: parseInt(numDice) || 2, 
                    chanceText,
                    fateText,
                    timestamp: new Date().toLocaleString('zh-TW', {hour12: false}) 
                };
                const newSlots = [...savedSlots];
                newSlots[activeSlotIndex] = newData;
                setSavedSlots(newSlots);
                setSaveStatus(`✅ 班級「${finalName}」已成功暫存！`);
                setTimeout(() => setSaveStatus(""), 3000);
            };

            const loadFromSlot = (index) => {
                const data = savedSlots[index];
                if (data) {
                    setInputNames(data.inputNames || "");
                    setChanceCellCount(data.chanceCellCount !== undefined ? parseInt(data.chanceCellCount) : 3);
                    setFateCellCount(data.fateCellCount !== undefined ? parseInt(data.fateCellCount) : 3);
                    setNumDice(parseInt(data.numDice) || 2);
                    setChanceText(data.chanceText || INITIAL_CHANCE_TEXT);
                    setFateText(data.fateText || INITIAL_FATE_TEXT);
                    
                    const className = data.name || `班級 ${index + 1}`;
                    setSaveStatus(`✅ 已載入「${className}」的設定`);
                    setTimeout(() => setSaveStatus(""), 3000);
                }
            };

            const handleLoadFromCurrentSlot = () => {
                if (!savedSlots[activeSlotIndex]) {
                    setSaveStatus(`⚠️ 槽位 ${activeSlotIndex + 1} 目前沒有資料喔！`);
                    setTimeout(() => setSaveStatus(""), 3000);
                    return;
                }
                loadFromSlot(activeSlotIndex);
            };

            const exportJSON = () => {
                const dataToExport = {
                    version: "1.3", 
                    exportDate: new Date().toISOString(),
                    slots: savedSlots
                };
                
                const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = '抽籤回答大富翁模式(備份).json';
                a.click();
                URL.revokeObjectURL(url);
                
                setSaveStatus("✅ 已下載備份檔 (JSON)");
                setTimeout(() => setSaveStatus(""), 3000);
            };

            const importJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        if (parsed && parsed.slots && Array.isArray(parsed.slots)) {
                            const newSlots = parsed.slots.slice(0, 5);
                            while(newSlots.length < 5) newSlots.push(null);
                            
                            setSavedSlots(newSlots);
                            setSaveStatus("✅ 備份檔匯入成功！請從上方或班級選單讀取。");
                            setTimeout(() => setSaveStatus(""), 3000);
                        } else {
                            throw new Error("格式不正確");
                        }
                    } catch(err) {
                        setSaveStatus("❌ 匯入失敗：檔案格式不對");
                        console.error(err);
                    }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            const handleWin = (finalIndex) => {
                const landedObj = namesList[finalIndex];

                if (landedObj.name === '任意門') {
                    playSound('teleport-start');
                    setGameMessage("🚪 進入任意門！時空傳送中...");
                    
                    const doorIndices = namesList
                        .map((item, idx) => item.name === '任意門' ? idx : -1)
                        .filter(idx => idx !== -1 && idx !== finalIndex);

                    if (doorIndices.length > 0) {
                        const targetIdx = doorIndices[Math.floor(Math.random() * doorIndices.length)];
                        
                        setTimeout(() => {
                            setCurrentPos(targetIdx);
                            playSound('teleport-end');
                            setGameMessage("✨ 傳送完成！請等待下一回合操作。");
                            setIsMoving(false); 
                        }, 1500);
                    } else {
                        setGameMessage("✨ 糟糕！任意門好像故障了！");
                        setIsMoving(false);
                    }
                    return; 
                }

                setIsMoving(false);
                playSound('win');
                setGameMessage(`✨ 抽中：${landedObj.name || '未知'} ✨`);
                
                if (landedObj.name === '機會' || landedObj.name === '命運') {
                    drawCard(landedObj.name);
                } else {
                    setWinnerInfo({ name: landedObj.name || "未知", index: finalIndex });
                    setShowWinner(true); 
                }
            };

            const rollDice = async () => {
                if (isMoving) return;
                
                const validPeopleCount = namesList.filter(item => !item.removed && item.name !== '機會' && item.name !== '命運' && item.name !== '任意門').length;
                if (validPeopleCount === 0) {
                    alert("所有名單皆已移除！請回到設定重新開始。");
                    return;
                }

                setIsMoving(true);
                setShowWinner(false);
                setGameMessage("🎲 骰子轉動中...");

                let rollDuration = 1200; 
                
                let rollInterval = setInterval(() => {
                    const tempRoll = Array.from({ length: numDice }, () => Math.floor(Math.random() * 6) + 1);
                    setLastRoll(tempRoll);
                    playSound('roll');
                }, 100);

                await new Promise(r => setTimeout(r, rollDuration));
                clearInterval(rollInterval);

                const finalRoll = Array.from({ length: numDice }, () => Math.floor(Math.random() * 6) + 1);
                setLastRoll(finalRoll);
                const steps = finalRoll.reduce((a, b) => a + b, 0);
                setGameMessage(`擲出了 ${steps} 點！準備移動...`);

                await new Promise(r => setTimeout(r, 500));
                setGameMessage(`位移開始 (目標 ${steps} 步)...`);

                let currentStep = 0;
                let delay = 200;

                const moveStep = () => {
                    if (currentStep < steps) {
                        setCurrentPos(prev => getNextValidPos(prev));
                        currentStep++;
                        playSound('step');
                        
                        delay += 50; 
                        setTimeout(moveStep, delay);
                    } else {
                         setCurrentPos(finalPos => {
                             handleWin(finalPos);
                             return finalPos;
                         });
                    }
                };

                moveStep();
            };

            const startSlotMachine = () => {
                if (isMoving) return;
                
                const validPeopleCount = namesList.filter(item => !item.removed && item.name !== '機會' && item.name !== '命運' && item.name !== '任意門').length;
                if (validPeopleCount === 0) {
                    alert("所有名單皆已移除！請回到設定重新開始。");
                    return;
                }

                setIsMoving(true);
                setShowWinner(false);
                setGameMessage("🎰 跑馬燈模式啟動！");

                const validIndices = namesList.map((item, index) => {
                    const isSpecialCell = item.name === '機會' || item.name === '命運' || item.name === '任意門';
                    const shouldSkip = item.removed || (skipSpecial && isSpecialCell);
                    return shouldSkip ? -1 : index;
                }).filter(i => i !== -1);
                
                const targetIndex = validIndices[Math.floor(Math.random() * validIndices.length)];
                const validCount = validIndices.length;
                let currentValidIndexInList = validIndices.indexOf(currentPos);
                if(currentValidIndexInList === -1) currentValidIndexInList = 0; 
                
                const targetValidIndexInList = validIndices.indexOf(targetIndex);
                
                let hops = (targetValidIndexInList - currentValidIndexInList + validCount) % validCount;
                if (hops === 0) hops = validCount; 
                hops += validCount * 3; 
                
                const totalSteps = hops;
                
                let currentStep = 0;
                let delay = 30; 

                const moveSlotStep = () => {
                    if (currentStep < totalSteps) {
                        setCurrentPos(prev => getNextValidPos(prev));
                        currentStep++;
                        playSound('step');
                        
                        if (currentStep > totalSteps * 0.7) {
                            delay += 15;
                        }

                        setTimeout(moveSlotStep, delay);
                    } else {
                        setCurrentPos(finalPos => {
                             handleWin(finalPos);
                             return finalPos;
                         });
                    }
                };

                moveSlotStep();
            };

            const shuffleNames = () => {
                const nonFixedItems = namesList.filter(item => !item.fixed);
                
                nonFixedItems.sort(() => Math.random() - 0.5);
                
                let nonFixedIdx = 0;
                const newNamesList = namesList.map(item => {
                    if (item.fixed) {
                        return item; 
                    } else {
                        return nonFixedItems[nonFixedIdx++]; 
                    }
                });
                
                setNamesList(newNamesList);
                setGameMessage("名單已打亂（起點與對角任意門不受影響）");
            };
            
            const handleKeepUser = () => {
                setShowWinner(false);
            };

            const handleRemoveUser = () => {
                if (winnerInfo.index !== -1) {
                    setNamesList(prev => {
                        const newList = [...prev];
                        if (newList[winnerInfo.index]) {
                            newList[winnerInfo.index] = { ...newList[winnerInfo.index], removed: true };
                        }
                        return newList;
                    });
                    setGameMessage(`${winnerInfo.name} 已暫時移除`);
                }
                setShowWinner(false);
            };

            const drawCard = (type) => {
                if(isMoving) return; 
                
                const list = type === '機會' 
                    ? chanceText.split(/[\n]+/).map(i => i.trim()).filter(i => i)
                    : fateText.split(/[\n]+/).map(i => i.trim()).filter(i => i);
                    
                if (list.length === 0) {
                    alert(`⚠️ ${type} 牌堆是空的！請回到設定畫面加入內容。`);
                    return;
                }
                
                const randomItem = list[Math.floor(Math.random() * list.length)];
                playSound(type === '機會' ? 'draw-chance' : 'draw-fate');
                
                setDrawnCard({
                    show: true,
                    type: type,
                    text: randomItem
                });

                if (type === '機會') {
                    setChanceHistory(prev => [randomItem, ...prev].slice(0, 3));
                } else if (type === '命運') {
                    setFateHistory(prev => [randomItem, ...prev].slice(0, 3));
                }
            };

            const renderName = (name, isVertical) => {
                if (!isVertical) return <span>{name}</span>;
                const match = name.match(/^(\d+)(.*)/);
                if (match) {
                    return (
                        <>
                            <span className="tcy">{match[1]}</span>
                            <span>{match[2]}</span>
                        </>
                    );
                }
                return <span>{name}</span>;
            };

            const ROW_HEIGHT = 'min(16vh, 150px)';
            const COL_WIDTH = 'min(12vw, 140px)';

            const gridColsStyle = `${COL_WIDTH} repeat(${Math.max(1, boardConfig.w - 2)}, minmax(0, 1fr)) ${COL_WIDTH}`;
            const gridRowsStyle = `${ROW_HEIGHT} repeat(${Math.max(1, boardConfig.h - 2)}, minmax(0, 1fr)) ${ROW_HEIGHT}`;

            if (view === 'setup') {
                return (
                    <div className="setup-container flex-col">
                        <div className="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-5xl fade-in border border-gray-100 relative">
                            {/* --- Header 區域 (含按鈕排版優化) --- */}
                            <div className="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-6 mt-4 px-2 gap-4 border-b border-gray-100 pb-4">
                                <div className="text-left w-full lg:w-auto">
                                    <h1 className="font-bold text-blue-600 flex items-baseline justify-start gap-3 mb-2 flex-wrap">
                                        <i data-lucide="atom" className="w-10 h-10 self-center shrink-0"></i>
                                        <span className="text-[2.7rem] leading-none">抽籤回答(大富翁模式)</span>
                                        <span className="text-[1.7rem] text-blue-600 ml-2 font-black tracking-wide">---(台中二中)阿發老師設計</span>
                                    </h1>
                                    <p className="text-gray-500 ml-14">請先設定名單與參數，準備開始今天的課程！</p>
                                </div>
                                
                                {/* 將原本在右上角的設定按鈕，利用 Flexbox 移到標題文字的右下方 */}
                                <div className="flex gap-3 w-full lg:w-auto ml-14 lg:ml-0 justify-start lg:justify-end shrink-0">
                                    <button 
                                        onClick={() => setShowDeckModal(true)}
                                        className="bg-gradient-to-r from-fuchsia-600 to-purple-600 text-white px-5 py-2.5 rounded-full shadow-lg hover:shadow-xl hover:scale-105 transition flex items-center gap-2 font-bold text-sm"
                                    >
                                        <i data-lucide="sparkles" className="w-4 h-4"></i> 編輯機會與命運
                                    </button>
                                    <button 
                                        onClick={() => setShowSaveModal(true)}
                                        className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-5 py-2.5 rounded-full shadow-lg hover:shadow-xl hover:scale-105 transition flex items-center gap-2 font-bold text-sm"
                                    >
                                        <i data-lucide="hard-drive" className="w-4 h-4"></i> 班級設定存檔
                                    </button>
                                </div>
                            </div>

                            {/* --- Quick Slots Container --- */}
                            <div className="mb-6 bg-slate-50 border border-slate-200 p-4 rounded-xl shadow-inner">
                                <h4 className="text-center text-cyan-600 font-bold mb-3 text-lg flex items-center justify-center gap-2">
                                    <i data-lucide="zap" className="w-5 h-5"></i> 快速切換班級
                                </h4>
                                <div className="grid grid-cols-5 gap-3">
                                    {[0, 1, 2, 3, 4].map(idx => {
                                        const slot = savedSlots[idx];
                                        const hasData = !!slot;
                                        return (
                                            <button
                                                key={idx}
                                                onClick={() => hasData ? loadFromSlot(idx) : alert('⚠️ 這個槽位目前是「空」的喔！\n請先從右上方的「班級設定存檔」建立並儲存班級。')}
                                                className={`py-3 px-2 rounded-xl font-bold text-sm transition-all transform active:scale-95 shadow-sm border ${
                                                    hasData 
                                                    ? 'bg-[#ffff99] text-gray-800 border-yellow-300 hover:bg-yellow-300 hover:shadow-md' 
                                                    : 'bg-[#b2b2b2] text-gray-700 border-gray-400 hover:bg-gray-400'
                                                }`}
                                            >
                                                {hasData ? (slot.name || `班級 ${idx + 1}`) : '空'}
                                            </button>
                                        )
                                    })}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div className="space-y-4 flex flex-col justify-between">
                                    <div>
                                        <div className="flex gap-4">
                                            <div className="flex-1">
                                                <label className="block text-sm font-bold text-green-700 mb-2">機會的格子數</label>
                                                <input 
                                                    type="number" 
                                                    min="0"
                                                    value={chanceCellCount} 
                                                    onChange={(e) => setChanceCellCount(parseInt(e.target.value) || 0)}
                                                    className="w-full border-2 border-green-200 rounded-lg px-4 py-2 focus:border-green-500 focus:outline-none transition text-lg font-bold"
                                                />
                                                <p className="text-xs text-gray-400 mt-1">設定棋盤中產生多少格「機會」。</p>
                                            </div>
                                            
                                            <div className="flex-1">
                                                <label className="block text-sm font-bold text-amber-700 mb-2">命運的格子數</label>
                                                <input 
                                                    type="number" 
                                                    min="0"
                                                    value={fateCellCount} 
                                                    onChange={(e) => setFateCellCount(parseInt(e.target.value) || 0)}
                                                    className="w-full border-2 border-amber-200 rounded-lg px-4 py-2 focus:border-amber-500 focus:outline-none transition text-lg font-bold"
                                                />
                                                <p className="text-xs text-gray-400 mt-1">設定棋盤中產生多少格「命運」。</p>
                                            </div>
                                        </div>

                                        <div className="flex gap-4 pt-6">
                                            <button 
                                                onClick={exportJSON} 
                                                className="flex-1 bg-gradient-to-r from-emerald-500 to-emerald-700 hover:from-emerald-400 hover:to-emerald-600 text-white py-3 rounded-xl font-bold transition shadow-md flex justify-center items-center gap-2 hover:scale-[1.02]"
                                            >
                                                ⬇️ 匯出班級 JSON
                                            </button>
                                            
                                            <label className="flex-1 bg-gradient-to-r from-blue-500 to-blue-700 hover:from-blue-400 hover:to-blue-600 text-white py-3 rounded-xl font-bold transition shadow-md flex justify-center items-center gap-2 cursor-pointer hover:scale-[1.02] mb-0">
                                                ⬆️ 匯入班級 JSON
                                                <input type="file" accept=".json" onChange={importJSON} className="hidden" />
                                            </label>
                                        </div>
                                        {saveStatus && !showSaveModal && (
                                            <div className="mt-2 text-sm font-bold text-amber-600 text-center">
                                                {saveStatus}
                                            </div>
                                        )}
                                    </div>

                                    <div className="pt-2">
                                        <button 
                                            onClick={handleStartGame}
                                            className="w-full py-5 bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl font-bold text-2xl shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-2"
                                        >
                                            <i data-lucide="play-circle" className="w-8 h-8"></i> 生成大富翁地圖並開始
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="block text-sm font-bold text-gray-700">
                                        名單輸入 <span className="font-normal text-gray-400">(每行一人，可加座號)</span>
                                    </label>
                                    <textarea 
                                        className="w-full h-56 border-2 border-gray-200 rounded-xl p-3 text-base focus:border-blue-500 focus:outline-none transition resize-none custom-scroll"
                                        value={inputNames}
                                        onChange={(e) => setInputNames(e.target.value)}
                                        placeholder="例如：&#10;01愛因斯坦&#10;02牛頓"
                                    ></textarea>
                                    <label className="cursor-pointer bg-slate-700 border border-slate-800 rounded-lg py-3 text-center hover:bg-slate-800 transition block text-sm text-white font-bold shadow-sm">
                                        <i data-lucide="upload" className="w-4 h-4 inline mr-1"></i> 從 CSV 匯入名單
                                        <input type="file" accept=".csv" onChange={handleCSVImport} className="hidden" />
                                    </label>
                                </div>
                            </div>
                        </div>

                        {/* --- Deck Setup Modal --- */}
                        {showDeckModal && (
                            <div 
                                className="fixed inset-0 bg-black/70 backdrop-blur-sm z-[200] flex items-center justify-center popup-overlay p-4"
                                onClick={() => setShowDeckModal(false)}
                            >
                                <div 
                                    className="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[95vh] flex flex-col popup-content"
                                    onClick={(e) => e.stopPropagation()}
                                >
                                    <h2 className="text-2xl font-bold text-fuchsia-600 mb-4 flex items-center justify-center gap-2">
                                        <i data-lucide="sparkles" className="w-6 h-6"></i> 編輯機會與命運卡牌內容
                                    </h2>
                                    <p className="text-gray-500 text-sm mb-4 text-center">每行代表一張牌的內容，存檔班級設定時會一併保存。</p>
                                    
                                    <div className="flex flex-col md:flex-row gap-4 flex-1 min-h-[400px]">
                                        <div className="flex-1 flex flex-col">
                                            <label className="font-bold text-green-700 bg-green-100 px-3 py-2 rounded-t-lg border border-green-200">
                                                機會 (下一位答對觸發)
                                            </label>
                                            <textarea 
                                                className="flex-1 border-x border-b border-green-200 rounded-b-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 resize-none custom-scroll leading-relaxed"
                                                value={chanceText}
                                                onChange={(e) => setChanceText(e.target.value)}
                                            ></textarea>
                                        </div>
                                        <div className="flex-1 flex flex-col">
                                            <label className="font-bold text-amber-700 bg-amber-100 px-3 py-2 rounded-t-lg border border-amber-200">
                                                命運 (下一位答錯觸發)
                                            </label>
                                            <textarea 
                                                className="flex-1 border-x border-b border-amber-200 rounded-b-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none custom-scroll leading-relaxed"
                                                value={fateText}
                                                onChange={(e) => setFateText(e.target.value)}
                                            ></textarea>
                                        </div>
                                    </div>

                                    <div className="mt-6 flex justify-end">
                                        <button 
                                            onClick={() => setShowDeckModal(false)} 
                                            className="px-8 py-3 bg-gray-800 hover:bg-gray-900 text-white rounded-xl font-bold transition shadow-md hover:scale-105"
                                        >
                                            確認並關閉
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- Advanced Save Panel Modal --- */}
                        {showSaveModal && (
                            <div 
                                className="fixed inset-0 bg-black/70 backdrop-blur-sm z-[200] flex items-center justify-center popup-overlay"
                                onClick={() => setShowSaveModal(false)}
                            >
                                <div 
                                    className="bg-slate-800 p-8 rounded-2xl shadow-[0_0_30px_rgba(6,182,212,0.3)] w-[450px] max-w-[95vw] popup-content text-slate-200 border border-slate-700"
                                    onClick={(e) => e.stopPropagation()}
                                >
                                    <h2 className="text-2xl font-bold text-cyan-400 mb-6 flex items-center justify-center gap-2 drop-shadow-[0_0_5px_rgba(6,182,212,0.5)]">
                                        <i data-lucide="save" className="w-6 h-6"></i> 班級資料與存檔管理
                                    </h2>
                                    
                                    <div className="space-y-4 mb-6">
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">選擇記憶槽 (共5槽):</label>
                                            <select 
                                                className="w-full bg-slate-900 border border-cyan-500 text-white rounded-lg p-3 outline-none focus:ring-2 focus:ring-cyan-500 cursor-pointer"
                                                value={activeSlotIndex}
                                                onChange={(e) => setActiveSlotIndex(Number(e.target.value))}
                                            >
                                                {[0, 1, 2, 3, 4].map(idx => (
                                                    <option key={idx} value={idx}>
                                                        槽位 {idx + 1} {savedSlots[idx] ? `(已儲存: ${savedSlots[idx].name || '未命名'})` : '(空)'}
                                                    </option>
                                                ))}
                                            </select>
                                        </div>

                                        <div>
                                            <input 
                                                type="text"
                                                className="w-full bg-slate-900 border border-cyan-500 text-white rounded-lg p-3 outline-none focus:ring-2 focus:ring-cyan-500 placeholder-slate-500"
                                                placeholder="輸入自訂班級名稱 (例如: 高一甲班)"
                                                value={slotNameInput}
                                                onChange={(e) => setSlotNameInput(e.target.value)}
                                            />
                                        </div>

                                        <div className="flex gap-3 pt-2">
                                            <button 
                                                onClick={handleSaveToCurrentSlot} 
                                                className="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-lg font-bold transition shadow-md border border-slate-600 flex justify-center items-center gap-2 hover:scale-105"
                                            >
                                                📝 暫存至槽位
                                            </button>
                                            <button 
                                                onClick={handleLoadFromCurrentSlot} 
                                                className="flex-1 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white py-3 rounded-lg font-bold transition shadow-md flex justify-center items-center gap-2 hover:scale-105"
                                            >
                                                📂 讀取槽位
                                            </button>
                                        </div>
                                    </div>

                                    {saveStatus && (
                                        <div className="mt-4 min-h-[1.5em] text-sm font-bold text-amber-400 text-center">
                                            {saveStatus}
                                        </div>
                                    )}

                                    <button 
                                        onClick={() => setShowSaveModal(false)} 
                                        className="w-full py-3 bg-rose-600 hover:bg-rose-700 text-white rounded-lg mt-6 font-bold transition shadow-md hover:scale-105"
                                    >
                                        關閉面板
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="w-full h-full relative fade-in">
                    <div 
                        className="board-container"
                        style={{
                            gridTemplateColumns: gridColsStyle,
                            gridTemplateRows: gridRowsStyle
                        }}
                    >
                        {boardConfig.coords.map((coord, index) => {
                            const isTopBottom = coord.type === 'top' || coord.type === 'bottom';
                            const isActive = index === currentPos;
                            // Safe access in case of race condition render
                            const item = namesList[index] || { name: '', removed: false };
                            const isRemoved = item.removed;
                            const isChance = item.name === '機會';
                            const isFate = item.name === '命運';
                            const isDoor = item.name === '任意門';

                            let bgColor = isRemoved ? '#374151' : CELL_COLORS[index % CELL_COLORS.length];
                            let textColor = isRemoved ? '#9ca3af' : '#1e293b';

                            if (!isRemoved) {
                                if (isChance) {
                                    bgColor = '#00B050'; 
                                    textColor = '#ffffff'; 
                                } else if (isFate) {
                                    bgColor = '#f59e0b'; 
                                    textColor = '#ffffff'; 
                                } else if (isDoor) {
                                    bgColor = '#a855f7'; 
                                    textColor = '#ffffff'; 
                                }
                            }
                            
                            return (
                                <div 
                                    key={index}
                                    className={`cell ${isTopBottom ? 'cell-vertical' : 'cell-horizontal'} ${isActive ? 'active-cell' : ''} ${isRemoved ? 'cell-removed' : ''}`}
                                    style={{
                                        gridColumn: coord.x,
                                        gridRow: coord.y,
                                        backgroundColor: isActive ? 'white' : bgColor,
                                        color: isActive ? '#000000' : textColor 
                                    }}
                                >
                                    {isDoor && !isTopBottom && (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 mr-1 inline">
                                            <path d="M13 4h3a2 2 0 0 1 2 2v14"/><path d="M2 20h3"/><path d="M13 20h9"/><path d="M10 12v.01"/><path d="M13 4.562v16.157a1 1 0 0 1-1.242.97L5 20V5.562a2 2 0 0 1 1.515-1.94l4-1A2 2 0 0 1 13 4.561Z"/>
                                        </svg>
                                    )}
                                    {renderName(item.name, isTopBottom)}
                                </div>
                            );
                        })}

                        {/* --- Center Panel --- */}
                        <div className="center-panel">
                            {/* Header Area */}
                            <div className="flex justify-between items-center mb-2">
                                <h1 className="text-xl font-bold text-blue-800 flex items-center gap-2">
                                    <i data-lucide="atom" className="w-6 h-6"></i>
                                    課堂抽籤
                                </h1>
                                <button 
                                    onClick={() => setView('setup')}
                                    className="px-4 py-2 bg-emerald-500 text-white rounded-xl hover:bg-emerald-600 transition flex items-center gap-2 font-bold shadow-md text-sm"
                                >
                                    <i data-lucide="log-out" className="w-4 h-4"></i> 回到登入畫面
                                </button>
                            </div>
                            
                            {/* Message Board */}
                            <div className="bg-gradient-to-r from-blue-50 to-indigo-50 p-2 rounded-xl mb-4 border border-blue-100 shadow-sm min-h-[90px] grid grid-cols-4 items-center">
                                {/* 左側：機會紀錄 */}
                                <div className="col-span-1 h-full flex flex-col justify-start text-left border-r border-blue-200 pr-2 overflow-hidden">
                                    <span className="text-[11px] font-bold text-green-700 mb-1 border-b border-green-200 pb-[2px]">最近機會</span>
                                    <div className="flex flex-col overflow-hidden">
                                        {chanceHistory.length === 0 && <span className="text-[11px] text-gray-400 mt-1">尚未抽取</span>}
                                        {chanceHistory.map((msg, i) => (
                                            <span key={`c-${i}`} className="text-[12px] font-bold text-[#ff0000] truncate leading-relaxed" title={msg}>
                                                {msg}
                                            </span>
                                        ))}
                                    </div>
                                </div>

                                {/* 中間：主訊息 */}
                                <div className="col-span-2 px-2 flex items-center justify-center h-full text-center">
                                    <p className="text-xl font-bold text-blue-900 animate-pulse">{gameMessage}</p>
                                </div>

                                {/* 右側：命運紀錄 */}
                                <div className="col-span-1 h-full flex flex-col justify-start text-left border-l border-blue-200 pl-2 overflow-hidden">
                                    <span className="text-[11px] font-bold text-amber-700 mb-1 border-b border-amber-200 pb-[2px]">最近命運</span>
                                    <div className="flex flex-col overflow-hidden">
                                        {fateHistory.length === 0 && <span className="text-[11px] text-gray-400 mt-1">尚未抽取</span>}
                                        {fateHistory.map((msg, i) => (
                                            <span key={`f-${i}`} className="text-[12px] font-bold text-[#ff0000] truncate leading-relaxed" title={msg}>
                                                {msg}
                                            </span>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Main Interactive Area */}
                            <div className="flex-1 flex justify-center items-center gap-4 md:gap-8 px-2 overflow-x-auto">
                                
                                {/* Col 1: Control Buttons */}
                                <div className="flex flex-col justify-center gap-4 w-64 shrink-0">
                                    <button 
                                        onClick={shuffleNames} disabled={isMoving} 
                                        className="btn-black-border bg-orange-500 text-gray-900 hover:bg-orange-600 rounded-lg py-3 text-xl text-center"
                                    >
                                        打亂位置
                                    </button>
                                    
                                    <div className="btn-black-border bg-[#ffff99] text-gray-900 rounded-lg py-2 px-4 flex items-center justify-between">
                                        <button onClick={() => setNumDice(Math.max(1, numDice - 1))} className="w-8 h-8 text-xl rounded bg-yellow-200 hover:bg-yellow-400 flex items-center justify-center font-bold">-</button>
                                        <div className="flex flex-col items-center">
                                            <span className="text-sm font-bold">骰子數</span>
                                            <span className="text-2xl font-bold leading-none mt-1">{numDice}</span>
                                        </div>
                                        <button onClick={() => setNumDice(Math.min(3, numDice + 1))} className="w-8 h-8 text-xl rounded bg-yellow-200 hover:bg-yellow-400 flex items-center justify-center font-bold">+</button>
                                    </div>

                                    <button 
                                        onClick={() => setSkipSpecial(!skipSpecial)} disabled={isMoving} 
                                        className={`btn-black-border rounded-lg py-3 text-lg font-bold text-center flex items-center justify-center gap-2 transition-all ${
                                            skipSpecial 
                                            ? 'bg-rose-500 text-white hover:bg-rose-600 shadow-[inset_0_0_10px_rgba(0,0,0,0.2)]' 
                                            : 'bg-slate-300 text-slate-700 hover:bg-slate-400'
                                        }`}
                                        title="開啟後，移動時將自動跳過機會、命運與任意門"
                                    >
                                        {skipSpecial ? (
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
                                                <rect width="20" height="14" x="2" y="5" rx="7"/><circle cx="15" cy="12" r="3"/>
                                            </svg>
                                        ) : (
                                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6">
                                                <rect width="20" height="14" x="2" y="5" rx="7"/><circle cx="9" cy="12" r="3"/>
                                            </svg>
                                        )}
                                        {skipSpecial ? '忽略特殊格: 開' : '忽略特殊格: 關'}
                                    </button>
                                </div>

                                {/* Col 2: Chance Card */}
                                <div 
                                    className="action-card bg-[#00B050] w-72 h-48 shrink-0 rounded-2xl" 
                                    onClick={() => drawCard('機會')}
                                >
                                    <span className="text-5xl text-[#ffffff] font-black tracking-widest">機會</span>
                                </div>

                                {/* Col 3: Dice & Main Actions */}
                                <div className="flex flex-col justify-center items-center gap-4 w-48 shrink-0">
                                    <div className="flex justify-center mb-2">
                                        {lastRoll.map((val, idx) => (
                                            <div key={idx} className={`dice-cube ${isMoving ? 'dice-rolling' : ''}`}>
                                                {val}
                                            </div>
                                        ))}
                                    </div>
                                    
                                    <button 
                                        onClick={rollDice}
                                        disabled={isMoving}
                                        className={`btn-black-border w-full py-4 text-xl font-bold rounded-xl transition-all transform active:scale-95 flex justify-center items-center gap-2
                                            ${isMoving ? 'bg-gray-300 cursor-not-allowed text-gray-500' : 'bg-blue-600 text-white hover:bg-blue-700'}`}
                                    >
                                        <i data-lucide="dices" className="w-6 h-6"></i> 擲骰子
                                    </button>
                                    
                                    <button 
                                        onClick={startSlotMachine}
                                        disabled={isMoving}
                                        className={`btn-black-border w-full py-4 text-lg font-bold rounded-xl transition-all transform active:scale-95 flex justify-center items-center gap-2
                                            ${isMoving ? 'bg-gray-300 cursor-not-allowed text-gray-500' : 'bg-purple-500 text-white hover:bg-purple-600'}`}
                                    >
                                        <i data-lucide="zap" className="w-5 h-5"></i> 跑馬燈模式
                                    </button>
                                </div>

                                {/* Col 4: Fate Card */}
                                <div 
                                    className="action-card bg-[#f59e0b] w-72 h-48 shrink-0 rounded-2xl"
                                    onClick={() => drawCard('命運')}
                                >
                                    <span className="text-5xl text-[#ffffff] font-black tracking-widest">命運</span>
                                </div>

                            </div>
                        </div>
                    </div>
                    
                    {/* Winner Popup Overlay */}
                    {showWinner && (
                        <div 
                            className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center popup-overlay"
                        >
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl text-center popup-content border-8 border-yellow-400 relative overflow-hidden max-w-[90vw] min-w-[50vw]">
                                {/* Confetti Effect */}
                                <div className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
                                    <div className="absolute top-10 left-10 text-6xl rotate-12">🎉</div>
                                    <div className="absolute bottom-10 right-10 text-6xl -rotate-12">✨</div>
                                    <div className="absolute top-1/2 left-5 text-4xl rotate-45">🎈</div>
                                    <div className="absolute top-20 right-20 text-5xl rotate-180">🎊</div>
                                </div>
                                
                                {/* 修改為「本次幸運星」及彩色漸層 */}
                                <h2 className="text-4xl md:text-5xl font-black mb-4 tracking-widest uppercase text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-red-500 to-yellow-500 drop-shadow-sm">
                                    本次幸運星
                                </h2>
                                
                                {/* 名單字體改為藍色漸層，使用 drop-shadow 營造 3D 效果，移除白邊 */}
                                <div className="py-6">
                                    <div 
                                        className="text-[5rem] md:text-[7rem] font-black text-transparent bg-clip-text bg-gradient-to-br from-cyan-400 via-blue-500 to-blue-800 leading-tight break-keep" 
                                        style={{ 
                                            filter: 'drop-shadow(3px 3px 0px #1e3a8a) drop-shadow(6px 6px 0px rgba(30, 58, 138, 0.4))'
                                        }}
                                    >
                                        {winnerInfo.name}
                                    </div>
                                </div>

                                {/* Action Buttons：加入 justify-center 使內容置中 */}
                                <div className="mt-6 flex justify-center gap-6 relative z-10">
                                    <button 
                                        onClick={handleKeepUser}
                                        className="px-8 py-4 bg-emerald-500 hover:bg-emerald-600 text-white text-2xl font-bold rounded-xl shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2"
                                    >
                                        <i data-lucide="check-circle" className="w-8 h-8"></i>
                                        保留名單
                                    </button>
                                    <button 
                                        onClick={handleRemoveUser}
                                        className="px-8 py-4 bg-red-500 hover:bg-red-600 text-white text-2xl font-bold rounded-xl shadow-lg transition transform hover:scale-105 flex items-center justify-center gap-2"
                                    >
                                        <i data-lucide="trash-2" className="w-8 h-8"></i>
                                        移除此人
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Card Draw Popup (機會與命運結果) */}
                    {drawnCard.show && (
                        <div 
                            className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[150] flex items-center justify-center popup-overlay"
                            onClick={() => setDrawnCard({ ...drawnCard, show: false })}
                        >
                            <div 
                                className={`p-10 rounded-3xl shadow-2xl text-center popup-content border-8 max-w-[80vw] min-w-[30vw] cursor-pointer hover:scale-105 transition-transform ${
                                    drawnCard.type === '機會' 
                                    ? 'bg-green-100 border-green-500 shadow-[0_0_50px_rgba(34,197,94,0.5)]' 
                                    : 'bg-amber-100 border-amber-500 shadow-[0_0_50px_rgba(245,158,11,0.5)]'
                                }`}
                                onClick={(e) => e.stopPropagation()}
                            >
                                <h2 className={`text-5xl font-black mb-8 tracking-widest ${
                                    drawnCard.type === '機會' ? 'text-green-600' : 'text-amber-600'
                                }`}>
                                    {drawnCard.type}
                                </h2>
                                
                                <div className="py-8 px-4 bg-white/80 rounded-2xl min-h-[150px] flex items-center justify-center border-2 border-dashed border-gray-300 mb-8">
                                    <p className="text-4xl md:text-5xl font-bold text-gray-800 leading-snug break-keep">
                                        {drawnCard.text}
                                    </p>
                                </div>

                                <button 
                                    onClick={() => setDrawnCard({ ...drawnCard, show: false })}
                                    className={`px-10 py-4 text-white text-2xl font-bold rounded-2xl shadow-lg transition transform active:scale-95 w-full ${
                                        drawnCard.type === '機會' ? 'bg-green-500 hover:bg-green-600' : 'bg-amber-500 hover:bg-amber-600'
                                    }`}
                                >
                                    確認
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
