<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高中物理：四大放射性元素衰變系列模擬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .control-panel {
            background: rgba(30, 41, 59, 0.85); /* Slate 800 with opacity */
            backdrop-filter: blur(8px);
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        .btn-series {
            transition: all 0.2s ease-in-out;
        }
        .btn-series.active {
            background-color: #3b82f6; /* Blue 500 */
            color: white;
            border-color: #60a5fa; /* Blue 400 */
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
        .equation-text {
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col md:flex-row">

    <!-- 左側控制面板 -->
    <aside class="control-panel w-full md:w-80 h-auto md:h-full flex-shrink-0 flex flex-col z-10 absolute md:relative overflow-y-auto">
        <div class="p-6 flex-grow flex flex-col">
            <h1 class="text-2xl font-bold mb-2 text-blue-400">放射性衰變模擬</h1>
            <p class="text-sm text-slate-400 mb-6">質子數 (Z) vs 中子數 (N) 關係圖</p>

            <div class="mb-6">
                <h2 class="text-lg font-semibold mb-3 text-slate-200 border-b border-slate-600 pb-1">選擇衰變系列</h2>
                <div class="grid grid-cols-1 gap-2">
                    <button id="btn-uranium" class="btn-series active bg-slate-700 hover:bg-slate-600 text-slate-200 py-2 px-4 rounded border border-slate-600 text-left" onclick="selectSeries('uranium')">
                        <span class="font-bold">鈾系 (4n+2)</span><br><span class="text-xs opacity-80">U-238 → Pb-206</span>
                    </button>
                    <button id="btn-thorium" class="btn-series bg-slate-700 hover:bg-slate-600 text-slate-200 py-2 px-4 rounded border border-slate-600 text-left" onclick="selectSeries('thorium')">
                        <span class="font-bold">釷系 (4n)</span><br><span class="text-xs opacity-80">Th-232 → Pb-208</span>
                    </button>
                    <button id="btn-actinium" class="btn-series bg-slate-700 hover:bg-slate-600 text-slate-200 py-2 px-4 rounded border border-slate-600 text-left" onclick="selectSeries('actinium')">
                        <span class="font-bold">錒系 (4n+3)</span><br><span class="text-xs opacity-80">U-235 → Pb-207</span>
                    </button>
                    <button id="btn-neptunium" class="btn-series bg-slate-700 hover:bg-slate-600 text-slate-200 py-2 px-4 rounded border border-slate-600 text-left" onclick="selectSeries('neptunium')">
                        <span class="font-bold">錼系 (4n+1)</span><br><span class="text-xs opacity-80">Np-237 → Bi-209</span>
                    </button>
                </div>
            </div>

            <div class="mb-6">
                <h2 class="text-lg font-semibold mb-3 text-slate-200 border-b border-slate-600 pb-1">控制面板</h2>
                <div class="flex space-x-2 mb-4">
                    <button id="btn-play" class="flex-1 bg-green-600 hover:bg-green-500 text-white py-2 rounded font-bold transition" onclick="togglePlay()">播放</button>
                    <button class="flex-1 bg-red-600 hover:bg-red-500 text-white py-2 rounded font-bold transition" onclick="resetAnimation()">重置</button>
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">播放速度</label>
                    <input type="range" id="speed-slider" min="1" max="10" value="5" class="w-full">
                </div>
            </div>

            <div class="mb-6 bg-slate-900 rounded-lg p-4 border border-slate-700 shadow-inner">
                <h2 class="text-sm font-semibold text-slate-400 mb-2 uppercase tracking-wider">即時反應式</h2>
                <div id="equation-display" class="equation-text text-xl text-yellow-300 text-center min-h-[3rem] flex items-center justify-center">
                    <!-- 方程式將顯示於此 -->
                </div>
            </div>

            <div class="mt-auto">
                <h2 class="text-sm font-semibold text-slate-400 mb-2">圖例</h2>
                <div class="flex items-center mb-1 text-sm">
                    <div class="w-4 h-1 bg-red-500 mr-2"></div> &alpha; 衰變 (失去 2p, 2n)
                </div>
                <div class="flex items-center text-sm">
                    <div class="w-4 h-1 bg-blue-500 mr-2"></div> &beta; 衰變 (1n 轉為 1p)
                </div>
            </div>
        </div>
    </aside>

    <!-- 右側畫布區域 -->
    <main class="flex-1 relative bg-[#0f172a]">
        <canvas id="simulationCanvas"></canvas>
    </main>

    <script>
        // --- 物理資料與模型設定 ---
        const ELEMENTS = {
            81: 'Tl', 82: 'Pb', 83: 'Bi', 84: 'Po', 85: 'At',
            86: 'Rn', 87: 'Fr', 88: 'Ra', 89: 'Ac', 90: 'Th',
            91: 'Pa', 92: 'U',  93: 'Np', 94: 'Pu'
        };

        // 資料結構：Z (質子數), A (質量數)。 N (中子數) = A - Z 將在程式中動態計算
        const DECAY_SERIES = {
            uranium: [
                {z:92, a:238}, {z:90, a:234}, {z:91, a:234}, {z:92, a:234},
                {z:90, a:230}, {z:88, a:226}, {z:86, a:222}, {z:84, a:218},
                {z:82, a:214}, {z:83, a:214}, {z:84, a:214}, {z:82, a:210},
                {z:83, a:210}, {z:84, a:210}, {z:82, a:206}
            ],
            thorium: [
                {z:90, a:232}, {z:88, a:228}, {z:89, a:228}, {z:90, a:228},
                {z:88, a:224}, {z:86, a:220}, {z:84, a:216}, {z:82, a:212},
                {z:83, a:212}, {z:81, a:208}, {z:82, a:208}
            ],
            actinium: [
                {z:92, a:235}, {z:90, a:231}, {z:91, a:231}, {z:89, a:227},
                {z:90, a:227}, {z:88, a:223}, {z:86, a:219}, {z:84, a:215},
                {z:82, a:211}, {z:83, a:211}, {z:81, a:207}, {z:82, a:207}
            ],
            neptunium: [
                {z:93, a:237}, {z:91, a:233}, {z:92, a:233}, {z:90, a:229},
                {z:88, a:225}, {z:89, a:225}, {z:87, a:221}, {z:85, a:217},
                {z:83, a:213}, {z:84, a:213}, {z:82, a:209}, {z:83, a:209}
            ]
        };

        // --- 畫布與狀態設定 ---
        const canvas = document.getElementById('simulationCanvas');
        const ctx = canvas.getContext('2d');
        
        // 座標軸範圍設定 (Z: 80~95, N: 122~148)
        const MIN_Z = 80;
        const MAX_Z = 95;
        const MIN_N = 122;
        const MAX_N = 148;

        let currentSeriesKey = 'uranium';
        let pathData = DECAY_SERIES[currentSeriesKey];
        
        // 動畫控制變數
        let stepIndex = 0;
        let animProgress = 0; // 0.0 to 1.0 between steps
        let isPlaying = false;
        let animationId;
        let particles = [];

        // UI 元素
        const btnPlay = document.getElementById('btn-play');
        const speedSlider = document.getElementById('speed-slider');
        const eqDisplay = document.getElementById('equation-display');

        // --- 初始化與事件監聽 ---
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            // 處理高 DPI 螢幕
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            draw(); // 重繪
        }

        window.addEventListener('resize', resizeCanvas);

        // 初始化
        resizeCanvas();
        updateEquationDisplay(0, false);
        requestAnimationFrame(gameLoop);

        // --- 核心邏輯 ---

        function selectSeries(seriesKey) {
            currentSeriesKey = seriesKey;
            pathData = DECAY_SERIES[seriesKey];
            
            // 更新按鈕樣式
            document.querySelectorAll('.btn-series').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${seriesKey}`).classList.add('active');
            
            resetAnimation();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            btnPlay.textContent = isPlaying ? "暫停" : "播放";
            btnPlay.className = isPlaying 
                ? "flex-1 bg-yellow-600 hover:bg-yellow-500 text-white py-2 rounded font-bold transition" 
                : "flex-1 bg-green-600 hover:bg-green-500 text-white py-2 rounded font-bold transition";
        }

        function resetAnimation() {
            stepIndex = 0;
            animProgress = 0;
            particles = [];
            isPlaying = false;
            btnPlay.textContent = "播放";
            btnPlay.className = "flex-1 bg-green-600 hover:bg-green-500 text-white py-2 rounded font-bold transition";
            updateEquationDisplay(0, false);
            draw();
        }

        // 座標映射函數 (像素轉換)
        function mapX(z, width) {
            const paddingLeft = 80;
            const paddingRight = 40;
            const usableWidth = width - paddingLeft - paddingRight;
            return paddingLeft + ((z - MIN_Z) / (MAX_Z - MIN_Z)) * usableWidth;
        }

        function mapY(n, height) {
            const paddingTop = 40;
            const paddingBottom = 80;
            const usableHeight = height - paddingTop - paddingBottom;
            // N 值大的在上方，所以要反轉 Y 軸
            return paddingTop + usableHeight - ((n - MIN_N) / (MAX_N - MIN_N)) * usableHeight;
        }

        function formatIsotopeHTML(node) {
            return `<sup>${node.a}</sup><sub>${node.z}</sub>${ELEMENTS[node.z]}`;
        }

        function updateEquationDisplay(index, isTransitioning) {
            if (index >= pathData.length - 1) {
                let node = pathData[pathData.length - 1];
                eqDisplay.innerHTML = `${formatIsotopeHTML(node)} (穩定核種)`;
                return;
            }

            let current = pathData[index];
            let next = pathData[index + 1];
            let particle = '';
            
            if (next.z < current.z) {
                // Alpha
                particle = `<sup>4</sup><sub>2</sub>&alpha;`;
            } else {
                // Beta
                particle = `<sup>0</sup><sub>-1</sub>&beta;`;
            }

            if (isTransitioning) {
                eqDisplay.innerHTML = `${formatIsotopeHTML(current)} &rarr; ${formatIsotopeHTML(next)} + ${particle}`;
            } else {
                eqDisplay.innerHTML = `準備衰變: ${formatIsotopeHTML(current)}`;
            }
        }

        // --- 繪圖函數 ---

        function drawGrid(w, h) {
            ctx.strokeStyle = '#334155'; // Slate 700
            ctx.lineWidth = 1;
            ctx.fillStyle = '#94a3b8'; // Slate 400
            ctx.font = '12px "Noto Sans TC"';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // 畫垂直線 (Z 軸)
            for (let z = MIN_Z; z <= MAX_Z; z++) {
                let x = mapX(z, w);
                ctx.beginPath();
                ctx.moveTo(x, mapY(MIN_N, h));
                ctx.lineTo(x, mapY(MAX_N, h));
                ctx.stroke();
                
                // 標籤
                if (z % 1 === 0) {
                    ctx.fillText(`${ELEMENTS[z] || z}`, x, mapY(MIN_N, h) + 20);
                    ctx.fillText(z, x, mapY(MIN_N, h) + 40);
                }
            }

            // 畫水平線 (N 軸)
            ctx.textAlign = 'right';
            for (let n = MIN_N; n <= MAX_N; n += 2) {
                let y = mapY(n, h);
                ctx.beginPath();
                ctx.moveTo(mapX(MIN_Z, w), y);
                ctx.lineTo(mapX(MAX_Z, w), y);
                ctx.stroke();
                
                // 標籤
                ctx.fillText(n, mapX(MIN_Z, w) - 15, y);
            }

            // 軸標題
            ctx.fillStyle = '#cbd5e1';
            ctx.font = 'bold 16px "Noto Sans TC"';
            ctx.textAlign = 'center';
            ctx.fillText('質子數 Z (原子序)', w / 2, mapY(MIN_N, h) + 65);
            
            ctx.save();
            ctx.translate(20, h / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('中子數 N', 0, 0);
            ctx.restore();
        }

        function createParticleEffect(from, to, w, h) {
            const isAlpha = to.z < from.z;
            const startX = mapX(from.z, w);
            const startY = mapY(from.a - from.z, h);
            
            // 產生特效粒子
            for(let i=0; i<15; i++) {
                particles.push({
                    x: startX,
                    y: startY,
                    vx: (Math.random() - 0.5) * 4 + (isAlpha ? -2 : 2), // Alpha往左，Beta往右
                    vy: (Math.random() - 0.5) * 4 + (isAlpha ? 2 : -2), 
                    life: 1.0,
                    color: isAlpha ? '#facc15' : '#60a5fa', // 黃色/藍色
                    size: Math.random() * 3 + 1
                });
            }
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                if (p.life <= 0) particles.splice(i, 1);
            }
            ctx.globalAlpha = 1.0;
        }

        function draw() {
            // 取得實際顯示區域大小
            const rect = canvas.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;

            // 清除畫布
            ctx.clearRect(0, 0, w, h);

            // 繪製格線與座標軸
            drawGrid(w, h);

            // 繪製已經走過的路徑與節點
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            for (let i = 0; i <= stepIndex; i++) {
                let current = pathData[i];
                let nx = mapX(current.z, w);
                let ny = mapY(current.a - current.z, h);

                // 畫連接線 (如果不是最後一個點且動畫已經進行)
                if (i < pathData.length - 1) {
                    let next = pathData[i + 1];
                    let nextX = mapX(next.z, w);
                    let nextY = mapY(next.a - next.z, h);
                    
                    let isAlpha = next.z < current.z;
                    ctx.strokeStyle = isAlpha ? '#ef4444' : '#3b82f6'; // Red for alpha, Blue for beta
                    ctx.lineWidth = 3;

                    ctx.beginPath();
                    ctx.moveTo(nx, ny);

                    if (i < stepIndex) {
                        // 已經完全走完的線
                        ctx.lineTo(nextX, nextY);
                        ctx.stroke();
                    } else if (i === stepIndex && isPlaying) {
                        // 正在動畫中的線
                        let animX = nx + (nextX - nx) * animProgress;
                        let animY = ny + (nextY - ny) * animProgress;
                        ctx.lineTo(animX, animY);
                        ctx.stroke();
                        
                        // 畫正在移動的光點
                        ctx.fillStyle = '#ffffff';
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = ctx.strokeStyle;
                        ctx.beginPath();
                        ctx.arc(animX, animY, 5, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }

                // 畫核種節點
                ctx.beginPath();
                ctx.arc(nx, ny, 6, 0, Math.PI * 2);
                ctx.fillStyle = i === 0 ? '#10b981' : (i === pathData.length - 1 ? '#a855f7' : '#e2e8f0');
                if (i === stepIndex && !isPlaying) ctx.fillStyle = '#f59e0b'; // Highlight current
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#0f172a';
                ctx.stroke();

                // 核種文字標籤
                ctx.fillStyle = '#f8fafc';
                ctx.font = '12px "Noto Sans TC"';
                ctx.textAlign = 'left';
                // 稍微偏移以免擋住節點
                ctx.fillText(`${ELEMENTS[current.z]}-${current.a}`, nx + 10, ny - 10);
            }

            // 繪製粒子特效
            drawParticles();
        }

        // --- 主迴圈 ---
        let lastTime = 0;
        function gameLoop(timestamp) {
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            const rect = canvas.getBoundingClientRect();

            if (isPlaying && stepIndex < pathData.length - 1) {
                // 取得使用者設定的速度 (1~10)
                const speedMult = parseFloat(speedSlider.value) * 0.005;
                
                if (animProgress === 0) {
                    updateEquationDisplay(stepIndex, true);
                }

                animProgress += speedMult;

                if (animProgress >= 1.0) {
                    // 觸發衰變特效
                    createParticleEffect(pathData[stepIndex], pathData[stepIndex+1], rect.width, rect.height);
                    
                    animProgress = 0;
                    stepIndex++;
                    
                    if (stepIndex >= pathData.length - 1) {
                        isPlaying = false;
                        btnPlay.textContent = "完成";
                        btnPlay.className = "flex-1 bg-gray-600 text-white py-2 rounded font-bold cursor-not-allowed";
                        updateEquationDisplay(stepIndex, false);
                    } else {
                        updateEquationDisplay(stepIndex, false);
                    }
                }
            }

            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
