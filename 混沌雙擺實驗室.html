<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炫光物理：混沌雙擺 (Double Pendulum)</title>
    <style>
        /* 1. 視覺風格：深色背景，全螢幕畫布 */
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* 極致深黑 */
            overflow: hidden; /* 防止捲軸出現 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        canvas {
            display: block;
            cursor: grab; /* 提示可抓取 */
        }
        canvas:active {
            cursor: grabbing;
        }

        /* 2. 互動控制面板：半透明懸浮 */
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85); /* 稍微加深背景 */
            backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            /* 修改: 加寬面板寬度，從 280px 改為 360px，讓標題不換行 */
            width: 360px;
            z-index: 10;
            user-select: none;
            max-height: 90vh;
            overflow-y: auto;
        }

        h2 {
            margin: 0 0 15px 0;
            /* 修改 1: 字體放大成 2 倍 (原本 1.1rem -> 2.2rem) */
            font-size: 2.2rem;
            color: #fff;
            text-align: center;
            line-height: 1.3;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            white-space: nowrap; /* 強制不換行 */
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 6px;
            font-weight: 500;
        }

        /* 顏色對應樣式 */
        .color-1 { color: #0ff; text-shadow: 0 0 5px rgba(0, 255, 255, 0.3); } /* 系統 1：青色 */
        .color-2 { color: #f0f; text-shadow: 0 0 5px rgba(255, 0, 255, 0.3); } /* 系統 2：紫色 */

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            accent-color: #FFC000; /* 指定滑桿顏色：金黃色 */
        }

        /* 開關樣式 (Toggle Switch) */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
            margin-left: 10px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #555;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #FFC000;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        button:active {
            transform: scale(0.96);
        }
        
        button.primary {
            background: linear-gradient(135deg, #FFC000, #ff8c00); /* 金黃漸層 */
            color: #000;
        }

        /* 新增：綠色按鈕樣式 */
        button.btn-green {
            background: linear-gradient(135deg, #32CD32, #008000); /* 萊姆綠到深綠 */
            color: #fff;
            box-shadow: 0 0 10px rgba(50, 205, 50, 0.3);
        }

        button.warning {
            background: linear-gradient(135deg, #ff4444, #cc0000);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 15px;
        }
        button.secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .value-display {
            font-family: monospace;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <!-- 控制面板 -->
    <div id="controls">
        <!-- 修改 2: 字體放大成 1.5 倍 (1.2rem) 並將顏色改為 #FFFF00 -->
        <h2>🌀 混沌雙擺實驗室<br><span style="font-size: 1.2rem; color: #FFFF00; font-weight: normal;">炫光物理大師 x 阿發老師</span></h2>
        
        <div class="control-group">
            <label class="color-1">擺臂 1 長度 (L1) <span id="val-l1" class="value-display">150</span></label>
            <input type="range" id="inp-l1" min="50" max="250" value="150">
        </div>

        <div class="control-group">
            <label class="color-1">質量 1 (M1) <span id="val-m1" class="value-display">20</span></label>
            <input type="range" id="inp-m1" min="1" max="40" value="20">
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">

        <div class="control-group">
            <label class="color-2">擺臂 2 長度 (L2) <span id="val-l2" class="value-display">150</span></label>
            <input type="range" id="inp-l2" min="50" max="250" value="150">
        </div>

        <div class="control-group">
            <label class="color-2">質量 2 (M2) <span id="val-m2" class="value-display">20</span></label>
            <input type="range" id="inp-m2" min="1" max="40" value="20">
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">

        <div class="control-group">
            <label>重力強度 (G) <span id="val-g" class="value-display">1</span></label>
            <input type="range" id="inp-g" min="0.1" max="2" step="0.1" value="1">
        </div>

        <div class="control-group" style="margin-bottom: 20px;">
            <label>
                ⏱️ 慢動作演示 (Slow Mo)
                <label class="switch">
                    <input type="checkbox" id="inp-slowmo">
                    <span class="slider"></span>
                </label>
            </label>
        </div>

        <!-- 按鈕區 -->
        <button id="btn-toggle" class="btn-green">⏯️ 暫停 / 繼續</button>
        <button id="btn-reset" class="warning">🚀 隨機發射</button>
        
        <div style="margin-top: 15px; font-size: 0.8rem; color: #888; text-align: center;">
            💡 提示：用滑鼠拖曳小球可調整位置
        </div>
    </div>

    <!-- 畫布 -->
    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // --- 物理參數狀態 ---
    const state = {
        r1: 150, // 擺長 1
        r2: 150, // 擺長 2
        m1: 20,  // 質量 1
        m2: 20,  // 質量 2
        g: 1,    // 重力常數
        
        // 角度 (Theta) 與 角速度 (Omega)
        a1: Math.PI / 2, // 初始角度 90度
        a2: Math.PI / 2,
        a1_v: 0,
        a2_v: 0,
        
        px2: -1, // 上一幀的末端位置
        py2: -1,
        
        traceColor: 0, // 軌跡顏色 (HSL 色相)
        
        running: true, // 是否正在模擬
        dragging: 0, // 0: 無, 1: 拖曳球1, 2: 拖曳球2
        slowMotion: false // 是否開啟慢動作
    };

    // --- UI 元素 ---
    const btnToggle = document.getElementById('btn-toggle');
    const btnReset = document.getElementById('btn-reset');
    const inpSlowMo = document.getElementById('inp-slowmo');

    // --- 初始化與事件監聽 ---
    
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        resetSystem();
    }

    function resetSystem() {
        state.a1 = Math.random() * Math.PI * 2;
        state.a2 = Math.random() * Math.PI * 2;
        state.a1_v = 0;
        state.a2_v = 0;
        state.px2 = -1;
        state.traceColor = Math.random() * 360;
        state.running = true;
        updateButtons();
    }

    function toggleRun() {
        state.running = !state.running;
        // 如果暫停時，清除速度，方便觀察靜態
        if (!state.running) {
            state.a1_v = 0;
            state.a2_v = 0;
        }
        updateButtons();
    }

    function updateButtons() {
        btnToggle.innerHTML = state.running ? "⏸️ 暫停" : "▶️ 繼續";
        // 修改 3: 運行中(顯示暫停)時為綠色(btn-green)，暫停時(顯示繼續)為金黃色(primary)
        btnToggle.className = state.running ? "btn-green" : "primary";
    }

    // --- 滑鼠拖曳互動 ---
    
    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: evt.clientX - rect.left,
            y: evt.clientY - rect.top
        };
    }

    // 計算各點位置的輔助函數
    function getPoints() {
        const cx = canvas.width / 2;
        const cy = canvas.height / 3;
        const x1 = cx + state.r1 * Math.sin(state.a1);
        const y1 = cy + state.r1 * Math.cos(state.a1);
        const x2 = x1 + state.r2 * Math.sin(state.a2);
        const y2 = y1 + state.r2 * Math.cos(state.a2);
        return { cx, cy, x1, y1, x2, y2 };
    }

    canvas.addEventListener('mousedown', (e) => {
        const pos = getMousePos(e);
        const p = getPoints();
        
        // 偵測點擊距離 (增加一點判定範圍讓手指好點)
        const hitRadius = 30; 
        
        // 距離球 1
        const d1 = Math.hypot(pos.x - p.x1, pos.y - p.y1);
        // 距離球 2
        const d2 = Math.hypot(pos.x - p.x2, pos.y - p.y2);

        if (d2 < hitRadius) {
            state.dragging = 2;
            state.running = false; // 拖曳時自動暫停
        } else if (d1 < hitRadius) {
            state.dragging = 1;
            state.running = false;
        }
        
        if (state.dragging) {
            state.a1_v = 0;
            state.a2_v = 0;
            updateButtons();
            // 清除軌跡以免拖曳時畫出亂線
            state.px2 = -1; 
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (state.dragging === 0) return;
        
        const pos = getMousePos(e);
        const p = getPoints();

        if (state.dragging === 1) {
            // 拖曳球 1：計算相對於圓心的角度 (注意 atan2 的 x, y 對應 sin/cos 座標系)
            // 物理系座標：x = r*sin(a), y = r*cos(a) -> a = atan2(x, y)
            state.a1 = Math.atan2(pos.x - p.cx, pos.y - p.cy);
        } else if (state.dragging === 2) {
            // 拖曳球 2：計算相對於球 1 的角度
            state.a2 = Math.atan2(pos.x - p.x1, pos.y - p.y1);
        }
        // 強制重繪
        draw();
    });

    window.addEventListener('mouseup', () => {
        state.dragging = 0;
    });

    // --- UI 綁定 ---
    window.addEventListener('resize', resize);
    
    const inputs = {
        l1: document.getElementById('inp-l1'),
        l2: document.getElementById('inp-l2'),
        m1: document.getElementById('inp-m1'),
        m2: document.getElementById('inp-m2'),
        g:  document.getElementById('inp-g')
    };

    const displays = {
        l1: document.getElementById('val-l1'),
        l2: document.getElementById('val-l2'),
        m1: document.getElementById('val-m1'),
        m2: document.getElementById('val-m2'),
        g:  document.getElementById('val-g')
    };

    Object.keys(inputs).forEach(key => {
        inputs[key].addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if(key === 'l1') state.r1 = val;
            if(key === 'l2') state.r2 = val;
            if(key === 'm1') state.m1 = val;
            if(key === 'm2') state.m2 = val;
            if(key === 'g')  state.g = val;
            displays[key].innerText = val;
            
            if (!state.running) {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                state.px2 = -1;
                draw(); // 立即重繪反應大小變化
            }
        });
    });

    // 慢動作開關監聽
    inpSlowMo.addEventListener('change', (e) => {
        state.slowMotion = e.target.checked;
    });

    btnReset.addEventListener('click', () => {
        resetSystem();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    });

    btnToggle.addEventListener('click', toggleRun);

    // --- 核心物理與繪圖 ---

    function calculateAcceleration() {
        let { r1, r2, m1, m2, a1, a2, a1_v, a2_v, g } = state;
        
        let num1 = -g * (2 * m1 + m2) * Math.sin(a1);
        let num2 = -m2 * g * Math.sin(a1 - 2 * a2);
        let num3 = -2 * Math.sin(a1 - a2) * m2;
        let num4 = a2_v * a2_v * r2 + a1_v * a1_v * r1 * Math.cos(a1 - a2);
        let den = r1 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
        let a1_a = (num1 + num2 + num3 * num4) / den;

        num1 = 2 * Math.sin(a1 - a2);
        num2 = (a1_v * a1_v * r1 * (m1 + m2));
        num3 = g * (m1 + m2) * Math.cos(a1);
        num4 = a2_v * a2_v * r2 * m2 * Math.cos(a1 - a2);
        den = r2 * (2 * m1 + m2 - m2 * Math.cos(2 * a1 - 2 * a2));
        let a2_a = (num1 * (num2 + num3 + num4)) / den;

        return { a1_a, a2_a };
    }

    function updatePhysics() {
        if (!state.running || state.dragging) return;

        const { a1_a, a2_a } = calculateAcceleration();
        state.a1_v += a1_a;
        state.a2_v += a2_a;
        state.a1 += state.a1_v;
        state.a2 += state.a2_v;
        state.a1_v *= 0.999;
        state.a2_v *= 0.999;
    }

    function draw() {
        // 殘影處理：運行中才留殘影，暫停或拖曳時直接刷新
        if (state.running && !state.dragging) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
        } else {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)'; // 靜止時稍微深一點的覆蓋，看清楚結構
        }
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const p = getPoints();

        // 1. 繪製固定點 (小白點)
        ctx.beginPath();
        ctx.fillStyle = '#fff';
        ctx.arc(p.cx, p.cy, 4, 0, Math.PI * 2);
        ctx.fill();

        // 2. 繪製擺臂 1 (青色 #0ff)
        ctx.beginPath();
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 3;
        ctx.moveTo(p.cx, p.cy);
        ctx.lineTo(p.x1, p.y1);
        ctx.stroke();

        // 3. 繪製擺臂 2 (紫色 #f0f)
        ctx.beginPath();
        ctx.strokeStyle = '#f0f';
        ctx.lineWidth = 3;
        ctx.moveTo(p.x1, p.y1);
        ctx.lineTo(p.x2, p.y2);
        ctx.stroke();

        // 4. 繪製擺錘 1 (青色)
        ctx.beginPath();
        ctx.fillStyle = '#0ff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#0ff';
        // 質量越大，半徑越大，稍微調整比例讓視覺更好看
        ctx.arc(p.x1, p.y1, Math.max(5, state.m1 / 1.5), 0, Math.PI * 2); 
        ctx.fill();
        ctx.shadowBlur = 0; 

        // 5. 繪製擺錘 2 (紫色)
        ctx.beginPath();
        ctx.fillStyle = '#f0f';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#f0f';
        ctx.arc(p.x2, p.y2, Math.max(5, state.m2 / 1.5), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 6. 繪製彩色軌跡
        if (state.running && !state.dragging && state.px2 !== -1) {
            state.traceColor += 0.5;
            const color = `hsl(${state.traceColor}, 100%, 60%)`;
            
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.lineCap = 'round'; // 讓線條轉折更圓滑
            ctx.moveTo(state.px2, state.py2);
            ctx.lineTo(p.x2, p.y2);
            ctx.stroke();
        }

        state.px2 = p.x2;
        state.py2 = p.y2;
    }

    function loop() {
        // 慢動作控制：
        // 正常模式：每幀計算 3 次物理 (速度快，精度高)
        // 慢動作模式：每幀計算 1 次物理 (速度慢 3 倍)
        const subSteps = state.slowMotion ? 1 : 3;
        
        for(let i=0; i<subSteps; i++) updatePhysics();
        
        draw();
        requestAnimationFrame(loop);
    }

    resize();
    loop();

</script>
</body>
</html>
