<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>斜拋砲彈飛行中途手動引爆模擬---動畫大師設計</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { background-color: #f0f9ff; border: 1px solid #bae6fd; cursor: crosshair; }
        .slider-container { display: flex; align-items: center; margin-bottom: 0.5rem; }
        .slider-label { width: 140px; font-size: 0.9rem; color: #374151; font-weight: 600; white-space: nowrap; }
        .slider-value { width: 40px; text-align: right; margin-left: 10px; font-family: monospace; color: #2563eb; }
        input[type=range] { flex-grow: 1; accent-color: #2563eb; }
        .legend-dot { width: 12px; height: 12px; display: inline-block; border-radius: 50%; margin-right: 8px; border: 1px solid rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-blue-700 text-white p-4 shadow-md flex justify-between items-center z-10">
        <div>
            <h1 class="text-2xl font-bold">💥 斜拋砲彈：手動引爆與多碎片質心軌跡模擬</h1>
        </div>
        <div class="flex gap-2">
            <!-- New Explode Button -->
            <button id="explodeBtn" class="bg-red-500 hover:bg-red-400 text-white font-bold px-6 py-2 rounded shadow-lg transition transform hover:scale-105 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none" disabled>💥 手動引爆!</button>
            <div class="w-4"></div>
            <button id="pauseBtn" class="bg-orange-500 hover:bg-orange-400 text-white px-4 py-2 rounded shadow transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>暫停</button>
            <button id="resetBtn" class="bg-gray-500 hover:bg-gray-400 text-white px-4 py-2 rounded shadow transition">重置</button>
            <button id="startBtn" class="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-bold px-6 py-2 rounded shadow transition">發射砲彈</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Controls Sidebar -->
        <aside class="w-80 bg-white p-5 shadow-lg overflow-y-auto flex flex-col gap-5 z-0">
            
            <!-- Section 1: Original Projectile -->
            <div class="p-4 bg-gray-50 rounded-lg border border-gray-200">
                <h3 class="font-bold text-gray-700 mb-3 border-b pb-2">🚀 發射前設定</h3>
                
                <div class="slider-container">
                    <span class="slider-label">發射初速 (v₀)</span>
                    <input type="range" id="v0" min="10" max="100" value="60" step="1">
                    <span id="v0-val" class="slider-value">60</span> m/s
                </div>

                <div class="slider-container">
                    <span class="slider-label">發射仰角 (θ₀)</span>
                    <input type="range" id="theta0" min="20" max="85" value="50" step="1">
                    <span id="theta0-val" class="slider-value">50</span> °
                </div>
            </div>

            <!-- Section 2: Explosion Settings -->
            <div class="p-4 bg-red-50 rounded-lg border border-red-200">
                <h3 class="font-bold text-red-700 mb-3 border-b border-red-200 pb-2">💣 爆炸參數設定</h3>
                <p class="text-xs text-red-600 mb-2">請在發射前設定，發射後按下上方「手動引爆」按鈕。</p>

                <div class="slider-container mt-3">
                    <span class="slider-label text-red-800">碎裂數量 (N)</span>
                    <input type="range" id="fragCount" min="2" max="4" value="3" step="1" class="accent-red-500">
                    <span id="fragCount-val" class="slider-value text-red-600">3</span> 片
                </div>
                
                <div class="slider-container mt-2">
                    <span class="slider-label text-red-800">爆炸威力 (散開度)</span>
                    <input type="range" id="expStrength" min="10" max="100" value="40" step="1" class="accent-red-500">
                    <span id="expStrength-val" class="slider-value text-red-600">40</span> 
                </div>
                <p class="text-xs text-gray-500 mt-1">系統將隨機分配各碎片的質量與相對速度，並嚴格遵守動量守恆定律。</p>
            </div>

            <!-- Section 3: View Settings -->
            <div class="p-4 bg-purple-50 rounded-lg border border-purple-200">
                <h3 class="font-bold text-purple-700 mb-2 border-b border-purple-200 pb-2">🔍 畫面設定</h3>
                <div class="slider-container">
                    <span class="slider-label text-purple-800">縮放比例 (px/m)</span>
                    <input type="range" id="scaleSlider" min="0.1" max="15" value="3" step="0.1" class="accent-purple-500">
                    <span id="scale-val" class="slider-value text-purple-600">3.0</span>
                </div>
            </div>

            <!-- Legend & Info -->
            <div class="flex-1 text-sm space-y-2 bg-gray-50 p-3 rounded overflow-y-auto border border-gray-200" id="legendContainer">
                <h4 class="font-bold text-gray-700 border-b pb-1 mb-2">即時狀態與落點</h4>
                <div class="flex items-center">
                    <span class="legend-dot bg-gray-400"></span> 原始軌跡
                </div>
                <div class="flex items-center font-bold text-red-600">
                    <span class="legend-dot border-2 border-red-500 bg-transparent" style="border-style:dashed;"></span> 質心 (CM) : <span id="cm-status" class="text-black font-normal ml-1">-</span>
                </div>
                <div id="dynamic-fragments-legend" class="mt-2 space-y-2 border-t pt-2 border-gray-200">
                    <!-- Dynamic fragment status will be injected here -->
                </div>
            </div>
            
        </aside>

        <!-- Canvas Container -->
        <main class="flex-1 relative bg-gray-100 flex justify-center items-center overflow-hidden p-4">
            <canvas id="simCanvas" class="shadow-xl rounded-lg bg-white w-full h-full"></canvas>
            
            <!-- Real-time Data Overlay -->
            <div class="absolute top-6 left-6 bg-white/90 p-3 rounded shadow backdrop-blur-sm pointer-events-none border border-blue-100">
                <p class="font-mono text-sm">時間 (t): <span id="timeDisplay" class="font-bold text-blue-600">0.00</span> s</p>
                <p class="font-mono text-sm text-gray-600 mt-1">狀態: <span id="stateDisplay" class="font-bold text-green-600">準備發射</span></p>
            </div>
            
            <div class="absolute top-6 right-6 bg-white/80 p-2 rounded text-xs text-gray-500 pointer-events-none">
                g = 9.8 m/s²
            </div>
        </main>
    </div>

    <script>
        // Constants
        const g = 9.8; // m/s^2
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // Fragment Colors (Up to 4)
        const fragColors = ['#22c55e', '#3b82f6', '#eab308', '#ec4899']; 
        const fragNames = ['綠色', '藍色', '黃色', '粉紅'];

        // UI Elements
        const inputs = {
            v0: document.getElementById('v0'),
            theta0: document.getElementById('theta0'),
            fragCount: document.getElementById('fragCount'),
            expStrength: document.getElementById('expStrength')
        };
        
        const displays = {
            v0: document.getElementById('v0-val'),
            theta0: document.getElementById('theta0-val'),
            fragCount: document.getElementById('fragCount-val'),
            expStrength: document.getElementById('expStrength-val'),
            time: document.getElementById('timeDisplay'),
            state: document.getElementById('stateDisplay'),
            cm: document.getElementById('cm-status')
        };

        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValueDisplay = document.getElementById('scale-val');
        const pauseBtn = document.getElementById('pauseBtn');
        const explodeBtn = document.getElementById('explodeBtn');
        const startBtn = document.getElementById('startBtn');
        const dynamicLegend = document.getElementById('dynamic-fragments-legend');

        // State variables
        let animationId;
        let time = 0;
        let isRunning = false;
        let isPaused = false;
        let hasExploded = false;
        let scale = 3; // pixels per meter
        let origin = { x: 50, y: 0 }; // Canvas coordinates

        // Physics Objects
        let projectile = null;
        let fragments = [];
        let centerOfMass = null;
        let explosionParticles = [];
        
        // Trail arrays
        let trails = {
            projectile: [],
            cm: [],
            fragments: [] // Array of arrays
        };

        // Initialize Canvas Size
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth - 32;
            canvas.height = canvas.parentElement.clientHeight - 32;
            origin.y = canvas.height - 50;
            drawScene();
        }
        window.addEventListener('resize', resizeCanvas);

        // UI Listeners
        Object.keys(inputs).forEach(key => {
            inputs[key].addEventListener('input', (e) => {
                displays[key].innerText = e.target.value;
                if (!isRunning) resetSimulation();
            });
        });

        scaleSlider.addEventListener('input', (e) => {
            scale = parseFloat(e.target.value);
            scaleValueDisplay.innerText = scale.toFixed(1);
            if (!isRunning || isPaused) drawScene();
        });

        startBtn.addEventListener('click', () => {
            if (isRunning && !isPaused) return;
            if (isPaused) {
                isPaused = false;
                pauseBtn.innerText = "暫停";
                lastTime = performance.now();
                animationId = requestAnimationFrame(animate);
                return;
            }
            resetSimulation();
            startSimulation();
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            stopSimulation();
            resetSimulation();
        });

        pauseBtn.addEventListener('click', () => {
            if (!isRunning) return;
            isPaused = !isPaused;
            if (isPaused) {
                pauseBtn.innerText = "繼續";
            } else {
                pauseBtn.innerText = "暫停";
                lastTime = performance.now();
                animationId = requestAnimationFrame(animate);
            }
        });
        
        // Explosion Trigger Button
        explodeBtn.addEventListener('click', () => {
            triggerExplosion();
        });

        // ---------------------------------------------------------
        // Physics Logic
        // ---------------------------------------------------------

        function degToRad(deg) { return deg * Math.PI / 180; }

        class Particle {
            constructor(x, y, vx, vy, color, radius, mass) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.radius = radius;
                this.mass = mass;
                this.landed = false;
                this.landX = 0;
            }

            update(dt) {
                if (this.landed) return;

                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy -= g * dt; // Gravity

                // Ground collision
                if (this.y < 0) {
                    this.y = 0;
                    this.landed = true;
                    this.landX = this.x;
                    this.vx = 0;
                    this.vy = 0;
                }
            }
        }

        class ExplosionParticle {
            constructor(x, y, strength) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * strength * 0.8 + 10;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1.0;
                this.decay = Math.random() * 0.05 + 0.02;
            }
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vy -= g * dt;
                this.alpha -= this.decay;
            }
        }

        function createExplosionEffect(x, y, strength) {
            explosionParticles = [];
            for(let i=0; i<40; i++) {
                explosionParticles.push(new ExplosionParticle(x, y, strength));
            }
        }

        function buildLegend() {
            dynamicLegend.innerHTML = '';
            const num = parseInt(inputs.fragCount.value);
            for(let i=0; i<num; i++) {
                dynamicLegend.innerHTML += `
                    <div class="flex flex-col text-xs">
                        <div class="flex items-center">
                            <span class="legend-dot" style="background-color:${fragColors[i]}"></span>
                            碎片 ${i+1} (${fragNames[i]}) : <span id="frag-status-${i}" class="ml-1 text-gray-500">等待發射</span>
                        </div>
                        <div class="pl-5 text-gray-400" id="frag-info-${i}"></div>
                    </div>
                `;
            }
        }

        function triggerExplosion() {
            if (hasExploded || !isRunning || isPaused || projectile.landed) return;

            hasExploded = true;
            explodeBtn.disabled = true; // Disable after use
            displays.state.innerText = "💥 爆炸產生碎裂!";
            displays.state.className = "font-bold text-red-600";

            const numFrags = parseInt(inputs.fragCount.value);
            const strength = parseFloat(inputs.expStrength.value);
            const totalM = 1.0; // Assume total mass is 1
            const px = projectile.x;
            const py = projectile.y;
            const pvx = projectile.vx;
            const pvy = projectile.vy;

            // 1. Generate random masses that sum to totalM
            let rawMasses = [];
            let sumRaw = 0;
            for(let i=0; i<numFrags; i++){
                let raw = Math.random() * 0.6 + 0.2; // random 0.2 ~ 0.8
                rawMasses.push(raw);
                sumRaw += raw;
            }
            let masses = rawMasses.map(m => (m / sumRaw) * totalM);

            fragments = [];
            trails.fragments = Array(numFrags).fill().map(() => [{x: px, y: py}]);

            // Track remaining momentum
            let remPx = totalM * pvx;
            let remPy = totalM * pvy;

            // 2. Generate random velocities for the first N-1 fragments
            for(let i=0; i<numFrags - 1; i++){
                // Random spread added to current velocity
                let vx = pvx + (Math.random() - 0.5) * strength;
                let vy = pvy + (Math.random() - 0.5) * strength;
                
                fragments.push(new Particle(px, py, vx, vy, fragColors[i], 5, masses[i]));
                
                remPx -= masses[i] * vx;
                remPy -= masses[i] * vy;
            }

            // 3. Final fragment takes the remaining momentum to conserve total momentum
            let lastVx = remPx / masses[numFrags - 1];
            let lastVy = remPy / masses[numFrags - 1];
            fragments.push(new Particle(px, py, lastVx, lastVy, fragColors[numFrags - 1], 5, masses[numFrags - 1]));

            // Update UI with generated masses
            for(let i=0; i<numFrags; i++) {
                document.getElementById(`frag-status-${i}`).innerText = "飛行中";
                document.getElementById(`frag-status-${i}`).className = "ml-1 text-black font-semibold";
                document.getElementById(`frag-info-${i}`).innerText = `質量: ${(masses[i]*100).toFixed(0)}%`;
            }

            createExplosionEffect(px, py, strength);
        }

        function resetSimulation() {
            stopSimulation();
            time = 0;
            hasExploded = false;
            isPaused = false;
            
            // Buttons state
            pauseBtn.innerText = "暫停";
            pauseBtn.disabled = true;
            explodeBtn.disabled = true; 
            startBtn.disabled = false;
            
            // UI text
            displays.time.innerText = "0.00";
            displays.state.innerText = "準備發射";
            displays.state.className = "font-bold text-gray-600";
            displays.cm.innerText = "-";

            buildLegend();

            trails = { projectile: [], cm: [], fragments: [] };
            fragments = [];
            explosionParticles = [];

            // Read inputs
            const v0 = parseFloat(inputs.v0.value);
            const theta0 = parseFloat(inputs.theta0.value);
            const vx0 = v0 * Math.cos(degToRad(theta0));
            const vy0 = v0 * Math.sin(degToRad(theta0));

            projectile = new Particle(0, 0, vx0, vy0, '#6b7280', 6, 1.0); 
            centerOfMass = new Particle(0, 0, vx0, vy0, 'rgba(0,0,0,0)', 4, 1.0);
            
            trails.projectile.push({x:0, y:0});
            trails.cm.push({x:0, y:0});
            
            // Auto-scale
            const maxRange = (v0 * v0 * Math.sin(degToRad(2 * theta0))) / g;
            const estimatedWidth = maxRange * 1.2; 
            let calculatedScale = Math.min((canvas.width - 50) / estimatedWidth, 15);
            if (calculatedScale < 0.5) calculatedScale = 0.5;
            
            scale = calculatedScale;
            scaleSlider.value = scale.toFixed(1);
            scaleValueDisplay.innerText = scale.toFixed(1);

            drawScene();
        }

        function startSimulation() {
            isRunning = true;
            pauseBtn.disabled = false;
            explodeBtn.disabled = false; // Enable manual explode
            startBtn.disabled = true;
            displays.state.innerText = "🚀 砲彈飛行中...";
            displays.state.className = "font-bold text-blue-600";
            
            // Set initial legend state
            const num = parseInt(inputs.fragCount.value);
            for(let i=0; i<num; i++) {
                document.getElementById(`frag-status-${i}`).innerText = "裝載於砲彈內";
            }

            lastTime = performance.now();
            animationId = requestAnimationFrame(animate);
        }

        function stopSimulation() {
            isRunning = false;
            isPaused = false;
            pauseBtn.disabled = true;
            explodeBtn.disabled = true;
            cancelAnimationFrame(animationId);
        }

        let lastTime = 0;
        
        function animate() {
            if (!isRunning) return;
            if (isPaused) {
                lastTime = performance.now(); 
                animationId = requestAnimationFrame(animate);
                return;
            }

            const now = performance.now();
            let dt = (now - lastTime) / 1000;
            lastTime = now;

            if (dt > 0.05) dt = 0.05;
            if (dt < 0) dt = 0;

            time += dt;
            displays.time.innerText = time.toFixed(2);

            // Update Explosion Particles
            if (explosionParticles.length > 0) {
                for (let i = explosionParticles.length - 1; i >= 0; i--) {
                    explosionParticles[i].update(dt);
                    if (explosionParticles[i].alpha <= 0) {
                        explosionParticles.splice(i, 1);
                    }
                }
            }

            if (!hasExploded) {
                // Phase 1: Normal Projectile Flight
                projectile.update(dt);
                centerOfMass.x = projectile.x;
                centerOfMass.y = projectile.y;
                
                // Trail updates
                const lastP = trails.projectile[trails.projectile.length-1];
                if (Math.hypot(projectile.x - lastP.x, projectile.y - lastP.y) > 0.5) {
                    trails.projectile.push({x: projectile.x, y: projectile.y});
                    trails.cm.push({x: centerOfMass.x, y: centerOfMass.y});
                }

                // If hits ground without exploding
                if (projectile.landed) {
                    displays.state.innerText = "🛑 落地 (未引爆)";
                    displays.state.className = "font-bold text-gray-700";
                    displays.cm.innerText = `${projectile.x.toFixed(1)} m`;
                    stopSimulation();
                    startBtn.disabled = false;
                }

            } else {
                // Phase 2: Post-Explosion Multiple Fragments
                let allLanded = true;
                let sumMx = 0;
                let sumMy = 0;

                fragments.forEach((frag, idx) => {
                    frag.update(dt);
                    if (!frag.landed) allLanded = false;
                    else {
                        // Update UI on landing
                        let statusEl = document.getElementById(`frag-status-${idx}`);
                        if(statusEl && statusEl.innerText === "飛行中") {
                            statusEl.innerText = `落距: ${frag.landX.toFixed(1)}m`;
                            statusEl.className = "ml-1 text-blue-700 font-bold";
                        }
                    }

                    sumMx += frag.mass * frag.x;
                    sumMy += frag.mass * frag.y;

                    // Update individual fragment trail
                    let tArray = trails.fragments[idx];
                    let lastF = tArray[tArray.length - 1];
                    if (Math.hypot(frag.x - lastF.x, frag.y - lastF.y) > 0.5) {
                        if (!frag.landed) tArray.push({x: frag.x, y: frag.y});
                    }
                });

                // Calculate CM (Always conserves momentum -> parabolic path)
                centerOfMass.x = sumMx / 1.0; 
                centerOfMass.y = sumMy / 1.0;

                const lastCM = trails.cm[trails.cm.length-1];
                if (Math.hypot(centerOfMass.x - lastCM.x, centerOfMass.y - lastCM.y) > 0.5) {
                    // Only draw CM trail while it is mathematically above ground
                    if(centerOfMass.y >= 0) {
                        trails.cm.push({x: centerOfMass.x, y: centerOfMass.y});
                    }
                }
                
                // Keep updating CM readout dynamically
                displays.cm.innerText = `${centerOfMass.x.toFixed(1)} m`;

                if (allLanded) {
                    displays.state.innerText = "✅ 全部落地";
                    displays.state.className = "font-bold text-blue-800";
                    stopSimulation();
                    startBtn.disabled = false;
                }
            }

            drawScene();
            
            if(isRunning) {
                animationId = requestAnimationFrame(animate);
            }
        }

        // ---------------------------------------------------------
        // Drawing Logic
        // ---------------------------------------------------------
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(origin.x, origin.y);
            ctx.scale(scale, -scale); 
            
            // Ground
            ctx.fillStyle = '#1f2937'; 
            ctx.fillRect(-100, -2, canvas.width/scale + 200, 2);
            
            // Grid
            ctx.strokeStyle = '#e5e7eb';
            ctx.lineWidth = 1 / scale;
            for(let i=0; i<canvas.width/scale; i+=10) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height/scale);
                ctx.stroke();
            }

            function drawTrail(points, color, dashed = false, width = 3) {
                if (points.length < 2) return;
                ctx.beginPath();
                ctx.strokeStyle = color;
                ctx.lineWidth = width / scale; 
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (dashed) ctx.setLineDash([8/scale, 8/scale]);
                else ctx.setLineDash([]);
                
                ctx.moveTo(points[0].x, points[0].y);
                for(let i=1; i<points.length; i++) {
                    ctx.lineTo(points[i].x, points[i].y);
                }
                ctx.stroke();
                ctx.setLineDash([]); 
            }

            // 1. Draw Original Projectile Trail
            drawTrail(trails.projectile, '#9ca3af', false, 4);

            if (hasExploded) {
                // 2. Draw Fragment Trails
                trails.fragments.forEach((tArray, idx) => {
                    drawTrail(tArray, fragColors[idx], false, 2.5);
                });
            }

            // 3. Draw CM Trail (Dashed Red) - Proves momentum conservation
            drawTrail(trails.cm, '#ef4444', true, 3);

            function drawBall(p, overrideRadius = null) {
                if (!p) return;
                ctx.beginPath();
                let r = overrideRadius ? overrideRadius : p.radius;
                // scale mass area: area proportion to mass -> radius proportion to sqrt(mass)
                // base radius is 5 for mass=1.0. 
                let displayR = (r * Math.sqrt(p.mass || 1.0)) / scale;
                if(displayR < 2/scale) displayR = 2/scale; // min size
                
                ctx.arc(p.x, p.y, displayR, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                ctx.lineWidth = 1.5/scale;
                ctx.strokeStyle = 'rgba(0,0,0,0.4)';
                ctx.stroke();
            }

            // 4. Draw Explosion Particles
            if (explosionParticles.length > 0) {
                for (let p of explosionParticles) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, (3 / scale), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 120, 0, ${p.alpha})`;
                    ctx.fill();
                }
            }

            // 5. Draw the actual objects
            if (!hasExploded) {
                drawBall(projectile);
            } else {
                fragments.forEach(f => drawBall(f, 6)); // Make them slightly bigger for visibility
                
                // Draw CM marker (Red Cross/Circle)
                if (centerOfMass && centerOfMass.y >= 0) {
                    let cx = centerOfMass.x;
                    let cy = centerOfMass.y;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 5 / scale, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.4)'; 
                    ctx.fill();
                    ctx.strokeStyle = '#b91c1c';
                    ctx.lineWidth = 2/scale;
                    
                    // Crosshair for CM
                    ctx.moveTo(cx - 8/scale, cy); ctx.lineTo(cx + 8/scale, cy);
                    ctx.moveTo(cx, cy - 8/scale); ctx.lineTo(cx, cy + 8/scale);
                    ctx.stroke();
                }
            }

            ctx.restore();

            // ----------------------------------------------------------------
            // Draw Labels (Screen Space)
            // ----------------------------------------------------------------
            ctx.font = "bold 13px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "bottom";

            const toScreenX = (val) => origin.x + val * scale;
            const toScreenY = (val) => origin.y - val * scale;

            if (!hasExploded && projectile && !projectile.landed) {
                ctx.fillStyle = "#374151"; 
                ctx.fillText("砲彈", toScreenX(projectile.x), toScreenY(projectile.y) - 10);
            } 
            else if (hasExploded) {
                fragments.forEach((f, idx) => {
                    if(!f.landed) {
                        ctx.fillStyle = fragColors[idx];
                        ctx.fillText(`m${idx+1}`, toScreenX(f.x), toScreenY(f.y) - 10);
                    }
                });
                
                if (centerOfMass.y >= 0) {
                    ctx.fillStyle = "#b91c1c";
                    ctx.fillText("CM", toScreenX(centerOfMass.x), toScreenY(centerOfMass.y) - 12);
                }
            }
        }

        // Initialize
        buildLegend();
        resizeCanvas();
        resetSimulation();

    </script>
</body>
</html>
