<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲霄飛車鉛直軌道模擬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        .math-font {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
        }
        input[type=range], input[type=checkbox] {
            accent-color: #dc2626; 
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen w-screen overflow-hidden flex flex-col md:flex-row m-0 p-0">

    <!-- 左側：畫布區 (滿版) -->
    <div id="canvasContainer" class="flex-1 relative bg-[#f0f4f8]">
        <canvas id="simCanvas" class="absolute top-0 left-0 w-full h-full block"></canvas>
        
        <!-- 即時數據顯示浮水印 -->
        <div class="absolute top-6 right-6 bg-white/90 backdrop-blur p-5 rounded-xl shadow-lg pointer-events-none text-[26px] font-mono leading-relaxed border border-red-100">
            <div class="font-bold text-red-800 border-b-2 border-red-200 pb-2 mb-2 text-[29px]">即時正向力</div>
            <div>狀態: <span id="lblMode" class="text-blue-600 font-bold">斜坡下滑</span></div>
            <div>正向力 <span class="math-font">N</span> : <span id="lblN">0.00</span> <span class="math-font">mg</span></div>
        </div>
    </div>

    <!-- 右側：控制面板 -->
    <div class="w-full md:w-96 bg-white border-l border-gray-200 p-6 flex flex-col gap-5 overflow-y-auto shadow-[-4px_0_20px_rgba(0,0,0,0.05)] z-10 relative">
        <div>
            <h1 class="text-2xl font-bold text-gray-800 mb-1">雲霄飛車軌道模擬</h1>
            <h2 class="text-[19px] text-[#0000FF] font-bold mb-2">台中二中阿發老師設計</h2>
            <p class="text-sm text-gray-500">質量 m=1kg, g=9.8m/s²</p>
        </div>

        <!-- 題目解析框 -->
        <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded text-sm text-gray-800 shadow-sm">
            <h3 class="font-bold text-red-800 mb-2 text-base">📝 考題解析與臨界條件</h3>
            <p class="mb-1">要使車廂不掉落，最高點 M 的臨界條件為正向力 <span class="math-font">N=0</span>：</p>
            <p class="math-font text-center mb-2 font-bold text-red-700">mg = m(v<sub>M</sub>² / R) ⇒ v<sub>M</sub>² = gR</p>
            <p class="mb-1">由力學能守恆，推導最低點 P 的速度與加速度：</p>
            <p class="math-font text-center mb-1">½mv<sub>P</sub>² = ½mv<sub>M</sub>² + mg(2R)</p>
            <p class="math-font text-center mb-2 text-red-700 font-bold">v<sub>P</sub>² = 5gR  ⇒  a<sub>c</sub> = v<sub>P</sub>² / R = 5g</p>
            <p class="text-xs text-gray-500 mt-2 border-t pt-2">結論：釋放高度至少需 <span class="math-font text-red-600 font-bold">H = 2.5R</span>，最低點加速度為 <span class="math-font font-bold">5g</span>。</p>
        </div>

        <!-- 控制滑桿 -->
        <div class="flex flex-col gap-2 mt-2">
            <label class="font-semibold text-base flex justify-between">
                <span>釋放高度 <span class="math-font text-red-600 font-bold">H</span></span>
                <span id="hDisplay" class="text-red-600 font-bold text-lg">2.5 <span class="math-font">R</span></span>
            </label>
            <input type="range" id="hSlider" min="0" max="3.5" step="0.1" value="2.5" class="w-full cursor-pointer h-2 bg-gray-200 rounded-lg appearance-none">
            <div class="relative text-xs text-gray-400 font-bold mt-1">
                <span class="absolute left-0">0</span>
                <!-- 2.5R 位於 3.5R 的比例約 71.4% 處 -->
                <span class="absolute" style="left: 71.4%; transform: translateX(-50%);">2.5R (臨界)</span>
                <span class="absolute right-0">3.5R</span>
            </div>
            <div class="h-3"></div> <!-- 避免絕對定位標籤重疊的佔位用 -->
        </div>

        <!-- 預設按鈕 -->
        <div class="flex flex-col gap-2">
            <span class="font-semibold text-sm text-gray-700">快速預設情境：</span>
            <button onclick="setK(1.0)" class="px-3 py-2 text-sm bg-white border border-gray-300 hover:bg-gray-100 rounded text-left transition-colors font-medium">
                1. 能量不足 (擺盪) <br><span class="text-xs text-gray-500 font-normal math-font">H &le; R (例如 1.0R)</span>
            </button>
            <button onclick="setK(1.8)" class="px-3 py-2 text-sm bg-white border border-orange-300 hover:bg-orange-50 rounded text-left transition-colors font-medium">
                2. 越過半圓但脫軌 (拋體) <br><span class="text-xs text-orange-500 font-normal math-font">R &lt; H &lt; 2.5R (例如 1.8R)</span>
            </button>
            <button onclick="setK(2.5)" class="px-3 py-2 text-sm bg-white border border-red-300 hover:bg-red-50 rounded text-left transition-colors font-medium shadow-sm">
                3. 完美臨界越過 M 點 <br><span class="text-xs text-red-600 font-normal math-font">H = 2.5R</span>
            </button>
        </div>

        <!-- 顯示切換與慢動作控制 -->
        <div class="flex flex-col gap-3 mt-2 bg-gray-50 p-3 rounded-lg border border-gray-200">
            <label class="flex items-center gap-3 cursor-pointer">
                <input type="checkbox" id="showVectors" checked class="rounded text-red-600 focus:ring-red-500 w-5 h-5">
                <span class="text-sm text-gray-700 font-medium">顯示受力與速度向量</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer">
                <input type="checkbox" id="slowMotion" class="rounded text-red-600 focus:ring-red-500 w-5 h-5">
                <span class="text-sm text-gray-700 font-bold">慢動作 (1/10 倍速)</span>
            </label>
        </div>

        <div class="flex-grow"></div>

        <!-- 執行控制 -->
        <div class="flex gap-2">
            <button id="btnPlay" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-transform active:scale-95 text-lg">
                播放 / 暫停
            </button>
            <button id="btnReset" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 px-4 rounded-lg shadow transition-transform active:scale-95 text-lg">
                重設
            </button>
        </div>
    </div>

    <script>
        // --- 物理常數與全域變數 ---
        const g = 9.8;      
        const R = 2.0;      
        const m = 1.0;      
        const slopeEndX = -3.0; // 斜坡結束，接到平地的 X 座標
        
        let initialH = 5.0; // 初始釋放高度 (真實公尺)
        let isRunning = false;
        let animationId = null;

        // --- 繪圖比例與座標轉換 ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvasContainer');
        
        let scale = 100;
        let originX = 0;
        let originY = 0;

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            scale = Math.min(canvas.width / 15, canvas.height / 9); 
            originX = canvas.width * 0.65; 
            originY = canvas.height * 0.85; 
            if (!isRunning) draw(); 
        }

        window.addEventListener('resize', resizeCanvas);

        function toScreenX(x) { return originX + x * scale; }
        function toScreenY(y) { return originY - y * scale; }

        // --- 物件狀態 ---
        let ball = {
            x: 0, y: 0,
            vs: 0,          
            vx: 0, vy: 0,
            theta: 0,       
            omega: 0,       
            mode: 'SLOPE',  
            N: 0,
            totalE: 0 // 儲存總力學能，確保物理模擬不失真
        };

        let pathHistory = [];
        let stepCount = 0;

        // --- DOM 元素 ---
        const hSlider = document.getElementById('hSlider');
        const hDisplay = document.getElementById('hDisplay');
        const btnPlay = document.getElementById('btnPlay');
        const btnReset = document.getElementById('btnReset');
        const showVectors = document.getElementById('showVectors');
        const slowMotion = document.getElementById('slowMotion');
        
        function updateUI() {
            let val = parseFloat(hSlider.value);
            hDisplay.innerHTML = val.toFixed(1) + ' <span class="math-font">R</span>';
            initialH = val * R; // 將 R 的倍數轉換為實際運算的公尺高度
            
            if (!isRunning && ball.mode === 'SLOPE' && ball.vs === 0) {
                resetSim(); 
            }
        }

        window.setK = function(val) {
            hSlider.value = val;
            updateUI();
            resetSim();
        }

        hSlider.addEventListener('input', updateUI);
        
        btnPlay.addEventListener('click', () => {
            isRunning = !isRunning;
            btnPlay.innerText = isRunning ? '暫停' : '繼續';
            btnPlay.classList.toggle('bg-yellow-500', isRunning);
            btnPlay.classList.toggle('bg-red-600', !isRunning);
        });

        btnReset.addEventListener('click', resetSim);

        function resetSim() {
            isRunning = false;
            btnPlay.innerText = '播放';
            btnPlay.className = "flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-transform active:scale-95 text-lg";
            
            ball = {
                x: slopeEndX - initialH, 
                y: initialH,
                vs: 0,
                vx: 0, vy: 0,
                theta: 0, omega: 0,
                mode: 'SLOPE',
                N: m * g * Math.cos(Math.PI / 4),
                totalE: m * g * initialH // 重置時鎖定初始總能量
            };
            pathHistory = [];
            stepCount = 0;
            draw();
            updateDashboard();
        }

        // --- 物理模擬核心引擎 ---
        const timeStep = 1 / 60; 
        const subSteps = 50; 
        const dt = timeStep / subSteps;

        function physicsStep() {
            let currentDt = slowMotion.checked ? dt / 10 : dt;
            const slopeAngle = Math.PI / 4; 

            for (let i = 0; i < subSteps; i++) {
                if (ball.mode === 'SLOPE') {
                    let a_s = -g * Math.sin(slopeAngle); 
                    ball.vs += a_s * currentDt; 
                    
                    ball.x += -ball.vs * Math.cos(slopeAngle) * currentDt;
                    ball.y += ball.vs * Math.sin(slopeAngle) * currentDt;
                    
                    ball.N = m * g * Math.cos(slopeAngle);
                    ball.vx = -ball.vs * Math.cos(slopeAngle);
                    ball.vy = ball.vs * Math.sin(slopeAngle);

                    if (ball.x >= slopeEndX) {
                        ball.mode = 'HORIZ';
                        ball.x = slopeEndX;
                        ball.y = 0;
                        // 強制套用能量守恆修正速度，消弭軌道轉折的積分誤差
                        ball.vx = Math.sqrt(2 * ball.totalE / m); 
                        ball.vy = 0;
                        ball.N = m * g;
                    }
                } 
                else if (ball.mode === 'HORIZ') {
                    ball.x += ball.vx * currentDt;
                    ball.N = m * g;
                    
                    if (ball.x >= 0 && ball.vx > 0) {
                        ball.mode = 'CIRCLE';
                        ball.theta = 0;
                        // 確保進入圓周時能量完全精準
                        ball.omega = Math.sqrt(2 * ball.totalE / m) / R; 
                        ball.x = 0; 
                        ball.y = 0;
                    } else if (ball.x <= slopeEndX && ball.vx < 0) {
                        ball.mode = 'SLOPE';
                        ball.x = slopeEndX;
                        ball.y = 0;
                        ball.vs = Math.sqrt(2 * ball.totalE / m); 
                    }
                } 
                else if (ball.mode === 'CIRCLE') {
                    // 先計算切線加速度以判斷角速度「方向」
                    let alpha = -(g / R) * Math.sin(ball.theta);
                    let next_omega = ball.omega + alpha * currentDt;
                    ball.theta += ball.omega * currentDt;

                    // 使用嚴格的力學能守恆計算「大小」，徹底消滅積分飄移
                    let current_y = R * (1 - Math.cos(ball.theta));
                    let v_bottom_sq = 2 * ball.totalE / m;
                    let exact_v_sq = v_bottom_sq - 2 * g * current_y;

                    if (exact_v_sq < 0) exact_v_sq = 0; // 防止浮點數微小穿透造成負根號

                    // 結合方向與絕對大小
                    ball.omega = (next_omega >= 0 ? 1 : -1) * Math.sqrt(exact_v_sq) / R;

                    // 利用絕對精準的速率平方計算正向力 N
                    ball.N = m * (exact_v_sq / R + g * Math.cos(ball.theta));

                    ball.x = R * Math.sin(ball.theta);
                    ball.y = current_y;
                    ball.vx = ball.omega * R * Math.cos(ball.theta);
                    ball.vy = ball.omega * R * Math.sin(ball.theta);

                    if (ball.theta >= 2 * Math.PI - 0.001) {
                        // 完整繞完一圈，從右側駛離
                        ball.mode = 'HORIZ_EXIT';
                        ball.x = 0; 
                        ball.y = 0;
                        ball.vx = ball.omega * R;
                        ball.vy = 0;
                        ball.N = m * g;
                    } 
                    // 脫軌條件：N為負且球在水平面上方 (cos < 0)。加入 1e-4 的容差吸收浮點數誤差
                    else if (ball.N <= -1e-4 && Math.cos(ball.theta) <= -1e-4) {
                        ball.mode = 'FREE';
                        ball.N = 0;
                    }
                    else if (ball.theta <= 0 && ball.omega < 0) {
                        ball.mode = 'HORIZ';
                        ball.x = 0;
                        ball.y = 0;
                        ball.vx = ball.omega * R; 
                        ball.vy = 0;
                        ball.N = m * g;
                    }
                } 
                else if (ball.mode === 'HORIZ_EXIT') {
                    ball.x += ball.vx * currentDt;
                    ball.N = m * g;
                }
                else if (ball.mode === 'FREE') {
                    ball.N = 0;
                    ball.vy -= g * currentDt;
                    ball.x += ball.vx * currentDt;
                    ball.y += ball.vy * currentDt;

                    if (ball.y <= 0 && ball.vy < 0) {
                        ball.y = 0;
                        ball.vy = -ball.vy * 0.7; 
                    }
                }

                // 增加軌跡長度，讓完整的圓周都能被清楚看到
                let pathFreq = slowMotion.checked ? 50 : 5;
                if (stepCount++ % pathFreq === 0) {
                    pathHistory.push({ x: ball.x, y: ball.y });
                    if (pathHistory.length > 800) pathHistory.shift();
                }
            }
        }

        // --- 繪圖函式 ---
        function drawArrow(fromX, fromY, toX, toY, color, width = 3) {
            const headlen = 12;
            const dx = toX - fromX;
            const dy = toY - fromY;
            const angle = Math.atan2(dy, dx);
            
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.lineTo(toX, toY);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const ballRadius = 16;
            const trackOffset = ballRadius + 2; 

            // ===== 數學參數計算 =====
            const T = trackOffset;
            const arcRadius = 0.6 * scale; // 改用相對比例，避免小螢幕時圓角干擾圓周軌道
            
            let bx = toScreenX(ball.x);
            let by = toScreenY(ball.y);

            // ================= 1. 畫軌道 (雙層紅色金屬質感) =================
            function drawTrackPath() {
                const startX = toScreenX(slopeEndX - 8);
                const startY = toScreenY(8);
                
                // 為了使斜坡完全與圓角平滑相切，加入法線偏移計算
                const trackSlopeStartX = startX - T / Math.SQRT2;
                const trackSlopeStartY = startY + T / Math.SQRT2;
                const trackCornerX = toScreenX(slopeEndX) - T * (Math.SQRT2 - 1);
                const trackCornerY = toScreenY(0) + T;

                ctx.beginPath();
                ctx.moveTo(trackSlopeStartX, trackSlopeStartY);
                // 產生平滑角
                ctx.arcTo(trackCornerX, trackCornerY, toScreenX(0), toScreenY(0) + T, arcRadius);
                ctx.lineTo(toScreenX(0), toScreenY(0) + T);
                // 完整的圓周軌道 (從底端 Math.PI/2 起繞 360 度)
                ctx.arc(toScreenX(0), toScreenY(R), R * scale + T, Math.PI/2, Math.PI/2 - 2 * Math.PI, true);
                ctx.lineTo(toScreenX(10), toScreenY(0) + T);
            }

            // 外層暗紅
            ctx.lineWidth = 10;
            ctx.strokeStyle = '#991b1b'; 
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            drawTrackPath();
            ctx.stroke();

            // 內層亮紅
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#f87171'; 
            drawTrackPath();
            ctx.stroke();

            // ================= 2. 畫輔助線與標示 =================
            ctx.strokeStyle = '#94a3b8';
            ctx.setLineDash([6, 6]);
            ctx.lineWidth = 2;
            
            ctx.beginPath(); ctx.moveTo(toScreenX(0), toScreenY(R)); ctx.lineTo(toScreenX(0), toScreenY(0) + trackOffset); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(toScreenX(0), toScreenY(R)); ctx.lineTo(toScreenX(0), toScreenY(2*R) - trackOffset); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(toScreenX(0), toScreenY(R)); ctx.lineTo(toScreenX(R) + trackOffset, toScreenY(R)); ctx.stroke();
            
            if(ball.mode === 'SLOPE' && !isRunning) {
                ctx.beginPath(); 
                ctx.moveTo(bx, by);
                ctx.lineTo(toScreenX(slopeEndX), by); 
                ctx.stroke();
                
                // 標示 H
                ctx.fillStyle = '#dc2626';
                ctx.font = "italic bold 26px 'Times New Roman', serif";
                ctx.fillText("H", toScreenX(slopeEndX) + 12, by + 8);
            }
            ctx.setLineDash([]); 

            const cX = toScreenX(0);
            const edgeX = toScreenX(R) + trackOffset;
            const arrowY = toScreenY(R) - 20; 

            drawArrow(cX + (edgeX - cX)/2, arrowY, cX, arrowY, '#475569', 2);      
            drawArrow(cX + (edgeX - cX)/2, arrowY, edgeX, arrowY, '#475569', 2);  

            ctx.fillStyle = '#0f172a';
            ctx.textAlign = 'center';
            ctx.font = "italic 24px 'Times New Roman', serif";
            ctx.fillText("R", cX + (edgeX - cX)/2, arrowY - 10);

            ctx.font = "italic bold 28px 'Times New Roman', serif";
            ctx.fillText("P", toScreenX(0) - 20, toScreenY(0) + trackOffset + 35);
            ctx.fillText("C", toScreenX(-0.5), toScreenY(R) + 8);
            ctx.fillText("M", toScreenX(0) - 20, toScreenY(2*R) - trackOffset - 15);
            ctx.textAlign = 'left';

            // ================= 3. 畫軌跡 (還原真實物理軌跡) =================
            if (pathHistory.length > 1) {
                ctx.beginPath();
                for (let i = 0; i < pathHistory.length; i++) {
                    let p_bx = toScreenX(pathHistory[i].x);
                    let p_by = toScreenY(pathHistory[i].y);
                    
                    if (i === 0) ctx.moveTo(p_bx, p_by);
                    else ctx.lineTo(p_bx, p_by);
                }
                ctx.strokeStyle = 'rgba(56, 188, 248, 0.6)'; 
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // ================= 4. 畫雲霄飛車車體 (球體) =================
            let gradient = ctx.createRadialGradient(bx - 5, by - 5, 2, bx, by, ballRadius);
            gradient.addColorStop(0, '#e2e8f0'); 
            gradient.addColorStop(0.5, '#64748b'); 
            gradient.addColorStop(1, '#0f172a'); 
            
            ctx.beginPath();
            ctx.arc(bx, by, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // ================= 5. 畫物理向量 =================
            if (showVectors.checked) {
                const vScale = 8; 
                const fScale = 1.5;  

                let vMag = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
                if (vMag > 0.1) {
                    drawArrow(bx, by, bx + ball.vx * vScale, by - ball.vy * vScale, '#16a34a', 4);
                }

                drawArrow(bx, by, bx, by + m * g * fScale, '#94a3b8', 3);

                if (ball.N > 0.1 && ball.mode !== 'FREE') {
                    let nx, ny;
                    if (ball.mode === 'HORIZ' || ball.mode === 'HORIZ_EXIT') {
                        nx = 0; ny = 1; 
                    } else if (ball.mode === 'CIRCLE') {
                        nx = -Math.sin(ball.theta);
                        ny = Math.cos(ball.theta);
                    } else if (ball.mode === 'SLOPE') {
                        nx = Math.sin(Math.PI/4);
                        ny = Math.cos(Math.PI/4);
                    }
                    drawArrow(bx, by, bx + nx * ball.N * fScale, by - ny * ball.N * fScale, '#2563eb', 4);
                }
            }
        }

        // 更新資料面板
        function updateDashboard() {
            const lblMode = document.getElementById('lblMode');
            const modeName = {
                'SLOPE': '斜坡滑行', 
                'HORIZ': '平地進入', 
                'CIRCLE': '圓周繞行', 
                'FREE': '脫軌墜落',
                'HORIZ_EXIT': '成功駛離'
            };
            const modeColors = {
                'SLOPE': 'text-purple-600', 
                'HORIZ': 'text-blue-600', 
                'CIRCLE': 'text-green-600', 
                'FREE': 'text-orange-600',
                'HORIZ_EXIT': 'text-teal-600'
            };
            
            lblMode.innerText = modeName[ball.mode];
            lblMode.className = `font-bold ${modeColors[ball.mode]}`;
            
            let nInMg = Math.max(0, ball.N) / (m * g);
            document.getElementById('lblN').innerText = nInMg.toFixed(2);
        }

        function loop() {
            if (isRunning) {
                physicsStep();
                updateDashboard();
            }
            draw();
            animationId = requestAnimationFrame(loop);
        }

        resizeCanvas();
        updateUI();
        resetSim();
        loop();

    </script>
</body>
</html>
