<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子鋁箔繞射實驗模擬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #e2e8f0;
            overflow: hidden;
            user-select: none;
        }

        /* 科技感發光滑桿 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4ade80;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px #4ade80;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #1e293b;
            border-radius: 2px;
            border: 1px solid #334155;
        }

        .neon-border {
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1), inset 0 0 20px rgba(56, 189, 248, 0.05);
        }

        .canvas-container {
            position: relative;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* 3D 場景上的 HTML 標籤 */
        .scene-label {
            position: absolute;
            color: #cbd5e1;
            font-size: 1.75rem; /* 放大了 2 倍 */
            font-weight: bold;
            letter-spacing: 0.1em;
            pointer-events: none;
            text-shadow: 0 4px 6px rgba(0,0,0,0.9), 0 0 10px rgba(56, 189, 248, 0.5);
            transform: translate(-50%, -50%); /* 確保置中對齊定位點 */
            white-space: nowrap;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col p-4 gap-4">

    <!-- 標題 -->
    <header class="flex items-center gap-4 px-4 py-2">
        <h1 class="text-3xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500" style="text-shadow: 0 0 20px rgba(56,189,248,0.3);">
            電子鋁箔繞射實驗模擬
        </h1>
        <div class="h-px flex-1 bg-gradient-to-r from-blue-500/50 to-transparent"></div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 flex gap-4 h-full relative">
        
        <!-- 左側控制面板 -->
        <aside class="w-80 flex flex-col gap-6 neon-border bg-slate-900/80 p-6 rounded-xl relative z-20 backdrop-blur-sm">

            <!-- 電子槍頻率 -->
            <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700 mt-4">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-cyan-300">電子發射裝置</h2>
                </div>
                <label class="block text-sm mb-2 text-slate-300">電子發射頻率</label>
                <input type="range" id="freqSlider" min="1" max="100" value="60">
            </div>

            <!-- 電子停留時間 -->
            <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold text-cyan-300">偵測屏幕設定</h2>
                </div>
                <label class="block text-sm mb-2 text-slate-300">電子停留時間</label>
                <input type="range" id="decaySlider" min="0" max="100" value="98">
            </div>

            <p class="text-xs text-slate-400 mt-2 leading-relaxed px-2">
                電子束打擊在多晶體的鋁箔上。由於鋁箔的晶格結構具有多重反射面，電子將會產生 2D 的同心圓環狀繞射圖紋（Debye-Scherrer rings）。
            </p>

            <!-- 清除畫面按鈕 -->
            <button onclick="clearScreen()" class="mt-auto py-2 rounded border border-red-500/50 text-red-400 hover:bg-red-500/20 transition-all font-semibold tracking-widest">
                清除偵測屏幕
            </button>
            
        </aside>

        <!-- 右側 3D 視覺化區域 -->
        <section id="three-container" class="flex-1 canvas-container relative">
            
            <!-- 3D 視角標籤覆蓋層 (動態追蹤定位) -->
            <div id="label-gun" class="scene-label">電子槍</div>
            <div id="label-foil" class="scene-label">鋁箔靶材</div>
            <div id="label-screen" class="scene-label">偵測屏幕</div>

        </section>
    </main>

    <script>
        // --- 狀態變數與 DOM ---
        const freqSlider = document.getElementById('freqSlider');
        const decaySlider = document.getElementById('decaySlider');
        
        // 標籤 DOM
        const labelGun = document.getElementById('label-gun');
        const labelFoil = document.getElementById('label-foil');
        const labelScreen = document.getElementById('label-screen');

        // --- 物理/機率引擎參數 (鋁箔 Debye-Scherrer Rings) ---
        const texSize = 1024; // 貼圖解析度
        const baseRadius = 110; // 基礎晶面繞射半徑基準
        
        // 面心立方(FCC)晶格的半徑比例: sqrt(3), sqrt(4), sqrt(8), sqrt(11)
        const rings = [
            { R: baseRadius * 1.732, width: 8, amp: 0.60 }, // (111) 面
            { R: baseRadius * 2.000, width: 8, amp: 0.45 }, // (200) 面
            { R: baseRadius * 2.828, width: 10, amp: 0.25 }, // (220) 面
            { R: baseRadius * 3.316, width: 12, amp: 0.15 }  // (311) 面
        ];

        // --- Three.js 場景設定 ---
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020617, 0.015);

        // 攝影機：側面等角透視 (類似截圖視角)
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(-25, 15, 45); 
        camera.lookAt(10, -5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // 光源
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0x38bdf8, 0.5);
        dirLight.position.set(-20, 20, 20);
        scene.add(dirLight);

        // --- 建立物件 ---

        // 1. 電子槍模型
        const gunGroup = new THREE.Group();
        gunGroup.position.set(-25, 0, 0);
        
        const gunBody = new THREE.Mesh(
            new THREE.BoxGeometry(8, 6, 6),
            new THREE.MeshPhongMaterial({ color: 0x334155, flatShading: true })
        );
        const gunNozzle = new THREE.Mesh(
            new THREE.CylinderGeometry(0.8, 0.8, 4, 16),
            new THREE.MeshPhongMaterial({ color: 0x94a3b8 })
        );
        gunNozzle.rotation.z = -Math.PI / 2;
        gunNozzle.position.set(5, 0, 0);
        
        gunGroup.add(gunBody);
        gunGroup.add(gunNozzle);
        scene.add(gunGroup);

        // 電子槍開火閃光
        const flashLight = new THREE.PointLight(0xfef08a, 0, 20);
        flashLight.position.set(-18, 0, 0);
        scene.add(flashLight);
        let flashIntensity = 0;

        // 電子閃爍粒子系統 (存放瞬間出現的小黃球)
        const electronParticles = [];
        const particleGeo = new THREE.SphereGeometry(0.12, 8, 8); 

        function spawnElectronParticle(x, y, z) {
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xfacc15, 
                transparent: true, 
                opacity: 1 
            });
            const mesh = new THREE.Mesh(particleGeo, material);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            electronParticles.push({ mesh, life: 1.0 });
        }

        // 2. 鋁箔靶材 (外框 + 半透明鋁箔)
        const foilGroup = new THREE.Group();
        
        // 建立外框
        const frameShape = new THREE.Shape();
        frameShape.moveTo(-15, -10);
        frameShape.lineTo(15, -10);
        frameShape.lineTo(15, 10);
        frameShape.lineTo(-15, 10);
        frameShape.lineTo(-15, -10);

        const hole = new THREE.Path();
        hole.moveTo(-6, -6);
        hole.lineTo(6, -6);
        hole.lineTo(6, 6);
        hole.lineTo(-6, 6);
        hole.lineTo(-6, -6);
        frameShape.holes.push(hole);

        const frameGeo = new THREE.ExtrudeGeometry(frameShape, { depth: 0.5, bevelEnabled: false });
        const frameMat = new THREE.MeshPhongMaterial({ color: 0x1e293b });
        const frameMesh = new THREE.Mesh(frameGeo, frameMat);
        
        // 加上白框線
        const frameEdges = new THREE.EdgesGeometry(frameGeo);
        const frameLine = new THREE.LineSegments(frameEdges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 }));
        frameMesh.add(frameLine);

        // 建立內部鋁箔 (半透明亮銀色)
        const innerFoilGeo = new THREE.PlaneGeometry(12, 12);
        const innerFoilMat = new THREE.MeshPhongMaterial({ 
            color: 0xe2e8f0, 
            transparent: true, 
            opacity: 0.6,
            side: THREE.DoubleSide,
            shininess: 100,
            specular: 0xffffff
        });
        const innerFoilMesh = new THREE.Mesh(innerFoilGeo, innerFoilMat);
        innerFoilMesh.position.z = 0.25;

        foilGroup.add(frameMesh);
        foilGroup.add(innerFoilMesh);
        
        foilGroup.position.set(0, 0, 0);
        foilGroup.rotation.y = Math.PI / 2; // 面向 X 軸
        scene.add(foilGroup);

        // 3. 偵測屏幕 (使用隱藏的 Canvas 動態繪製貼圖)
        const hiddenCanvas = document.createElement('canvas');
        hiddenCanvas.width = texSize;
        hiddenCanvas.height = texSize;
        const ctx = hiddenCanvas.getContext('2d');
        
        // 初始化背景
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, texSize, texSize);

        const screenTexture = new THREE.CanvasTexture(hiddenCanvas);
        const screenMaterial = new THREE.MeshBasicMaterial({ map: screenTexture }); 
        const screenGeometry = new THREE.PlaneGeometry(35, 35); // 稍微加高以顯示完整的同心圓
        const screenMesh = new THREE.Mesh(screenGeometry, screenMaterial);
        
        // 加上屏幕的白框
        const screenEdges = new THREE.EdgesGeometry(screenGeometry);
        const screenLine = new THREE.LineSegments(screenEdges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }));
        screenMesh.add(screenLine);

        screenMesh.position.set(30, 0, 0);
        screenMesh.rotation.y = -Math.PI / 2; // 面向電子槍
        scene.add(screenMesh);


        // --- UI 與互動事件 ---
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // 稍微跟隨滑鼠製造 3D 視差感
        let mouseX = 0;
        let mouseY = 0;
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        });

        function clearScreen() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, texSize, texSize);
            screenTexture.needsUpdate = true;
        }

        // --- 核心物理/機率引擎 (2D 繞射同心圓) ---
        function getQuantumTarget2D() {
            let maxAttempts = 500;
            for(let i=0; i<maxAttempts; i++) {
                // 在貼圖範圍內隨機取點 (以中心為原點的半徑與角度)
                let r = Math.random() * (texSize / 2);
                let theta = Math.random() * Math.PI * 2;
                
                let z = r * Math.cos(theta); // 水平位移
                let y = r * Math.sin(theta); // 垂直位移
                
                // 計算該半徑的量子機率
                let prob = 0;
                
                // 1. 中央未散射的高強度直射電子束 (中心點)
                prob += 1.0 * Math.exp(-(r*r) / (2 * 12 * 12)); 
                
                // 2. 累加各個晶面的繞射環機率 (高斯分佈疊加)
                for (let ring of rings) {
                    prob += ring.amp * Math.exp(-Math.pow(r - ring.R, 2) / (2 * ring.width * ring.width));
                }

                // 加入極微量的隨機背景雜訊散射
                prob += 0.01;

                if (Math.random() < prob) {
                    return { 
                        targetZ: z + texSize / 2, 
                        targetY: y + texSize / 2 
                    };
                }
            }
            return { targetZ: texSize/2, targetY: texSize/2 };
        }

        function hitScreen(targetZ, targetY) {
            ctx.beginPath();
            ctx.arc(targetZ, targetY, 2.0, 0, Math.PI * 2); // 點縮小以維持精細度
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; // 亮黃色改為白色
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffffff'; // 陰影改為白色
            ctx.fill();
            ctx.shadowBlur = 0;
            
            screenTexture.needsUpdate = true;
        }

        // --- 動態標籤更新 ---
        function updateLabelsPosition() {
            const widthHalf = container.clientWidth / 2;
            const heightHalf = container.clientHeight / 2;

            // 將標籤定位在裝置正上方的 3D 座標，並轉換成 2D 螢幕座標
            const posGun = new THREE.Vector3(-25, 7, 0).project(camera);
            labelGun.style.left = (posGun.x * widthHalf + widthHalf) + 'px';
            labelGun.style.top = (-(posGun.y * heightHalf) + heightHalf) + 'px';

            const posFoil = new THREE.Vector3(0, 13, 0).project(camera);
            labelFoil.style.left = (posFoil.x * widthHalf + widthHalf) + 'px';
            labelFoil.style.top = (-(posFoil.y * heightHalf) + heightHalf) + 'px';

            const posScreen = new THREE.Vector3(30, 20, 0).project(camera);
            labelScreen.style.left = (posScreen.x * widthHalf + widthHalf) + 'px';
            labelScreen.style.top = (-(posScreen.y * heightHalf) + heightHalf) + 'px';
        }

        // --- 動畫迴圈 ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. 處理攝影機視差 (微微移動)
            const targetCamX = -25 + mouseX * 3;
            const targetCamY = 15 + mouseY * 3;
            camera.position.x += (targetCamX - camera.position.x) * 0.05;
            camera.position.y += (targetCamY - camera.position.y) * 0.05;
            camera.lookAt(10, -5, 0);

            // 同步更新 3D 追蹤標籤位置
            updateLabelsPosition();

            // 2. 處理屏幕殘影淡出
            let retention = decaySlider.value; 
            let fadeAlpha = 1 - (retention / 100); 
            if (fadeAlpha > 0) {
                // 用底色覆蓋產生淡出
                ctx.fillStyle = `rgba(15, 23, 42, ${fadeAlpha * 0.2})`;
                ctx.fillRect(0, 0, texSize, texSize);
                screenTexture.needsUpdate = true;
            }

            // 3. 槍口閃光衰減
            if (flashIntensity > 0) {
                flashIntensity -= 1.5;
                flashLight.intensity = Math.max(0, flashIntensity);
            }

            // 4. 更新閃爍粒子狀態
            for (let i = electronParticles.length - 1; i >= 0; i--) {
                let p = electronParticles[i];
                p.life -= 0.04; // 衰減速度
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    electronParticles.splice(i, 1);
                } else {
                    p.mesh.material.opacity = p.life;
                    p.mesh.scale.setScalar(1 + (1 - p.life) * 0.3); 
                }
            }

            // 5. 發射電子邏輯 (瞬間塌縮，產生 2D 繞射同心圓)
            let freq = parseInt(freqSlider.value);
            if (Math.random() < (freq / 100) * 1.5) {
                let burst = Math.floor(freq / 20) + 1;
                for(let i=0; i<burst; i++){
                    flashIntensity = 15; // 觸發閃光
                    
                    // 取得 2D 座標的繞射落點
                    let pos = getQuantumTarget2D();
                    hitScreen(pos.targetZ, pos.targetY); 
                    
                    // 【視覺特效】在電子槍口最右端隨機製造粒子
                    spawnElectronParticle(
                        -18, 
                        (Math.random() - 0.5) * 0.6, 
                        (Math.random() - 0.5) * 0.6
                    );

                    // 【視覺特效】在鋁箔靶材中央區域隨機製造粒子 (模擬電子打在靶材表面)
                    let foilR = Math.random() * 1.5; // 集中在中央小區域
                    let foilTheta = Math.random() * Math.PI * 2;
                    spawnElectronParticle(
                        -0.3, // 推前至鋁箔表面
                        foilR * Math.sin(foilTheta), 
                        foilR * Math.cos(foilTheta)
                    );
                }
            }

            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>
</html>
