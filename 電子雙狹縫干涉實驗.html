<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電子雙狹縫干涉實驗模擬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #e2e8f0;
            overflow: hidden;
            user-select: none;
        }

        /* 科技感發光滑桿 */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #4ade80;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 10px #4ade80;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #1e293b;
            border-radius: 2px;
            border: 1px solid #334155;
        }

        /* 自訂單選按鈕 (若無設定切換可保留樣式備用) */
        .radio-custom {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #64748b;
            border-radius: 50%;
            position: relative;
            margin-right: 8px;
            vertical-align: middle;
        }
        input[type="radio"]:checked + .radio-custom::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 8px;
            height: 8px;
            background: #38bdf8;
            border-radius: 50%;
            box-shadow: 0 0 8px #38bdf8;
        }

        .neon-border {
            border: 1px solid rgba(56, 189, 248, 0.3);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.1), inset 0 0 20px rgba(56, 189, 248, 0.05);
        }

        .canvas-container {
            position: relative;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* 3D 場景上的 HTML 標籤 */
        .scene-label {
            position: absolute;
            color: #cbd5e1;
            font-size: 1.75rem; /* 放大了 2 倍 */
            font-weight: bold;
            letter-spacing: 0.1em;
            pointer-events: none;
            text-shadow: 0 4px 6px rgba(0,0,0,0.9), 0 0 10px rgba(56, 189, 248, 0.5);
            transform: translate(-50%, -50%); /* 確保置中對齊定位點 */
            white-space: nowrap;
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col p-4 gap-4">

    <!-- 標題 -->
    <header class="flex items-center gap-4 px-4 py-2">
        <h1 class="text-3xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500" style="text-shadow: 0 0 20px rgba(56,189,248,0.3);">
            電子雙狹縫干涉實驗
        </h1>
        <div class="h-px flex-1 bg-gradient-to-r from-blue-500/50 to-transparent"></div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 flex gap-4 h-full relative">
        
        <!-- 左側控制面板 -->
        <aside class="w-80 flex flex-col gap-6 neon-border bg-slate-900/80 p-6 rounded-xl relative z-20 backdrop-blur-sm">

            <!-- 電子槍頻率 -->
            <div class="bg-slate-800/50 p-4 rounded-lg border border-slate-700">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-semibold text-cyan-300">電子槍</h2>
                    <span id="freqVal" class="text-sm text-slate-400">中</span>
                </div>
                <label class="block text-sm mb-2 text-slate-300">電子發射頻率</label>
                <input type="range" id="freqSlider" min="1" max="100" value="50">
            </div>

            <!-- 清除畫面按鈕 -->
            <button onclick="clearScreen()" class="mt-auto py-2 rounded border border-red-500/50 text-red-400 hover:bg-red-500/20 transition-all font-semibold tracking-widest">
                清除偵測屏幕
            </button>
            
        </aside>

        <!-- 右側 3D 視覺化區域 -->
        <section id="three-container" class="flex-1 canvas-container relative">
            
            <!-- 3D 視角標籤覆蓋層 (動態追蹤定位) -->
            <div id="label-gun" class="scene-label">電子槍</div>
            <div id="label-barrier" class="scene-label">擋板與狹縫</div>
            <div id="label-screen" class="scene-label">偵測屏幕</div>

            <!-- 屏幕殘影設定 (浮動於右側) -->
            <div class="absolute right-0 top-12 bottom-12 w-16 flex flex-col items-center py-6 bg-slate-900/60 border-l border-slate-800 backdrop-blur-md z-10 rounded-l-xl">
                <span class="text-xs text-slate-300 font-semibold" style="writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 4px;">電子停留時間</span>
                <input type="range" id="decaySlider" min="0" max="100" value="95" class="mt-6" style="writing-mode: vertical-lr; direction: rtl; width: 4px; height: 100%;">
            </div>

        </section>
    </main>

    <script>
        // --- 狀態變數與 DOM ---
        const freqSlider = document.getElementById('freqSlider');
        const decaySlider = document.getElementById('decaySlider');
        
        // 標籤 DOM
        const labelGun = document.getElementById('label-gun');
        const labelBarrier = document.getElementById('label-barrier');
        const labelScreen = document.getElementById('label-screen');

        // --- 物理/機率引擎參數 ---
        const texSize = 1024; // 貼圖解析度
        const envelopeWidth = 180; // 繞射波包寬度 
        const fringeWidth = 35;   // 干涉條紋寬度 

        // --- Three.js 場景設定 ---
        const container = document.getElementById('three-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020617, 0.015);

        // 攝影機：側面等角透視 (類似截圖視角)
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(-25, 15, 45); 
        camera.lookAt(10, -5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // 光源
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0x38bdf8, 0.5);
        dirLight.position.set(-20, 20, 20);
        scene.add(dirLight);

        // --- 建立物件 ---

        // 1. 電子槍模型
        const gunGroup = new THREE.Group();
        gunGroup.position.set(-25, 0, 0);
        
        const gunBody = new THREE.Mesh(
            new THREE.BoxGeometry(8, 6, 6),
            new THREE.MeshPhongMaterial({ color: 0x334155, flatShading: true })
        );
        const gunNozzle = new THREE.Mesh(
            new THREE.CylinderGeometry(0.8, 0.8, 4, 16),
            new THREE.MeshPhongMaterial({ color: 0x94a3b8 })
        );
        gunNozzle.rotation.z = -Math.PI / 2;
        gunNozzle.position.set(5, 0, 0);
        
        gunGroup.add(gunBody);
        gunGroup.add(gunNozzle);
        scene.add(gunGroup);

        // 電子槍開火閃光
        const flashLight = new THREE.PointLight(0xfef08a, 0, 20);
        flashLight.position.set(-18, 0, 0);
        scene.add(flashLight);
        let flashIntensity = 0;

        // 電子閃爍粒子系統 (存放瞬間出現的小黃球)
        const electronParticles = [];
        // 將粒子大小大幅縮小以配合偵測屏幕上的亮點大小
        const particleGeo = new THREE.SphereGeometry(0.12, 8, 8); 

        function spawnElectronParticle(x, y, z) {
            const material = new THREE.MeshBasicMaterial({ 
                color: 0xfacc15, 
                transparent: true, 
                opacity: 1 
            });
            const mesh = new THREE.Mesh(particleGeo, material);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            electronParticles.push({ mesh, life: 1.0 });
        }

        // 2. 狹縫擋板 (使用 Shape 挖空雙狹縫)
        let barrierMesh;
        function updateBarrierGeometry() {
            if (barrierMesh) scene.remove(barrierMesh);

            const shape = new THREE.Shape();
            // 擋板外框 (高度縮減為原本 0.5 倍)
            shape.moveTo(-15, -7.5);
            shape.lineTo(15, -7.5);
            shape.lineTo(15, 7.5);
            shape.lineTo(-15, 7.5);
            shape.lineTo(-15, -7.5);

            // 挖空雙狹縫
            const slit1 = new THREE.Path();
            slit1.moveTo(-2.5, -4);
            slit1.lineTo(-1.5, -4);
            slit1.lineTo(-1.5, 4);
            slit1.lineTo(-2.5, 4);
            slit1.lineTo(-2.5, -4);
            shape.holes.push(slit1);

            const slit2 = new THREE.Path();
            slit2.moveTo(1.5, -4);
            slit2.lineTo(2.5, -4);
            slit2.lineTo(2.5, 4);
            slit2.lineTo(1.5, 4);
            slit2.lineTo(1.5, -4);
            shape.holes.push(slit2);

            const geometry = new THREE.ExtrudeGeometry(shape, { depth: 0.5, bevelEnabled: false });
            const material = new THREE.MeshPhongMaterial({ color: 0x0f172a, specular: 0x111111 });
            
            barrierMesh = new THREE.Mesh(geometry, material);
            
            // 加入明顯的白框
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 }));
            barrierMesh.add(line);
            
            barrierMesh.position.set(0, 0, 0);
            barrierMesh.rotation.y = Math.PI / 2; // 面向 X 軸
            scene.add(barrierMesh);
        }
        updateBarrierGeometry();

        // 3. 偵測屏幕 (使用隱藏的 Canvas 動態繪製貼圖)
        const hiddenCanvas = document.createElement('canvas');
        hiddenCanvas.width = texSize;
        hiddenCanvas.height = texSize;
        const ctx = hiddenCanvas.getContext('2d');
        
        // 初始化背景
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, texSize, texSize);

        const screenTexture = new THREE.CanvasTexture(hiddenCanvas);
        // 使用 BasicMaterial 讓屏幕自己發光不受場景光源影響
        const screenMaterial = new THREE.MeshBasicMaterial({ map: screenTexture }); 
        const screenGeometry = new THREE.PlaneGeometry(35, 30);
        const screenMesh = new THREE.Mesh(screenGeometry, screenMaterial);
        
        // 加上屏幕的白框
        const screenEdges = new THREE.EdgesGeometry(screenGeometry);
        const screenLine = new THREE.LineSegments(screenEdges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 }));
        screenMesh.add(screenLine);

        screenMesh.position.set(25, 0, 0);
        screenMesh.rotation.y = -Math.PI / 2; // 面向電子槍
        scene.add(screenMesh);


        // --- UI 與互動事件 ---
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // 稍微跟隨滑鼠製造 3D 視差感
        let mouseX = 0;
        let mouseY = 0;
        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            mouseX = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouseY = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        });

        function clearScreen() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, texSize, texSize);
            screenTexture.needsUpdate = true;
        }

        // --- 核心物理/機率引擎 ---
        function getQuantumTargetZ() {
            let maxAttempts = 200;
            for(let i=0; i<maxAttempts; i++) {
                // z 代表貼圖上的水平座標 (映射到 3D 的 Z 軸分佈)
                let z = (Math.random() - 0.5) * texSize; 
                
                // 雙狹縫干涉機率：包絡線(單狹縫繞射) * 干涉項
                let envelope = Math.exp(-(z*z) / (2 * envelopeWidth * envelopeWidth));
                let interference = Math.pow(Math.cos(Math.PI * z / fringeWidth), 2);
                let prob = envelope * interference;

                if (Math.random() < prob) {
                    return z + texSize / 2; // 轉換回 0 ~ texSize
                }
            }
            return texSize / 2;
        }

        function hitScreen(targetZ) {
            // 在屏幕 Y 軸上給予隨機分佈 (垂直方向的擴散)
            let targetY = texSize/2 + (Math.random() - 0.5) * texSize * 0.7; 
            
            ctx.beginPath();
            ctx.arc(targetZ, targetY, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(254, 240, 138, 0.9)'; // 亮黃色
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#facc15';
            ctx.fill();
            ctx.shadowBlur = 0;
            
            screenTexture.needsUpdate = true;
        }

        // --- 動態標籤更新 ---
        function updateLabelsPosition() {
            const widthHalf = container.clientWidth / 2;
            const heightHalf = container.clientHeight / 2;

            // 將標籤定位在裝置正上方的 3D 座標，並轉換成 2D 螢幕座標
            const posGun = new THREE.Vector3(-25, 7, 0).project(camera);
            labelGun.style.left = (posGun.x * widthHalf + widthHalf) + 'px';
            labelGun.style.top = (-(posGun.y * heightHalf) + heightHalf) + 'px';

            const posBarrier = new THREE.Vector3(0, 11, 0).project(camera);
            labelBarrier.style.left = (posBarrier.x * widthHalf + widthHalf) + 'px';
            labelBarrier.style.top = (-(posBarrier.y * heightHalf) + heightHalf) + 'px';

            const posScreen = new THREE.Vector3(25, 17, 0).project(camera);
            labelScreen.style.left = (posScreen.x * widthHalf + widthHalf) + 'px';
            labelScreen.style.top = (-(posScreen.y * heightHalf) + heightHalf) + 'px';
        }

        // --- 動畫迴圈 ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. 處理攝影機視差 (微微移動)
            const targetCamX = -25 + mouseX * 3;
            const targetCamY = 15 + mouseY * 3;
            camera.position.x += (targetCamX - camera.position.x) * 0.05;
            camera.position.y += (targetCamY - camera.position.y) * 0.05;
            camera.lookAt(10, -5, 0);

            // 同步更新 3D 追蹤標籤位置
            updateLabelsPosition();

            // 2. 處理屏幕殘影淡出
            let retention = decaySlider.value; 
            let fadeAlpha = 1 - (retention / 100); 
            if (fadeAlpha > 0) {
                // 用底色覆蓋產生淡出
                ctx.fillStyle = `rgba(15, 23, 42, ${fadeAlpha * 0.2})`;
                ctx.fillRect(0, 0, texSize, texSize);
                screenTexture.needsUpdate = true;
            }

            // 3. 槍口閃光衰減
            if (flashIntensity > 0) {
                flashIntensity -= 1.5;
                flashLight.intensity = Math.max(0, flashIntensity);
            }

            // 4. 更新閃爍粒子狀態
            for (let i = electronParticles.length - 1; i >= 0; i--) {
                let p = electronParticles[i];
                p.life -= 0.04; // 衰減速度
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    electronParticles.splice(i, 1);
                } else {
                    p.mesh.material.opacity = p.life;
                    // 稍微縮小粒子放大的幅度，維持小亮點的細緻感
                    p.mesh.scale.setScalar(1 + (1 - p.life) * 0.3); 
                }
            }

            // 5. 發射電子邏輯 (瞬間塌縮，沒有連續軌跡)
            let freq = parseInt(freqSlider.value);
            if (Math.random() < (freq / 100) * 1.5) {
                let burst = Math.floor(freq / 20) + 1;
                for(let i=0; i<burst; i++){
                    flashIntensity = 15; // 觸發閃光
                    let z = getQuantumTargetZ();
                    hitScreen(z); // 瞬間抵達屏幕
                    
                    // 【視覺特效】在電子槍口隨機製造粒子
                    // 修正座標至槍口最右側：中心x=-25 + 槍管位移x=5 + 槍管長度一半x=2 = -18
                    spawnElectronParticle(
                        -18, 
                        (Math.random() - 0.5) * 0.6, 
                        (Math.random() - 0.5) * 0.6
                    );

                    // 【視覺特效】在狹縫處隨機製造粒子 (雙狹縫)
                    let slitY = (Math.random() - 0.5) * 6; // 狹縫高度範圍
                    // 隨機選定左/右狹縫
                    let slitZ = Math.random() < 0.5 ? -2.0 + (Math.random()-0.5)*0.8 : 2.0 + (Math.random()-0.5)*0.8;
                    // 稍微推前至擋板表面，避免被擋板本身遮住
                    spawnElectronParticle(-0.3, slitY, slitZ);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>
</html>
